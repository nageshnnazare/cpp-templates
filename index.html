<p>&ldquo;Perfect forwarding&rdquo; means: write a wrapper that passes its arguments to another
function <strong>without changing their value category</strong> (lvalue stays lvalue, rvalue
stays rvalue) and without extra copies. This is the machinery behind
<code>std::make_unique</code>, <code>emplace_back</code>, <code>std::invoke</code>, and every good generic
factory.</p>
<p>Prereqs: value categories, <a href="04-argument-deduction.md">04-argument-deduction.md</a>.</p>
<hr />
<h2 id="1-the-problem-it-solves">1. The problem it solves</h2>
<pre><code class="language-cpp">// A naive wrapper LOSES information:
template &lt;class T&gt;
void wrapper(T arg) {           // by value -&gt; always copies
    real_function(arg);         // 'arg' is an lvalue here -&gt; can't move
}

// We want: if the caller passed an rvalue (temporary), forward it as an rvalue
// (so real_function can MOVE from it). If lvalue, keep it an lvalue.
</code></pre>
<pre><code>   caller: wrapper(make_big())     // rvalue -&gt; we WANT a move
   caller: BigThing b; wrapper(b)  // lvalue -&gt; we WANT a copy (no steal)

   Goal: the wrapper is &quot;transparent&quot; — real_function sees exactly what the
         caller passed.
</code></pre>
<hr />
<h2 id="2-forwarding-references-t-on-a-deduced-t">2. Forwarding references (<code>T&amp;&amp;</code> on a deduced <code>T</code>)</h2>
<p>A parameter of the form <code>T&amp;&amp;</code> where <strong><code>T</code> is deduced</strong> is a <em>forwarding
reference</em> (a.k.a. &ldquo;universal reference&rdquo;, Scott Meyers&rsquo; term). It binds to
<strong>both</strong> lvalues and rvalues, and encodes which one in <code>T</code>.</p>
<pre><code class="language-cpp">template &lt;class T&gt;
void wrapper(T&amp;&amp; arg);          // forwarding reference
</code></pre>
<pre><code>   IMPORTANT: it is a forwarding reference ONLY when:
     * the form is exactly  T&amp;&amp;  (cv-unqualified), AND
     * T is being DEDUCED at this call.

   NOT forwarding references (these are plain rvalue references):
     void f(std::string&amp;&amp;);          // concrete type, not deduced
     template&lt;class T&gt; void f(const T&amp;&amp;);  // has const
     template&lt;class T&gt; void f(std::vector&lt;T&gt;&amp;&amp;);  // T not at top level
     auto&amp;&amp; x = ...;                 // THIS one IS a forwarding ref (auto deduced)
</code></pre>
<hr />
<h2 id="3-reference-collapsing--the-rule-that-makes-it-work">3. Reference collapsing — the rule that makes it work</h2>
<p>When references-to-references arise (only in templates/typedefs), they
&ldquo;collapse&rdquo;:</p>
<pre><code>   T&amp; &amp;    -&gt;  T&amp;
   T&amp; &amp;&amp;   -&gt;  T&amp;
   T&amp;&amp; &amp;   -&gt;  T&amp;
   T&amp;&amp; &amp;&amp;  -&gt;  T&amp;&amp;

   Mnemonic: &quot;&amp; is contagious.&quot; If any &amp; is involved, result is &amp;.
             Only &amp;&amp; &amp;&amp; stays &amp;&amp;.
</code></pre>
<p>Combine with the forwarding-ref deduction rule:</p>
<pre><code>   argument is LVALUE of type X  -&gt;  T deduced as X&amp;    -&gt;  param: X&amp; &amp;&amp; -&gt; X&amp;
   argument is RVALUE of type X  -&gt;  T deduced as X     -&gt;  param: X&amp;&amp;
</code></pre>
<pre><code>   BigThing b;
   wrapper(b)           // lvalue: T = BigThing&amp;,  arg type = BigThing&amp;
   wrapper(make_big())  // rvalue: T = BigThing,   arg type = BigThing&amp;&amp;
</code></pre>
<p>So <code>T</code> itself tells you what the caller passed:</p>
<pre><code>   T is a reference type (X&amp;)   &lt;=&gt;  caller passed an LVALUE
   T is a non-reference (X)      &lt;=&gt;  caller passed an RVALUE
</code></pre>
<hr />
<h2 id="4-stdforward--conditional-cast-based-on-t">4. <code>std::forward</code> — conditional cast based on <code>T</code></h2>
<p>Inside the wrapper, <code>arg</code> is a <em>named variable</em>, so it is an <strong>lvalue</strong>
regardless of how it was passed. To restore the original value category we cast
with <code>std::forward&lt;T&gt;</code>:</p>
<pre><code class="language-cpp">template &lt;class T&gt;
void wrapper(T&amp;&amp; arg) {
    real_function(std::forward&lt;T&gt;(arg));   // restores lvalue/rvalue-ness
}
</code></pre>
<pre><code>   std::forward&lt;T&gt;(arg) does:
     if T is X&amp;   (lvalue was passed) -&gt; returns an LVALUE reference (no move)
     if T is X    (rvalue was passed) -&gt; returns an RVALUE reference (enables move)
</code></pre>
<p>Its implementation is basically a conditional cast:</p>
<pre><code class="language-cpp">template &lt;class T&gt;
constexpr T&amp;&amp; forward(std::remove_reference_t&lt;T&gt;&amp; x) noexcept {
    return static_cast&lt;T&amp;&amp;&gt;(x);   // T&amp;&amp; collapses to T&amp; or T&amp;&amp; per the rule
}
</code></pre>
<pre><code>   forward&lt;X&amp;&gt;(x)  -&gt; static_cast&lt;X&amp; &amp;&amp;&gt;(x)  -&gt; static_cast&lt;X&amp;&gt;(x)   (lvalue)
   forward&lt;X&gt;(x)   -&gt; static_cast&lt;X&amp;&amp;&gt;(x)                             (rvalue)
</code></pre>
<h3 id="stdmove-vs-stdforward"><code>std::move</code> vs <code>std::forward</code></h3>
<pre><code>   std::move(x)      -&gt; UNCONDITIONAL cast to rvalue. &quot;I'm done with x.&quot;
   std::forward&lt;T&gt;(x)-&gt; CONDITIONAL cast, depends on T. &quot;Pass along as-is.&quot;

   Use move   for a variable you OWN and want to steal from.
   Use forward for a FORWARDING-REFERENCE parameter you're passing onward.
</code></pre>
<pre><code>   template&lt;class T&gt; void f(T&amp;&amp; x) {
       g(std::move(x));       // BUG if caller passed an lvalue: you stole it!
       g(std::forward&lt;T&gt;(x)); // CORRECT: only steals if caller gave an rvalue
   }
</code></pre>
<hr />
<h2 id="5-the-full-picture-one-diagram">5. The full picture, one diagram</h2>
<pre><code>                       caller side                    wrapper internals
   -----------------------------------------------    ---------------------------
   BigThing b;                                        template&lt;class T&gt;
   wrapper(b);       // lvalue                         void wrapper(T&amp;&amp; arg) {
        |  T = BigThing&amp;                                 real( forward&lt;T&gt;(arg) );
        |  arg type: BigThing&amp;                         }
        v
   forward&lt;BigThing&amp;&gt;(arg) -&gt; BigThing&amp;  (lvalue) -&gt; real() copies

   wrapper(make());  // rvalue
        |  T = BigThing
        |  arg type: BigThing&amp;&amp;
        v
   forward&lt;BigThing&gt;(arg) -&gt; BigThing&amp;&amp;  (rvalue) -&gt; real() MOVES
</code></pre>
<hr />
<h2 id="6-forwarding-a-whole-pack">6. Forwarding a whole pack</h2>
<p>The canonical variadic factory:</p>
<pre><code class="language-cpp">template &lt;class T, class... Args&gt;
std::unique_ptr&lt;T&gt; make(Args&amp;&amp;... args) {
    return std::unique_ptr&lt;T&gt;(new T(std::forward&lt;Args&gt;(args)...));
}
</code></pre>
<pre><code>   Args&amp;&amp;... args           -&gt; pack of forwarding references
   std::forward&lt;Args&gt;(args)... -&gt; forward EACH element with its own Args_i
        expands to:  new T( forward&lt;A0&gt;(a0), forward&lt;A1&gt;(a1), ... )
   Each argument keeps its own lvalue/rvalue-ness independently.
</code></pre>
<p>This is exactly <code>std::make_unique</code> / <code>emplace_back</code> / <code>std::make_shared</code>.</p>
<hr />
<h2 id="7-perfect-forwarding-the-return-value-too">7. Perfect-forwarding the return value too</h2>
<p>Use <code>decltype(auto)</code> so a wrapper returns <em>exactly</em> what the inner call
returns (value, <code>T&amp;</code>, or <code>T&amp;&amp;</code>) — see
<a href="04-argument-deduction.md">04-argument-deduction.md</a> §6.</p>
<pre><code class="language-cpp">template &lt;class F, class... Args&gt;
decltype(auto) timed_call(F&amp;&amp; f, Args&amp;&amp;... args) {
    auto start = now();
    // perfectly forward BOTH the callable and its args, and the RESULT:
    decltype(auto) result = std::forward&lt;F&gt;(f)(std::forward&lt;Args&gt;(args)...);
    log(now() - start);
    return result;                          // preserves reference-ness
}
</code></pre>
<pre><code>   If f returns int&amp;   -&gt; timed_call returns int&amp;
   If f returns int    -&gt; timed_call returns int
   'auto' return would DECAY int&amp; to int (losing the reference). Use decltype(auto).
</code></pre>
<blockquote>
<p>Subtlety: if the inner call returns a <em>reference to a temporary you created</em>,
forwarding it out is a dangling reference. <code>decltype(auto)</code> preserves the type
faithfully; you must still ensure lifetimes are valid.</p>
</blockquote>
<hr />
<h2 id="8-forwarding-references-vs-overload-hijacking-a-real-gotcha">8. Forwarding references vs overload hijacking (a real gotcha)</h2>
<p>A forwarding-reference constructor is <em>greedy</em> — it can outcompete copy/move and
intended overloads:</p>
<pre><code class="language-cpp">struct Person {
    std::string name;
    template &lt;class T&gt;
    explicit Person(T&amp;&amp; n) : name(std::forward&lt;T&gt;(n)) {}  // greedy!
    Person(const Person&amp;) = default;    // may be BYPASSED
};

Person a(&quot;bob&quot;);
Person b(a);     // OOPS: T&amp;&amp; matches Person&amp; BETTER than const Person&amp;
                 // -&gt; tries to init std::string from a Person -&gt; error
</code></pre>
<pre><code>   Person b(a);   // a is a non-const lvalue Person
     candidate 1: Person(T&amp;&amp;) with T=Person&amp;   -&gt; EXACT match
     candidate 2: Person(const Person&amp;)         -&gt; needs const conversion
   -&gt; template wins -&gt; name(std::forward&lt;Person&amp;&gt;(a)) -&gt; string from Person: FAIL
</code></pre>
<p>Fixes:</p>
<ul>
<li>
<p>Constrain the template so it doesn&rsquo;t accept <code>Person</code>:
  <code>requires (!std::same_as&lt;std::remove_cvref_t&lt;T&gt;, Person&gt;)</code> (C++20), or
  <code>enable_if</code> in C++17.</p>
</li>
<li>
<p>Prefer plain overloads when the set of types is small.</p>
</li>
</ul>
<p>This is why constrained forwarding constructors matter — chapter 13.</p>
<hr />
<h2 id="9-auto-and-range-for">9. <code>auto&amp;&amp;</code> and range-for</h2>
<p><code>auto&amp;&amp;</code> is a forwarding reference for <em>variables</em>. Range-for uses it to bind to
any element type without copying, whether the range yields references or
prvalues (like <code>vector&lt;bool&gt;</code>&rsquo;s proxy):</p>
<pre><code class="language-cpp">for (auto&amp;&amp; x : range) {
    use(std::forward&lt;decltype(x)&gt;(x));   // forward the element if needed
}
</code></pre>
<pre><code>   auto&amp;&amp; x = *it;
     *it is lvalue T&amp;    -&gt; x is T&amp;
     *it is prvalue T    -&gt; x is T&amp;&amp;   (binds the temporary, extends lifetime)
   -&gt; works uniformly for real refs and proxy objects.
</code></pre>
<hr />
<h2 id="10-worked-example-transparent-logging-wrapper">10. Worked example: transparent logging wrapper</h2>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;utility&gt;

struct Heavy {
    std::string data;
    Heavy(std::string s) : data(std::move(s)) { std::cout &lt;&lt; &quot;ctor\\n&quot;; }
    Heavy(const Heavy&amp;)  : data()             { std::cout &lt;&lt; &quot;COPY\\n&quot;; }
    Heavy(Heavy&amp;&amp; o) noexcept : data(std::move(o.data)) { std::cout &lt;&lt; &quot;MOVE\\n&quot;; }
};

void sink(Heavy h) { std::cout &lt;&lt; &quot;sink got: &quot; &lt;&lt; h.data &lt;&lt; '\\n'; }

template &lt;class T&gt;
void forward_to_sink(T&amp;&amp; x) {
    sink(std::forward&lt;T&gt;(x));       // copy if lvalue, move if rvalue
}

int main() {
    Heavy h(&quot;lvalue&quot;);
    std::cout &lt;&lt; &quot;-- forwarding lvalue --\\n&quot;;
    forward_to_sink(h);              // expect COPY
    std::cout &lt;&lt; &quot;-- forwarding rvalue --\\n&quot;;
    forward_to_sink(Heavy(&quot;rvalue&quot;));// expect MOVE (ctor then MOVE)
}
</code></pre>
<pre><code>   forward_to_sink(h):       T=Heavy&amp;  -&gt; forward -&gt; lvalue -&gt; sink COPIES
   forward_to_sink(Heavy()): T=Heavy   -&gt; forward -&gt; rvalue -&gt; sink MOVES
</code></pre>
<p>Runnable: <a href="examples/ch09_forwarding.cpp"><code>examples/ch09_forwarding.cpp</code></a>.</p>

<p>Design patterns that are <em>built out of</em> templates. These are the idioms that
appear in real libraries (Eigen, ranges, standard library, embedded frameworks).</p>
<hr />
<h2 id="1-crtp--curiously-recurring-template-pattern">1. CRTP — Curiously Recurring Template Pattern</h2>
<p>A class inherits from a template <strong>instantiated with itself</strong>:</p>
<pre><code class="language-cpp">template &lt;class Derived&gt;
struct Base {
    void interface() {
        static_cast&lt;Derived*&gt;(this)-&gt;implementation();   // &quot;static polymorphism&quot;
    }
};

struct Widget : Base&lt;Widget&gt; {          // &lt;-- inherits Base&lt;Widget&gt;
    void implementation() { std::puts(&quot;Widget impl&quot;); }
};
</code></pre>
<pre><code>   struct Widget : Base&lt;Widget&gt;
                        ^^^^^^
              the base is parameterized on the DERIVED type

   Base&lt;Widget&gt;::interface()
        static_cast&lt;Widget*&gt;(this)-&gt;implementation();
        |
   compiler KNOWS the derived type -&gt; the call is resolved at COMPILE TIME
   -&gt; no vtable, no virtual dispatch, fully inlinable.
</code></pre>
<h3 id="crtp--virtual-functions-without-the-vtable">CRTP = &ldquo;virtual functions without the vtable&rdquo;</h3>
<pre><code>   Runtime polymorphism (virtual)      CRTP (static polymorphism)
   ------------------------------      --------------------------
   Base* p = &amp;derived;                 Base&lt;Derived&gt;&amp; r = derived;
   p-&gt;foo();  // vtable lookup          r.foo();   // resolved at compile time
   + heterogeneous containers          - each Base&lt;X&gt; is a different type
   - indirect call, no inline          + zero overhead, inlinable
   - runtime cost                      - can't store mixed types in one container
</code></pre>
<h3 id="use-case-1-inject-shared-behavior-mixin-of-methods">Use case 1: inject shared behavior (mixin of methods)</h3>
<pre><code class="language-cpp">template &lt;class Derived&gt;
struct Comparable {
    friend bool operator!=(const Derived&amp; a, const Derived&amp; b) { return !(a == b); }
    friend bool operator&gt; (const Derived&amp; a, const Derived&amp; b) { return b &lt; a; }
    friend bool operator&lt;=(const Derived&amp; a, const Derived&amp; b) { return !(b &lt; a); }
    friend bool operator&gt;=(const Derived&amp; a, const Derived&amp; b) { return !(a &lt; b); }
};

struct Version : Comparable&lt;Version&gt; {
    int major, minor;
    friend bool operator==(const Version&amp; a, const Version&amp; b) {
        return a.major==b.major &amp;&amp; a.minor==b.minor;
    }
    friend bool operator&lt;(const Version&amp; a, const Version&amp; b) {
        return a.major&lt;b.major || (a.major==b.major &amp;&amp; a.minor&lt;b.minor);
    }
};
// Version now has !=, &gt;, &lt;=, &gt;= for free, derived from == and &lt;.
</code></pre>
<pre><code>   You define:  == and &lt;
   CRTP adds:   !=, &gt;, &lt;=, &gt;=      (all derived, all inlined)
</code></pre>
<blockquote>
<p>In C++20, <code>operator&lt;=&gt;</code> (the spaceship, chapter 14) makes much of this
obsolete — but CRTP-based &ldquo;boost.operators&rdquo;-style mixins are everywhere in
pre-C++20 code and still useful for non-ordering behavior.</p>
</blockquote>
<h3 id="use-case-2-static-interface--policy-checking">Use case 2: static interface / policy checking</h3>
<pre><code class="language-cpp">template &lt;class Derived&gt;
struct Shape {
    double area()      const { return self().area_impl(); }
    double perimeter() const { return self().perimeter_impl(); }
private:
    const Derived&amp; self() const { return static_cast&lt;const Derived&amp;&gt;(*this); }
};

struct Circle : Shape&lt;Circle&gt; {
    double r;
    double area_impl()      const { return 3.14159 * r * r; }
    double perimeter_impl() const { return 2 * 3.14159 * r; }
};
</code></pre>
<h3 id="crtp-pitfalls">CRTP pitfalls</h3>
<pre><code>  * Base&lt;Derived&gt; is instantiated with an INCOMPLETE Derived. You can't use
    sizeof(Derived) or Derived members in the Base class BODY at parse time —
    only inside member functions (instantiated later).
  * No common base type -&gt; can't hold Circle and Square in one container
    (they are Shape&lt;Circle&gt; and Shape&lt;Square&gt;, unrelated). Combine with type
    erasure (§4) if you need that.
  * static_cast to the wrong Derived (copy/paste bug) is UB and silent.
    Deducing-this (C++23, chapter 14) removes this footgun.
</code></pre>
<hr />
<h2 id="2-deducing-this-c23--crtps-successor-for-many-cases">2. Deducing <code>this</code> (C++23) — CRTP&rsquo;s successor for many cases</h2>
<p>C++23 lets a member function deduce its own object type, eliminating the
<code>static_cast</code> in many CRTP uses:</p>
<pre><code class="language-cpp">struct Shape {
    template &lt;class Self&gt;
    double area(this const Self&amp; self) {    // 'this Self&amp;' explicit object param
        return self.area_impl();            // self is the real derived type
    }
};
struct Circle : Shape {
    double r;
    double area_impl() const { return 3.14159 * r * r; }
};
</code></pre>
<pre><code>   circle.area()
     Self deduced as Circle  -&gt; self is a Circle&amp;  -&gt; self.area_impl() OK
   No Base&lt;Derived&gt; needed, no static_cast, no CRTP boilerplate.
</code></pre>
<p>See <a href="14-cpp23-features.md">14-cpp23-features.md</a>.</p>
<hr />
<h2 id="3-policy-based-design">3. Policy-Based Design</h2>
<p>Configure a class&rsquo;s behavior by passing <strong>policy</strong> template parameters — small
types that supply pieces of behavior. Popularized by Alexandrescu&rsquo;s <em>Modern C++
Design</em>.</p>
<pre><code class="language-cpp">// Policies:
struct ThrowingCheck {
    static void check(bool ok) { if (!ok) throw std::out_of_range(&quot;bad&quot;); }
};
struct NoCheck {
    static void check(bool) {}                 // compiles to nothing
};

// Host class parameterized on the policy:
template &lt;class T, class CheckPolicy = ThrowingCheck&gt;
class Vector {
    std::vector&lt;T&gt; data_;
public:
    T&amp; at(std::size_t i) {
        CheckPolicy::check(i &lt; data_.size());  // behavior injected by policy
        return data_[i];
    }
    void push_back(T v) { data_.push_back(std::move(v)); }
};

Vector&lt;int&gt;            safe;    // bounds-checked (throws)
Vector&lt;int, NoCheck&gt;   fast;    // checks compiled away -&gt; zero overhead
</code></pre>
<pre><code>   Vector&lt;int, ThrowingCheck&gt;::at   -&gt; if(!ok) throw ...
   Vector&lt;int, NoCheck&gt;::at         -&gt; check() is empty -&gt; inlined to nothing

   Same source, different POLICY -&gt; different behavior, chosen at compile time,
   with ZERO runtime cost for the &quot;off&quot; policy.
</code></pre>
<pre><code>              +------------------------+
              |     Vector&lt;T, Policy&gt;  |
              +-----------+------------+
                          |
          policy plugs in |  CheckPolicy::check(...)
                          v
         +----------------+-----------------+
         | ThrowingCheck  | NoCheck | LogCheck | ...
         +----------------------------------+
   Mix &amp; match orthogonal behaviors without a combinatorial class explosion.
</code></pre>
<p>Allocators (<code>std::vector&lt;T, Alloc&gt;</code>), comparators (<code>std::set&lt;T, Compare&gt;</code>), and
<code>std::char_traits</code> are all policy parameters in the standard library.</p>
<hr />
<h2 id="4-type-erasure--runtime-polymorphism-without-inheritance">4. Type Erasure — runtime polymorphism <em>without</em> inheritance</h2>
<p>CRTP gives compile-time polymorphism but no common type. Sometimes you need to
store <em>different</em> types behind one interface at <strong>runtime</strong> (like <code>std::function</code>,
<code>std::any</code>, <code>std::shared_ptr</code>&rsquo;s deleter). <strong>Type erasure</strong> does this with
templates + a hidden virtual interface.</p>
<p>The recipe (three layers):</p>
<pre><code>   +------------------------------------------------------+
   |  Wrapper (value type users hold): Drawable            |
   |     holds: unique_ptr&lt;Concept&gt;                        |
   +------------------------------------------------------+
                    |
   +----------------v-------------------------------------+
   |  Concept (abstract interface, INTERNAL): draw()=0     |
   +------------------------------------------------------+
                    ^  implemented by
   +----------------+-------------------------------------+
   |  Model&lt;T&gt; (template): stores a T, forwards draw()     |
   |     to the free function draw(const T&amp;)              |
   +------------------------------------------------------+
</code></pre>
<pre><code class="language-cpp">#include &lt;memory&gt;
#include &lt;vector&gt;
#include &lt;iostream&gt;

// The type-erased value type:
class Drawable {
    struct Concept {                          // internal interface
        virtual ~Concept() = default;
        virtual void do_draw() const = 0;
        virtual std::unique_ptr&lt;Concept&gt; clone() const = 0;
    };
    template &lt;class T&gt;
    struct Model : Concept {                  // template adapter per T
        T obj;
        explicit Model(T o) : obj(std::move(o)) {}
        void do_draw() const override { draw(obj); }         // ADL free function
        std::unique_ptr&lt;Concept&gt; clone() const override {
            return std::make_unique&lt;Model&gt;(*this);
        }
    };
    std::unique_ptr&lt;Concept&gt; self_;
public:
    template &lt;class T&gt;                        // accepts ANY drawable type
    Drawable(T x) : self_(std::make_unique&lt;Model&lt;T&gt;&gt;(std::move(x))) {}
    Drawable(const Drawable&amp; o) : self_(o.self_-&gt;clone()) {}
    Drawable&amp; operator=(Drawable o) { self_ = std::move(o.self_); return *this; }

    friend void draw(const Drawable&amp; d) { d.self_-&gt;do_draw(); }  // dispatch
};

// Unrelated types, no common base, no inheritance:
struct Circle { };
struct Square { };
void draw(const Circle&amp;) { std::cout &lt;&lt; &quot;circle\\n&quot;; }
void draw(const Square&amp;) { std::cout &lt;&lt; &quot;square\\n&quot;; }

int main() {
    std::vector&lt;Drawable&gt; shapes;
    shapes.emplace_back(Circle{});
    shapes.emplace_back(Square{});
    for (const auto&amp; s : shapes) draw(s);     // circle / square
}
</code></pre>
<pre><code>   shapes: [ Drawable{Model&lt;Circle&gt;}, Drawable{Model&lt;Square&gt;} ]
                       |                        |
   draw(s) -&gt; self_-&gt;do_draw() -&gt; draw(obj)  (virtual dispatch inside)
   Users see ONE type (Drawable), store heterogeneous values, no base class
   required on Circle/Square. This is how std::function/std::any work.
</code></pre>
<p>Type erasure trades a heap allocation + one virtual call for <strong>non-intrusive</strong>
runtime polymorphism (the stored types don&rsquo;t need to inherit anything).</p>
<hr />
<h2 id="5-mixins-via-variadic-inheritance">5. Mixins via variadic inheritance</h2>
<p>Compose behavior by inheriting from several small templates:</p>
<pre><code class="language-cpp">template &lt;class Base&gt; struct Serializable : Base { void save() const {/*...*/} };
template &lt;class Base&gt; struct Loggable     : Base { void log()  const {/*...*/} };

struct Empty {};
using Entity = Serializable&lt;Loggable&lt;Empty&gt;&gt;;   // stack the mixins
</code></pre>
<pre><code>   Serializable&lt;Loggable&lt;Empty&gt;&gt;
        adds save()   adds log()
   -&gt; Entity has both save() and log(), each defined once, reusable.
</code></pre>
<hr />
<h2 id="6-expression-templates-a-peek">6. Expression templates (a peek)</h2>
<p>Libraries like Eigen use templates to build an <strong>expression tree at compile
time</strong> so that <code>a + b + c</code> on big vectors runs in <strong>one loop</strong> with no
temporaries.</p>
<pre><code>   a + b + c        (naive: two temporaries, three loops)
        |
   expression templates capture the STRUCTURE:
        Add&lt; Add&lt;Vec,Vec&gt;, Vec &gt;          (no computation yet)
        |
   assignment triggers ONE fused loop:
        for i: result[i] = a[i] + b[i] + c[i];
</code></pre>
<p>The types encode the operation; evaluation is deferred until assignment. This is
advanced but is <em>the</em> reason template-heavy math libraries are fast. (Modern
ranges/<code>views</code> achieve similar laziness more readably.)</p>
<hr />
<h2 id="7-choosing-a-polymorphism-strategy">7. Choosing a polymorphism strategy</h2>
<pre><code>  Need                                    Use
  -------------------------------------   ------------------------------------
  zero-overhead reuse of methods          CRTP mixin / deducing-this (C++23)
  compile-time configurable behavior      policy-based design
  heterogeneous container, non-intrusive  type erasure (std::function/any-like)
  heterogeneous container, you own types   classic virtual inheritance
  fused lazy computation                   expression templates / ranges views
</code></pre>
<p>Runnable: <a href="examples/ch10_crtp.cpp"><code>examples/ch10_crtp.cpp</code></a>,
<a href="examples/ch10_type_erasure.cpp"><code>examples/ch10_type_erasure.cpp</code></a>.</p>
<hr />
<h2 id="8-summary">8. Summary</h2>
<div class="diagram"><div class="diagram-title">CRTP and patterns</div><div class="dbox green"><div class="dbox-title">Key points</div><div class="dtext"><b>CRTP:</b> <code>struct D : Base&lt;D&gt;</code>. Static polymorphism, zero overhead, no vtable, but no common base type</div><div class="dtext">Deducing-this (C++23) replaces most CRTP <code>static_cast</code> boilerplate</div><div class="dtext"><b>Policy design:</b> inject orthogonal behavior via template params; "off" policies cost nothing</div><div class="dtext"><b>Type erasure:</b> Concept/Model/Wrapper → runtime polymorphism without inheritance (<code>std::function</code>/<code>any</code> pattern)</div><div class="dtext">Mixins: stack small templates. Expression templates: lazy fusion</div></div></div><details class="ascii-diagram"><summary>Details</summary><pre><code> +------------------------------------------------------------------+
 | CRTP: struct D : Base&lt;D&gt;. Static polymorphism, zero overhead,    |

 | Deducing-this (C++23) replaces most CRTP static_cast boilerplate.|
 | Policy design: inject orthogonal behavior via template params,   |

 | Type erasure: Concept/Model/Wrapper -&gt; runtime polymorphism      |

 +------------------------------------------------------------------+</code></pre></details>

<p>Metaprogramming = <strong>computing with types and compile-time values</strong>. The compiler
becomes your interpreter. This chapter shows the classic &ldquo;types as functional
programming&rdquo; style, then the modern <code>constexpr</code> style that largely replaces it.</p>
<hr />
<h2 id="1-two-eras-of-compile-time-computation">1. Two eras of compile-time computation</h2>
<pre><code>   CLASSIC TMP (C++98..)         MODERN (C++14/17/20..)
   -----------------------       --------------------------
   recursion via templates       constexpr functions (normal code!)
   ::value / ::type              return values / return types
   specialization = &quot;if&quot;         if / if constexpr
   type lists                    still templates, but simpler helpers
   HARD to read                  reads like ordinary C++
</code></pre>
<p>Rule of thumb: <strong>for VALUES, use <code>constexpr</code> functions. For TYPES, use templates
(type traits, type lists).</strong> Reach for classic recursive TMP only when you truly
manipulate types.</p>
<hr />
<h2 id="2-values-the-classic-factorial-for-contrast">2. Values: the classic factorial (for contrast)</h2>
<pre><code class="language-cpp">// CLASSIC TMP: compute factorial with template recursion
template &lt;unsigned N&gt;
struct Factorial { static constexpr unsigned value = N * Factorial&lt;N-1&gt;::value; };
template &lt;&gt;
struct Factorial&lt;0&gt; { static constexpr unsigned value = 1; };   // base case

static_assert(Factorial&lt;5&gt;::value == 120);
</code></pre>
<pre><code>   Factorial&lt;5&gt;::value
     = 5 * Factorial&lt;4&gt;::value
     = 5 * 4 * Factorial&lt;3&gt;::value
     = ... = 5*4*3*2*1 * Factorial&lt;0&gt;::value
     = 120 * 1
   Each Factorial&lt;N&gt; is a distinct TYPE instantiated by the compiler.
   Recursion = template instantiation chain. Base case = specialization.
</code></pre>
<h3 id="the-modern-way-just-write-a-function">The modern way (just write a function!)</h3>
<pre><code class="language-cpp">constexpr unsigned factorial(unsigned n) {
    unsigned r = 1;
    for (unsigned i = 2; i &lt;= n; ++i) r *= i;
    return r;
}
static_assert(factorial(5) == 120);   // runs at compile time
</code></pre>
<pre><code>   No templates, no specialization, no ::value. Ordinary loop.
   -&gt; ALWAYS prefer this for value computation. See chapter 12.
</code></pre>
<hr />
<h2 id="3-types-the-real-domain-of-tmp">3. Types: the real domain of TMP</h2>
<p><code>constexpr</code> can&rsquo;t (before reflection) <em>produce types</em>. For type-level work,
templates remain the tool. Core operations:</p>
<pre><code>   TYPE-LEVEL &quot;FUNCTION&quot;     realized as
   ----------------------    ------------------------------
   f(T) = U                  template&lt;class T&gt; struct F { using type = U; };
   apply                     typename F&lt;T&gt;::type   (or F_t&lt;T&gt;)
   branch                    specialization / conditional_t
   recursion                 F&lt;T&gt; refers to F&lt;smaller&gt;
   list of types             template&lt;class...&gt; struct TypeList {};
</code></pre>
<hr />
<h2 id="4-type-lists">4. Type lists</h2>
<p>A type list is just a variadic template used as a container of types:</p>
<pre><code class="language-cpp">template &lt;class... Ts&gt; struct TypeList {};

using L = TypeList&lt;int, double, char&gt;;
</code></pre>
<h3 id="length">Length</h3>
<pre><code class="language-cpp">template &lt;class L&gt; struct Length;
template &lt;class... Ts&gt; struct Length&lt;TypeList&lt;Ts...&gt;&gt;
    : std::integral_constant&lt;std::size_t, sizeof...(Ts)&gt; {};

static_assert(Length&lt;L&gt;::value == 3);
</code></pre>
<h3 id="front--pushfront">Front / PushFront</h3>
<pre><code class="language-cpp">template &lt;class L&gt; struct Front;
template &lt;class H, class... T&gt; struct Front&lt;TypeList&lt;H, T...&gt;&gt; { using type = H; };

template &lt;class New, class L&gt; struct PushFront;
template &lt;class New, class... Ts&gt;
struct PushFront&lt;New, TypeList&lt;Ts...&gt;&gt; { using type = TypeList&lt;New, Ts...&gt;; };
</code></pre>
<pre><code>   TypeList&lt;int,double,char&gt;
     Front       -&gt; int
     PushFront&lt;bool&gt;  -&gt; TypeList&lt;bool,int,double,char&gt;
     Length      -&gt; 3
   Pattern-matching on TypeList&lt;Ts...&gt; destructures the list.
</code></pre>
<h3 id="map-transform-every-type">Map (transform every type)</h3>
<pre><code class="language-cpp">template &lt;template &lt;class&gt; class F, class L&gt; struct Map;
template &lt;template &lt;class&gt; class F, class... Ts&gt;
struct Map&lt;F, TypeList&lt;Ts...&gt;&gt; { using type = TypeList&lt;typename F&lt;Ts&gt;::type...&gt;; };

// apply std::add_pointer to every element:
using Ptrs = Map&lt;std::add_pointer, L&gt;::type;   // TypeList&lt;int*, double*, char*&gt;
</code></pre>
<pre><code>   Map&lt;add_pointer, TypeList&lt;int,double,char&gt;&gt;
        F applied to each:  add_pointer&lt;int&gt;::type, add_pointer&lt;double&gt;::type, ...
        -&gt; TypeList&lt;int*, double*, char*&gt;
   The pattern F&lt;Ts&gt;::type... is a pack expansion over the list.
</code></pre>
<h3 id="contains--indexof-recursion--branch">Contains / IndexOf (recursion + branch)</h3>
<pre><code class="language-cpp">template &lt;class T, class L&gt; struct Contains : std::false_type {};
template &lt;class T, class H, class... Ts&gt;
struct Contains&lt;T, TypeList&lt;H, Ts...&gt;&gt;
    : std::conditional_t&lt;std::is_same_v&lt;T, H&gt;,
                         std::true_type,
                         Contains&lt;T, TypeList&lt;Ts...&gt;&gt;&gt; {};   // recurse on tail
template &lt;class T&gt; struct Contains&lt;T, TypeList&lt;&gt;&gt; : std::false_type {}; // base

static_assert( Contains&lt;double, L&gt;::value);
static_assert(!Contains&lt;float,  L&gt;::value);
</code></pre>
<pre><code>   Contains&lt;double, TypeList&lt;int,double,char&gt;&gt;
     H=int != double -&gt; recurse Contains&lt;double, TypeList&lt;double,char&gt;&gt;
       H=double == double -&gt; true_type
   Walk the list, branch with conditional_t, stop at empty base case.
</code></pre>
<hr />
<h2 id="5-stdinteger_sequence--compile-time-index-generation">5. <code>std::integer_sequence</code> — compile-time index generation</h2>
<p>The standard&rsquo;s tool for turning a count into a pack of indices <code>0,1,...,N-1</code>.
Essential for tuple/array algorithms.</p>
<pre><code class="language-cpp">#include &lt;utility&gt;

template &lt;class T, T... Is&gt;
void show(std::integer_sequence&lt;T, Is...&gt;) {
    ((std::cout &lt;&lt; Is &lt;&lt; ' '), ...);       // fold over the indices
}
show(std::make_integer_sequence&lt;int, 5&gt;{});   // 0 1 2 3 4
</code></pre>
<pre><code>   std::make_index_sequence&lt;5&gt;  ==  index_sequence&lt;0,1,2,3,4&gt;
        |
   captured as a pack Is... = 0,1,2,3,4
        |
   fold/expand over Is to touch each index at compile time.
</code></pre>
<p>Turning a runtime array into a tuple, applying a function to each tuple element,
initializing an <code>std::array</code> from a generator — all use <code>index_sequence</code>.</p>
<pre><code class="language-cpp">// call f(0), f(1), ..., f(N-1) at compile-time-unrolled positions
template &lt;class F, std::size_t... Is&gt;
void for_each_index(F&amp;&amp; f, std::index_sequence&lt;Is...&gt;) {
    (f(std::integral_constant&lt;std::size_t, Is&gt;{}), ...);
}
template &lt;std::size_t N, class F&gt;
void repeat(F&amp;&amp; f) { for_each_index(std::forward&lt;F&gt;(f), std::make_index_sequence&lt;N&gt;{}); }
</code></pre>
<hr />
<h2 id="6-iterating-a-stdtuple">6. Iterating a <code>std::tuple</code></h2>
<p>Combining <code>index_sequence</code> + fold to visit every element (heterogeneous!):</p>
<pre><code class="language-cpp">#include &lt;tuple&gt;
#include &lt;iostream&gt;

template &lt;class Tuple, class F, std::size_t... Is&gt;
void tuple_for_each_impl(Tuple&amp;&amp; t, F&amp;&amp; f, std::index_sequence&lt;Is...&gt;) {
    (f(std::get&lt;Is&gt;(std::forward&lt;Tuple&gt;(t))), ...);   // comma fold over indices
}
template &lt;class Tuple, class F&gt;
void tuple_for_each(Tuple&amp;&amp; t, F&amp;&amp; f) {
    constexpr auto N = std::tuple_size_v&lt;std::remove_reference_t&lt;Tuple&gt;&gt;;
    tuple_for_each_impl(std::forward&lt;Tuple&gt;(t), std::forward&lt;F&gt;(f),
                        std::make_index_sequence&lt;N&gt;{});
}

int main() {
    auto t = std::make_tuple(1, 2.5, &quot;hi&quot;);
    tuple_for_each(t, [](const auto&amp; x){ std::cout &lt;&lt; x &lt;&lt; ' '; });  // 1 2.5 hi
}
</code></pre>
<pre><code>   tuple_size = 3  -&gt; index_sequence&lt;0,1,2&gt;
   fold:  f(get&lt;0&gt;(t)), f(get&lt;1&gt;(t)), f(get&lt;2&gt;(t))
   The lambda is a generic (templated) call operator -&gt; handles int, double, char*.
</code></pre>
<p>Runnable: <a href="examples/ch11_tuple_for_each.cpp"><code>examples/ch11_tuple_for_each.cpp</code></a>.</p>

<h2 id="7-constexpr-type-computation-is-coming-reflection-c26">7. <code>constexpr</code> &ldquo;type computation&rdquo; is coming: reflection (C++26)</h2>
<p>Historically, you <em>cannot</em> compute a type with ordinary <code>constexpr</code> code — hence
all the template metaprogramming above. <strong>C++26 static reflection</strong> changes this:
you can reflect a type into a <code>std::meta::info</code> value, manipulate it with normal
<code>constexpr</code> code, and <em>splice</em> it back into a type. This will replace much
classic TMP. Preview in <a href="15-cpp26-features.md">15-cpp26-features.md</a>:</p>
<pre><code class="language-cpp">// C++26 (conceptual): iterate members with ordinary constexpr code
// template &lt;class T&gt; constexpr auto member_count() {
//     return std::meta::nonstatic_data_members_of(^^T).size();
// }
</code></pre>
<pre><code>   Classic TMP:   types manipulated by RECURSIVE TEMPLATES (hard).
   C++26 reflect: types -&gt; values (std::meta::info) -&gt; normal constexpr -&gt; types.
</code></pre>
<hr />
<h2 id="8-tmp-performance--debugging-notes">8. TMP performance &amp; debugging notes</h2>
<pre><code>  * Template instantiation is COMPILE-TIME work. Deep recursion (e.g.
    Factorial&lt;10000&gt;) can blow compile time and hit instantiation-depth limits
    (typically ~900-1024). Prefer constexpr functions for values.
  * Each distinct instantiation is memoized by the compiler, but distinct
    argument sets multiply. Type lists with O(N^2) algorithms get slow fast.
  * Fold expressions &amp; pack tricks are usually cheaper to compile than deep
    recursion (fewer instantiations).
  * Debug with: static_assert(std::is_same_v&lt;Computed, Expected&gt;);
    or the &quot;incomplete type probe&quot; from chapter 04.
</code></pre>
<hr />
<h2 id="9-when-to-use-tmp-vs-alternatives">9. When to use TMP vs alternatives</h2>
<pre><code>  Task                                Best tool
  ---------------------------------   -------------------------------------
  compute a NUMBER at compile time    constexpr/consteval function (ch 12)
  compute a TYPE                       type traits / type lists (this ch)
                                       -&gt; C++26 reflection when available
  select code path on a trait          if constexpr (ch 12) / concepts (ch 13)
  detect capability                    requires / concepts (ch 13)
  generate indices                     std::index_sequence
  operate over a tuple/pack            index_sequence + fold (ch 06)
</code></pre>
<p>The modern lesson: <strong>most of what needed classic TMP now has a friendlier tool.</strong>
Learn TMP to read older/expert code and for genuine type-level work; write new
value logic as <code>constexpr</code>.</p>

<p>Compile-time evaluation is the modern replacement for a lot of template

<h2 id="1-the-family-at-a-glance">1. The family at a glance</h2>
<pre><code>   constexpr   &quot;CAN run at compile time (and at runtime).&quot;   [C++11, grew a lot]
   consteval   &quot;MUST run at compile time.&quot; (immediate fn)     [C++20]
   constinit   &quot;MUST be initialized at compile time.&quot;         [C++20]

</code></pre>
<pre><code>   constexpr int f();       // may be constant OR runtime
   consteval int g();       // ALWAYS constant; calling with runtime args = error
   constinit int x = f();   // init happens at compile time; x still mutable
   if constexpr(cond){...}  // picks one branch at compile time
</code></pre>
<hr />
<h2 id="2-constexpr-functions">2. <code>constexpr</code> functions</h2>
<p>A <code>constexpr</code> function <em>can</em> be evaluated at compile time <strong>if</strong> its arguments
are constant expressions; otherwise it runs at runtime like a normal function.</p>
<pre><code class="language-cpp">constexpr int square(int x) { return x * x; }

constexpr int a = square(5);   // compile-time: a is a constant (25)
int n = read_int();
int b = square(n);             // runtime: n isn't constant -&gt; ordinary call
</code></pre>
<pre><code>   square(5)   -&gt; arguments constant -&gt; evaluated at COMPILE time -&gt; 25
   square(n)   -&gt; n runtime          -&gt; evaluated at RUNTIME
   Same function, both worlds. &quot;constexpr&quot; = &quot;ELIGIBLE for compile-time.&quot;
</code></pre>
<h3 id="what-constexpr-functions-can-do-it-grew-over-standards">What constexpr functions can do (it grew over standards)</h3>
<pre><code>   C++11: single return, very restricted.
   C++14: loops, local vars, multiple statements, if/switch.  (usable!)
   C++17: constexpr lambdas, if constexpr.
   C++20: try/catch (no throw at ct), virtual constexpr, dynamic_cast,
          constexpr allocation (new/delete) IF freed before ct ends,
          std::vector / std::string usable in constexpr,
          constexpr std::is_constant_evaluated().
   C++23: constexpr std::unique_ptr, more &lt;cmath&gt;, 'if consteval',
          relaxed rules (goto/labels, static constexpr locals, etc.).
   C++26: even more of the library becomes constexpr.
</code></pre>
<pre><code class="language-cpp">// C++20: build and use a vector entirely at compile time
constexpr int sum_first_n(int n) {
    std::vector&lt;int&gt; v;                 // constexpr allocation (C++20)
    for (int i = 1; i &lt;= n; ++i) v.push_back(i);
    int s = 0;
    for (int x : v) s += x;
    return s;                           // vector freed before ct ends -&gt; OK
}
static_assert(sum_first_n(100) == 5050);
</code></pre>
<h3 id="constexpr-variables"><code>constexpr</code> variables</h3>
<p>A <code>constexpr</code> variable is a compile-time constant (implies <code>const</code>):</p>
<pre><code class="language-cpp">constexpr double pi = 3.141592653589793;
constexpr int table[3] = { square(1), square(2), square(3) };  // {1,4,9}
</code></pre>
<hr />
<h2 id="3-consteval--immediate-functions-c20">3. <code>consteval</code> — immediate functions (C++20)</h2>
<p><code>consteval</code> forces compile-time evaluation. If you can&rsquo;t evaluate it at compile
time, it&rsquo;s an <strong>error</strong>. Use it when a runtime call would be a bug (e.g.
compile-time-only checks, generating constants).</p>
<pre><code class="language-cpp">consteval int next_power_of_two(int n) {
    int p = 1; while (p &lt; n) p &lt;&lt;= 1; return p;
}

constexpr int cap = next_power_of_two(100);   // OK -&gt; 128 at compile time
// int n = read(); int x = next_power_of_two(n);  // ERROR: not a constant
</code></pre>
<pre><code>   constexpr: compile-time IF POSSIBLE, else runtime.
   consteval: compile-time ALWAYS, else COMPILE ERROR.

   next_power_of_two(100)  -&gt; 128 (compile time, fine)
   next_power_of_two(runtime_n) -&gt; error: &quot;call to consteval function is not
                                           a constant expression&quot;
</code></pre>
<p>Great use: <strong>compile-time-checked factory</strong> (e.g. validate a format string, or a
color hex) so bad literals fail to compile.</p>
<pre><code class="language-cpp">consteval std::uint32_t hex_color(const char* s) {
    // ... parse; if invalid, call a non-constexpr function to force an error
    return /* parsed value */ 0;

<hr />
<h2 id="4-constinit-c20--solve-static-init-order-keep-mutability">4. <code>constinit</code> (C++20) — solve static init order, keep mutability</h2>
<p><code>constinit</code> guarantees a variable is initialized during <strong>constant
initialization</strong> (at compile time), avoiding the &ldquo;static initialization order
fiasco&rdquo; — but unlike <code>constexpr</code>, the variable can still be <strong>modified</strong> at
runtime.</p>
<pre><code class="language-cpp">constinit int counter = 0;     // guaranteed no dynamic init; counter is mutable
// counter = 5;                // OK at runtime (not const)

// constexpr int c2 = f();     // c2 is const, cannot change
</code></pre>
<pre><code>   constexpr x  = init  -&gt; compile-time init AND const (read-only)
   constinit x  = init  -&gt; compile-time init, but MUTABLE at runtime
   (plain)   x  = init  -&gt; may be dynamically initialized (order fiasco risk)
</code></pre>
<p>Use <code>constinit</code> for global/<code>thread_local</code> state that must be ready before any
runtime code but that you still write to.</p>

<h2 id="5-if-constexpr-c17--the-game-changer">5. <code>if constexpr</code> (C++17) — the game-changer</h2>
<p>A compile-time branch: the compiler <strong>keeps</strong> the taken branch and <strong>discards</strong>
the other. The discarded branch is <em>not instantiated</em> for the current template
arguments, so it may contain code that would be ill-formed for that <code>T</code>.</p>
<pre><code class="language-cpp">template &lt;class T&gt;

    if constexpr (std::is_arithmetic_v&lt;T&gt;) {
        return std::to_string(x);          // valid only for numbers
    } else if constexpr (requires { x.to_string(); }) {
        return x.to_string();              // valid only if member exists
    } else {
        return std::string(&quot;&lt;?&gt;&quot;);
    }
}
</code></pre>
<pre><code>   to_string_generic(42):    is_arithmetic -&gt; TRUE
        keep:    return std::to_string(x);
        DISCARD: x.to_string()  &lt;-- never instantiated -&gt; no error even though

   - or class template specializations - readable top to bottom
</code></pre>

<p>The discarded branch is not <em>instantiated</em>, but it must still be <strong>syntactically
valid</strong> and its <strong>non-dependent</strong> parts are checked. To make a branch fully
dependent (so nothing is checked until instantiation), route through a template:</p>
<pre><code class="language-cpp">template &lt;class...&gt; inline constexpr bool always_false = false;

template &lt;class T&gt;
void handle(const T&amp;) {
    if constexpr (std::is_integral_v&lt;T&gt;)      { /* ... */ }
    else if constexpr (std::is_floating_point_v&lt;T&gt;) { /* ... */ }
    else {
        static_assert(always_false&lt;T&gt;, &quot;unsupported type&quot;);
        //           ^^^^^^^^^^^^^^^^ dependent on T so it only fires when
        //           this branch is actually selected (not always).
    }
}
</code></pre>
<pre><code>   static_assert(false, ...)          -&gt; fires ALWAYS (non-dependent) -&gt; WRONG

</code></pre>
<p>(Note: C++23 relaxed some <code>static_assert(false)</code> cases in discarded branches,
but <code>always_false&lt;T&gt;</code> remains the portable idiom.)</p>
<hr />
<h2 id="6-if-consteval-c23--branch-on-how-youre-being-evaluated">6. <code>if consteval</code> (C++23) — branch on <em>how</em> you&rsquo;re being evaluated</h2>
<p>Choose different code when running at compile time vs runtime. Cleaner and safer
than <code>std::is_constant_evaluated()</code>.</p>
<pre><code class="language-cpp">constexpr double my_sqrt(double x) {
    if consteval {
        return newton_sqrt(x);      // compile-time-friendly implementation
    } else {
        return std::sqrt(x);        // fast runtime intrinsic

    else

<pre><code>   if constexpr (std::is_constant_evaluated())  // BUG: always true in that
                                                //      context -&gt; misleads.
   Always use plain 'if' with is_constant_evaluated(), or prefer 'if consteval'.
</code></pre>

<h2 id="7-constexpr--templates-compile-time-data-tables">7. <code>constexpr</code> + templates: compile-time data tables</h2>
<p>A powerful combo: generate lookup tables at compile time.</p>
<pre><code class="language-cpp">#include &lt;array&gt;

constexpr std::array&lt;int, 10&gt; make_squares() {
    std::array&lt;int, 10&gt; a{};
    for (int i = 0; i &lt; 10; ++i) a[i] = i * i;
    return a;

static_assert(squares[4] == 16);

<h2 id="8-decision-guide">8. Decision guide</h2>
<pre><code>  Want...                                       Use
  -------------------------------------------   ------------------------
  a value usable at compile time (and runtime)  constexpr function/var
  to FORBID runtime evaluation                  consteval
  compile-time init but a mutable global        constinit
  branch on a type/trait inside a template      if constexpr
  branch on compile-time-vs-runtime execution   if consteval (C++23)
  compile-time lookup tables                    constexpr function -&gt; array
</code></pre>

<h2 id="9-summary">9. Summary</h2>

  { name: `15. Concepts`, path: `13-concepts.md`, dir: ``, words: 1530, mins: 8, body: `<h1 id="13--concepts--constraints-c20">13 — Concepts &amp; Constraints (C++20)</h1>
<p>Concepts are the biggest template feature since templates themselves. They let
you <strong>name requirements</strong>, <strong>constrain</strong> templates, get <strong>great error messages</strong>,
and <strong>overload on properties</strong>. If SFINAE was the assembly language of
constraints, concepts are the high-level language.</p>
<hr />
<h2 id="1-the-problem-concepts-solve-recap">1. The problem concepts solve (recap)</h2>
<pre><code>   Unconstrained template + bad argument
   -------------------------------------
   sort(list_of_widgets)   // widget has no operator&lt;
        |
        v  error appears DEEP inside &lt;algorithm&gt;, 40 lines, blaming the library

   Constrained template + bad argument
   -----------------------------------
   sort(list_of_widgets)
        |
        v  error at the CALL SITE:
           &quot;constraint std::sortable not satisfied: Widget lacks operator&lt;&quot;
</code></pre>
<p>Concepts move the contract into the signature so the compiler checks it <em>before</em>
instantiating the body, and reports failures in human terms.</p>
<hr />
<h2 id="2-defining-a-concept">2. Defining a concept</h2>
<p>A concept is a named compile-time bool predicate over template parameters.</p>
<pre><code class="language-cpp">#include &lt;concepts&gt;

template &lt;class T&gt;
concept Integral = std::is_integral_v&lt;T&gt;;      // simplest form: a bool expression

template &lt;class T&gt;
concept Addable = requires (T a, T b) {         // requires-expression (see §4)
    a + b;                                       // &quot;a + b must be valid&quot;
};
</code></pre>
<pre><code>   concept Name = &lt;compile-time bool&gt;;
   concept Name = requires(params) { ...requirements... };

   Use it like a type-constraint:  template&lt;Integral T&gt; ...
   Or as a bool:                   static_assert(Integral&lt;int&gt;);
</code></pre>
<hr />
<h2 id="3-four-ways-to-apply-a-constraint">3. Four ways to apply a constraint</h2>
<pre><code class="language-cpp">// (1) as the &quot;type&quot; in the template head
template &lt;std::integral T&gt;
T half(T x) { return x / 2; }

// (2) abbreviated function template with constrained auto
std::integral auto half2(std::integral auto x) { return x / 2; }

// (3) requires-clause after the template head
template &lt;class T&gt; requires std::integral&lt;T&gt;
T half3(T x) { return x / 2; }

// (4) trailing requires-clause (after the signature)
template &lt;class T&gt;
T half4(T x) requires std::integral&lt;T&gt; { return x / 2; }
</code></pre>
<pre><code>   template&lt;std::integral T&gt;          &lt;-- shorthand, most common
   void f(std::integral auto x)       &lt;-- abbreviated, great for one-offs
   template&lt;class T&gt; requires C&lt;T&gt;    &lt;-- when the constraint is complex
   ... requires C&lt;T&gt; { }              &lt;-- trailing; can mention params/this
</code></pre>
<p>All four are equivalent for the simple case. Forms (3)/(4) handle arbitrary
boolean constraint expressions (<code>requires A&lt;T&gt; &amp;&amp; (B&lt;T&gt; || C&lt;T&gt;)</code>).</p>
<hr />
<h2 id="4-requires-expressions--the-workhorse">4. <code>requires</code> expressions — the workhorse</h2>
<p>A <code>requires</code>-expression is a compile-time bool that is <code>true</code> if all its
<strong>requirements</strong> are valid. Four kinds of requirement:</p>
<pre><code class="language-cpp">template &lt;class T&gt;
concept Container = requires (T c, const T cc) {
    // (a) SIMPLE requirement: expression must be valid
    c.begin();
    c.end();

    // (b) TYPE requirement: a type must exist
    typename T::value_type;
    typename T::iterator;

    // (c) COMPOUND requirement: valid + noexcept + return-type constraint
    { c.size() } -&gt; std::convertible_to&lt;std::size_t&gt;;
    { c.empty() } noexcept -&gt; std::same_as&lt;bool&gt;;

    // (d) NESTED requirement: another compile-time bool must hold
    requires std::default_initializable&lt;typename T::value_type&gt;;
};
</code></pre>
<pre><code>   simple:    expr;                        -&gt; &quot;expr compiles&quot;
   type:      typename T::foo;             -&gt; &quot;T::foo names a type&quot;
   compound:  { expr } -&gt; Concept;         -&gt; &quot;expr compiles AND its type
                                              satisfies Concept&quot;
              { expr } noexcept -&gt; C;      -&gt; &quot;...and expr is noexcept&quot;
   nested:    requires bool_expr;          -&gt; &quot;bool_expr is true&quot;
</code></pre>
<p>Note the arrow: <code>{ expr } -&gt; Concept</code> means &ldquo;the type of <code>expr</code> must satisfy
<code>Concept</code>&rdquo; — the type is implicitly the first argument. <code>std::same_as&lt;bool&gt;</code> etc.</p>
<hr />
<h2 id="5-the-standard-concepts-library-concepts">5. The standard concepts library (<code>&lt;concepts&gt;</code>)</h2>
<p>You rarely start from scratch — the standard provides building blocks:</p>
<pre><code>  CORE LANGUAGE:
    same_as&lt;T,U&gt;, derived_from&lt;D,B&gt;, convertible_to&lt;From,To&gt;,
    common_with, common_reference_with, assignable_from,
    swappable, swappable_with

  COMPARISON:
    equality_comparable, equality_comparable_with,
    totally_ordered, totally_ordered_with,
    three_way_comparable (C++20)

  OBJECT / LIFETIME:
    destructible, constructible_from, default_initializable,
    move_constructible, copy_constructible,
    movable, copyable, semiregular, regular

  ARITHMETIC:
    integral, signed_integral, unsigned_integral, floating_point

  CALLABLE:
    invocable, regular_invocable, predicate,
    relation, equivalence_relation, strict_weak_order

  (ranges/iterator concepts live in &lt;iterator&gt; and &lt;ranges&gt;:)
    input_iterator, forward_iterator, random_access_iterator, ...
    range, view, sized_range, input_range, ...
</code></pre>
<p><code>regular</code> and <code>semiregular</code> are especially useful:</p>
<pre><code>   semiregular  = default_initializable + copyable   (&quot;behaves like a value&quot;)
   regular      = semiregular + equality_comparable   (&quot;...and comparable&quot;)
</code></pre>
<hr />
<h2 id="6-subsumption-overloading-on-concepts">6. Subsumption: overloading on concepts</h2>
<p>The killer feature: when two constrained overloads both match, the compiler
picks the one whose constraints <strong>subsume</strong> (are strictly stronger than) the
other. No tag dispatch, no priority tricks.</p>
<pre><code class="language-cpp">#include &lt;iterator&gt;

template &lt;std::input_iterator It&gt;
void advance_it(It&amp; it, int n) {           // general: O(n)
    while (n-- &gt; 0) ++it;
}

template &lt;std::random_access_iterator It&gt;  // stronger constraint
void advance_it(It&amp; it, int n) {           // fast: O(1)
    it += n;
}
</code></pre>
<pre><code>   advance_it(vector_it, 5)
     both overloads viable (random_access IS input)
     random_access_iterator SUBSUMES input_iterator (it's stronger)
     -&gt; the O(1) overload wins.

   advance_it(list_it, 5)
     only input_iterator matches -&gt; O(n) overload.
</code></pre>
<pre><code>   Constraint hierarchy (subsumption):
     random_access_iterator  ==&gt;  bidirectional  ==&gt;  forward  ==&gt;  input
       (more requirements)                            (fewer requirements)
   Stronger constraint wins when both are satisfied.
</code></pre>
<p>This is the clean replacement for tag dispatch (chapter 05) and the whole
iterator-category machinery.</p>
<hr />
<h2 id="7-constraining-class-templates--members">7. Constraining class templates &amp; members</h2>
<pre><code class="language-cpp">template &lt;class T&gt;
concept Hashable = requires (T x) {
    { std::hash&lt;T&gt;{}(x) } -&gt; std::convertible_to&lt;std::size_t&gt;;
};

template &lt;Hashable Key, class Value&gt;
class HashMap { /* ... */ };

// Constrain individual members (only available when the constraint holds):
template &lt;class T&gt;
struct Wrapper {
    T value;
    void print() const requires std::equality_comparable&lt;T&gt; {
        // this member exists only if T is equality_comparable
    }
};
</code></pre>
<pre><code>   HashMap&lt;std::string, int&gt;   -&gt; OK (string is Hashable)
   HashMap&lt;Widget, int&gt;        -&gt; error at declaration: &quot;Widget not Hashable&quot;

   Wrapper&lt;int&gt;.print()        -&gt; exists
   Wrapper&lt;NoEq&gt;.print()       -&gt; not a member (constraint failed) -&gt; clear error
</code></pre>
<hr />
<h2 id="8-combining-constraints---negation">8. Combining constraints: <code>&amp;&amp;</code>, <code>||</code>, negation</h2>
<pre><code class="language-cpp">template &lt;class T&gt;
concept Number = std::integral&lt;T&gt; || std::floating_point&lt;T&gt;;

template &lt;class T&gt;
concept SignedNumber = Number&lt;T&gt; &amp;&amp; std::is_signed_v&lt;T&gt;;

template &lt;class T&gt;
concept NonBool = !std::same_as&lt;T, bool&gt;;
</code></pre>
<pre><code>   Concepts compose with &amp;&amp; and ||. For SUBSUMPTION to work correctly, prefer
   composing NAMED concepts (atomic constraints) rather than raw type-traits,
   because the compiler reasons about subsumption via the concept structure.
</code></pre>
<blockquote>
<p>Subsumption subtlety: <code>requires (std::is_integral_v&lt;T&gt;)</code> and
<code>std::integral&lt;T&gt;</code> are <em>not</em> seen as related for subsumption even though both
are &ldquo;true for integers&rdquo;. Build overload hierarchies from <strong>concepts</strong>, not
from ad-hoc <code>is_xxx_v</code> expressions, so the stronger/weaker relationship is
visible to the compiler.</p>
</blockquote>
<hr />
<h2 id="9-requires-requires-and-why-it-looks-weird">9. <code>requires requires</code> (and why it looks weird)</h2>
<p>You&rsquo;ll see <code>requires requires</code>. The first <code>requires</code> introduces a <strong>constraint</strong>;
the second starts a <strong>requires-expression</strong>. It means &ldquo;constrain this with an
ad-hoc inline requirement&rdquo;:</p>
<pre><code class="language-cpp">template &lt;class T&gt;
    requires requires (T x) { x.serialize(); }   // ad-hoc, unnamed
void save(const T&amp; x);
</code></pre>
<pre><code>   requires   requires(T x){ x.serialize(); }
   \\______/   \\_______________________________/
   requires-  requires-EXPRESSION (the bool)
   CLAUSE
</code></pre>
<p>Prefer naming it as a concept for readability:</p>
<pre><code class="language-cpp">template &lt;class T&gt; concept Serializable = requires (T x) { x.serialize(); };
template &lt;Serializable T&gt; void save(const T&amp; x);   // much clearer
</code></pre>
<hr />
<h2 id="10-concepts-fix-the-greedy-forwarding-constructor-bug-ch-09">10. Concepts fix the greedy-forwarding-constructor bug (ch 09)</h2>
<pre><code class="language-cpp">struct Person {
    std::string name;
    template &lt;class T&gt;
        requires (!std::same_as&lt;std::remove_cvref_t&lt;T&gt;, Person&gt;)  // &lt;-- guard
    explicit Person(T&amp;&amp; n) : name(std::forward&lt;T&gt;(n)) {}
    Person(const Person&amp;) = default;
};

Person a(&quot;bob&quot;);
Person b(a);      // now the template is DISABLED for Person -&gt; copy ctor used
</code></pre>
<pre><code>   Person b(a):  the constrained ctor rejects T=Person&amp; (constraint false)
                 -&gt; copy constructor is selected. Bug fixed cleanly.
</code></pre>
<hr />
<h2 id="11-worked-example-a-clean-generic-print">11. Worked example: a clean generic <code>print</code></h2>
<p>Recall the SFINAE version in chapter 07 was ambiguous. Concepts make it precise:</p>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;concepts&gt;
#include &lt;ranges&gt;
#include &lt;string&gt;
#include &lt;vector&gt;

template &lt;class T&gt;
concept Streamable = requires (std::ostream&amp; os, const T&amp; x) {
    { os &lt;&lt; x } -&gt; std::same_as&lt;std::ostream&amp;&gt;;
};

// prefer streaming when possible:
template &lt;Streamable T&gt;
void print(const T&amp; x) { std::cout &lt;&lt; x &lt;&lt; '\\n'; }

// otherwise, if it's a range whose elements are streamable:
template &lt;std::ranges::input_range R&gt;
    requires (!Streamable&lt;R&gt;) &amp;&amp; Streamable&lt;std::ranges::range_value_t&lt;R&gt;&gt;
void print(const R&amp; r) {
    std::cout &lt;&lt; &quot;[ &quot;;
    for (const auto&amp; e : r) std::cout &lt;&lt; e &lt;&lt; ' ';
    std::cout &lt;&lt; &quot;]\\n&quot;;
}

int main() {
    print(42);                          // 42  (Streamable)
    print(std::string(&quot;hi&quot;));           // hi  (string IS streamable -&gt; not range branch)
    print(std::vector&lt;int&gt;{1, 2, 3});   // [ 1 2 3 ]  (range branch)
}
</code></pre>
<pre><code>   print(std::string): string is Streamable -&gt; Streamable overload wins,
        the range overload is disabled by (!Streamable&lt;R&gt;). No ambiguity!
   print(vector&lt;int&gt;): not streamable, is a range of streamable ints -&gt; range.
</code></pre>
<p>Runnable: <a href="examples/ch13_concepts_print.cpp"><code>examples/ch13_concepts_print.cpp</code></a>.</p>
<hr />
<h2 id="12-migration-cheat-sheet-sfinae---concepts">12. Migration cheat sheet: SFINAE -&gt; concepts</h2>
<pre><code>   OLD (SFINAE / traits)                     NEW (concepts)
   ---------------------------------------   -------------------------------
   template&lt;class T,                         template&lt;std::integral T&gt;
     enable_if_t&lt;is_integral_v&lt;T&gt;,int&gt; =0&gt;
   void f(T);                                void f(T);

   template&lt;class T&gt;                         void f(std::integral auto);
     enable_if_t&lt;is_integral_v&lt;T&gt;&gt; f(T);

   void_t detection idiom                    requires { expr; } / concept

   tag dispatch on iterator_category         constrained overloads +
                                             subsumption
</code></pre>
<hr />
<h2 id="13-summary">13. Summary</h2>
<div class="diagram"><div class="diagram-title">Concepts</div><div class="dbox green"><div class="dbox-title">Key points</div><div class="dtext">Concept = named compile-time predicate on template params</div><div class="dtext">Apply: <code>template&lt;Concept T&gt;</code> | <code>void f(Concept auto x)</code></div><div class="dtext"><code>template&lt;class T&gt; requires Expr</code> | <code>... requires Expr</code></div><div class="dtext"><code>requires</code>-expr requirements: simple / type / compound / nested</div><div class="dtext"><code>{ e } -&gt; C</code>; <code>{ e } noexcept -&gt; C</code>; <code>typename T::x</code>; <code>requires b;</code></div><div class="dtext">Standard: integral, regular, invocable, ranges/iterator concepts</div><div class="dtext">Subsumption: stronger constraint wins → replaces tag dispatch</div><div class="dtext">Build overloads from <b>named</b> concepts (for correct subsumption)</div><div class="dtext">Errors point at the <b>call site</b> in plain language</div></div></div><details class="ascii-diagram"><summary>Details</summary><pre><code> +------------------------------------------------------------------+

 | Apply:  template&lt;Concept T&gt;  |  void f(Concept auto x)           |

 |                                                                  |

  { name: `16. Cpp23 Features`, path: `14-cpp23-features.md`, dir: ``, words: 1264, mins: 6, body: `<h1 id="14--c23-template-relevant-features">14 — C++23 Template-Relevant Features</h1>
<p>C++23 didn&rsquo;t add a headline &ldquo;templates&rdquo; feature, but several additions
significantly affect generic code. The two biggest are <strong>deducing <code>this</code></strong> and
<strong><code>if consteval</code></strong>; we also cover the spaceship recap, <code>auto(x)</code>, multidimensional
<code>operator[]</code>, and library concepts additions.</p>
<hr />
<h2 id="1-deducing-this-explicit-object-parameter--the-star-feature">1. Deducing <code>this</code> (explicit object parameter) — the star feature</h2>
<p>A member function can take an <strong>explicit object parameter</strong> named <code>this</code>,
letting the function template deduce the <em>actual</em> type of the object it&rsquo;s called
on (including cv/ref-qualification and the derived type).</p>
<pre><code class="language-cpp">struct Widget {
    template &lt;class Self&gt;
    void process(this Self&amp;&amp; self) {          // 'this Self&amp;&amp;' is the object
        // self is the real object; Self carries value category + derived type
    }
};
</code></pre>
<pre><code>   Old: 4 overloads for  &amp;  const&amp;  &amp;&amp;  const&amp;&amp;
        void f() &amp;; void f() const&amp;; void f() &amp;&amp;; void f() const&amp;&amp;;
   New: ONE template deduces all of them:
        template&lt;class Self&gt; void f(this Self&amp;&amp; self);
</code></pre>
<h3 id="benefit-1-deduplicate-cvref-overloads">Benefit 1: deduplicate cv/ref overloads</h3>
<pre><code class="language-cpp">class Buffer {
    std::vector&lt;int&gt; data_;
public:
    // one function replaces 4 getter overloads; returns matching ref-ness:
    template &lt;class Self&gt;
    auto&amp;&amp; data(this Self&amp;&amp; self) {
        return std::forward&lt;Self&gt;(self).data_;
    }
};
</code></pre>
<pre><code>   Buffer b;         b.data()        -&gt; vector&lt;int&gt;&amp;
   const Buffer cb;  cb.data()       -&gt; const vector&lt;int&gt;&amp;
   std::move(b).data()               -&gt; vector&lt;int&gt;&amp;&amp;
   All from ONE definition. 'self' forwards the object's value category.
</code></pre>
<h3 id="benefit-2-replaces-crtp-no-more-static_cast">Benefit 2: replaces CRTP (no more <code>static_cast</code>)</h3>
<pre><code class="language-cpp">struct Base {
    template &lt;class Self&gt;
    void interface(this Self&amp;&amp; self) {
        self.impl();          // 'self' IS the derived type -&gt; no CRTP boilerplate
    }
};
struct Derived : Base {
    void impl() { /* ... */ }
};
Derived{}.interface();        // Self deduced as Derived
</code></pre>
<pre><code>   CRTP (old):                         Deducing this (C++23):
   template&lt;class D&gt; struct Base {      struct Base {
     void f(){ static_cast&lt;D*&gt;(this)     template&lt;class Self&gt;
               -&gt;impl(); } };            void f(this Self&amp;&amp; self){
   struct D : Base&lt;D&gt; {...};                self.impl(); } };
                                        struct D : Base {...};
   - needs Base&lt;D&gt;                       - plain inheritance
   - static_cast footgun                 - type-safe, deduced
</code></pre>
<h3 id="benefit-3-recursive-lambdas">Benefit 3: recursive lambdas!</h3>
<p>Lambdas can now recurse by naming themselves via the explicit object parameter:</p>
<pre><code class="language-cpp">auto fib = [](this auto self, int n) -&gt; int {
    return n &lt; 2 ? n : self(n-1) + self(n-2);   // 'self' is the lambda itself
};
fib(10);   // 55
</code></pre>
<pre><code>   Before C++23: lambdas couldn't reference themselves (needed std::function
                 or a Y-combinator trick).
   Now: [](this auto self, ...) { ... self(...) ... }
</code></pre>
<p>Gotchas: an explicit object parameter member can&rsquo;t be <code>static</code>, <code>virtual</code>, or
cv/ref-qualified in the usual way (the object param carries that instead), and
you don&rsquo;t write <code>this-&gt;</code> — use <code>self.</code>.</p>
<hr />
<h2 id="2-if-consteval-c23">2. <code>if consteval</code> (C++23)</h2>
<p>Covered in <a href="12-constexpr-consteval.md">12-constexpr-consteval.md</a>. Recap: branch
on whether you&rsquo;re in a constant-evaluation context, safely.</p>
<pre><code class="language-cpp">constexpr int f(int x) {
    if consteval { return ct_impl(x); }
    else         { return rt_impl(x); }
}
</code></pre>
<hr />
<h2 id="3-operator-three-way-comparison--c20-but-essential-for-generic-code">3. <code>operator&lt;=&gt;</code> (three-way comparison) — C++20, but essential for generic code</h2>
<p>The &ldquo;spaceship&rdquo; operator generates all six relational operators, killing a lot
of CRTP-comparison boilerplate (chapter 10).</p>
<pre><code class="language-cpp">#include &lt;compare&gt;

struct Point {
    int x, y;
    auto operator&lt;=&gt;(const Point&amp;) const = default;   // generates &lt; &lt;= &gt; &gt;= == !=
};
</code></pre>
<pre><code>   a &lt;=&gt; b  yields one of:
     std::strong_ordering   (a&lt;b, a==b, a&gt;b — totally ordered, e.g. ints)
     std::weak_ordering     (equivalent but not identical, e.g. case-insensitive)
     std::partial_ordering  (may be unordered, e.g. floats with NaN)

   = default  -&gt; member-wise lexicographic comparison, and synthesizes ==, !=,
                 &lt;, &lt;=, &gt;, &gt;= for you.
</code></pre>
<p>For templates, constrain on <code>std::three_way_comparable&lt;T&gt;</code>:</p>
<pre><code class="language-cpp">template &lt;std::three_way_comparable T&gt;
T clamp3(const T&amp; v, const T&amp; lo, const T&amp; hi) {
    return v &lt; lo ? lo : (hi &lt; v ? hi : v);
}
</code></pre>
<hr />
<h2 id="4-autox-and-autox--decay-copy-in-the-language-c23">4. <code>auto(x)</code> and <code>auto{x}</code> — decay-copy in the language (C++23)</h2>
<p>A concise way to make a <strong>prvalue copy</strong> with decayed type — useful in generic
code to detach from references/const or to force a copy before mutating.</p>
<pre><code class="language-cpp">template &lt;class T&gt;
void pop_and_use(std::vector&lt;T&gt;&amp; v) {
    auto last = auto(v.back());   // copy the element (decayed T), before pop
    v.pop_back();
    use(last);                    // safe: 'last' is independent of the vector
}
</code></pre>
<pre><code>   auto(expr)   -&gt; a prvalue of type decay_t&lt;decltype(expr)&gt;
   Like std::decay_copy, but built into the language. Handy in templates to
   avoid dangling references to container internals.
</code></pre>
<hr />
<h2 id="5-multidimensional-subscript-operatora-b-c-c23">5. Multidimensional subscript <code>operator[](a, b, c)</code> (C++23)</h2>
<p><code>operator[]</code> can now take multiple arguments — great for generic matrix/tensor
templates:</p>
<pre><code class="language-cpp">template &lt;class T, std::size_t Rows, std::size_t Cols&gt;
struct Matrix {
    std::array&lt;T, Rows*Cols&gt; data{};
    constexpr T&amp; operator[](std::size_t r, std::size_t c) {
        return data[r * Cols + c];
    }
};
Matrix&lt;double, 3, 3&gt; m;
m[1, 2] = 5.0;                     // real 2D indexing, no operator()/proxy hacks
</code></pre>
<pre><code>   Before C++23:  m[1][2] (needs proxy)  or  m(1,2) (operator())
   C++23:         m[1, 2]  directly.
   (std::mdspan in C++23 uses this.)
</code></pre>
<hr />
<h2 id="6-stdmdspan-c23--a-template-heavy-multidimensional-view">6. <code>std::mdspan</code> (C++23) — a template-heavy multidimensional view</h2>
<p><code>std::mdspan&lt;T, Extents, LayoutPolicy, AccessorPolicy&gt;</code> is a non-owning
multidimensional array view — a great real-world example of <strong>policy-based
design</strong> (chapter 10) in the standard library.</p>
<pre><code class="language-cpp">// int buffer[12] viewed as a 3x4 matrix:
// std::mdspan m(buffer, 3, 4);
// m[i, j]   // uses multidim operator[]
</code></pre>
<pre><code>   mdspan&lt;T, Extents, Layout, Accessor&gt;
                       ^^^^^^  ^^^^^^^^  &lt;- policy parameters:
                       row/col-major     custom read (e.g. atomic, strided)
   Configure layout &amp; access without changing the element type. Zero overhead.
</code></pre>
<hr />
<h2 id="7-other-c23-bits-that-touch-generic-code">7. Other C++23 bits that touch generic code</h2>
<pre><code>   * std::expected&lt;T,E&gt;          -&gt; templated error-handling vocabulary type
   * std::print / std::println   -&gt; &lt;print&gt;, format-based, uses variadic templates
   * ranges additions           -&gt; zip, enumerate, chunk, slide, adjacent, ...
   * constexpr &lt;cmath&gt;, constexpr std::unique_ptr  -&gt; more compile-time code
   * static operator() and static operator[]       -&gt; stateless functors avoid
                                                       passing 'this'
   * deduction-guide &amp; CTAD refinements
</code></pre>
<p><code>static operator()</code> lets stateless function objects skip the implicit <code>this</code>,
which can matter for zero-overhead generic callables:</p>
<pre><code class="language-cpp">struct Square {
    static constexpr int operator()(int x) { return x * x; }   // C++23: static
};
</code></pre>
<hr />
<h2 id="8-compiler-support-2026">8. Compiler support (2026)</h2>
<pre><code>   Deducing this      : GCC 14+, Clang 18+, MSVC 19.32+
   if consteval       : GCC 12+, Clang 14+, MSVC 19.32+
   operator&lt;=&gt; default: GCC 10+, Clang 10+ (C++20)
   multidim operator[]: GCC 12+, Clang 15+ (as extension earlier)
   auto(x)            : GCC 12+, Clang 15+
   std::expected      : GCC 12+, Clang 16+ (libc++ 16)
   std::mdspan        : GCC 14+ / recent libstdc++, Clang w/ recent libc++
   std::print         : GCC 14+, Clang 18+ (partial), MSVC recent
</code></pre>
<p>Build C++23 examples with <code>-std=c++23</code> (or <code>-std=c++2b</code> on slightly older
toolchains).</p>
<hr />
<h2 id="9-worked-example-one-getter-for-all-qualifications">9. Worked example: one getter for all qualifications</h2>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;utility&gt;
#include &lt;string&gt;

class Config {
    std::string name_ = &quot;default&quot;;
public:
    // deducing this: single function serves &amp;, const&amp;, &amp;&amp;, const&amp;&amp;
    template &lt;class Self&gt;
    auto&amp;&amp; name(this Self&amp;&amp; self) {
        return std::forward&lt;Self&gt;(self).name_;
    }
};

int main() {
    Config c;
    c.name() = &quot;runtime&quot;;                 // returns std::string&amp;  (mutable)
    std::cout &lt;&lt; c.name() &lt;&lt; '\\n';         // runtime

    const Config cc;
    std::cout &lt;&lt; cc.name() &lt;&lt; '\\n';        // returns const std::string&amp;
    // cc.name() = &quot;x&quot;;                    // would not compile (const)

    std::string taken = std::move(Config{}).name();   // returns std::string&amp;&amp;
    std::cout &lt;&lt; taken &lt;&lt; '\\n';            // default
}
</code></pre>
<p>Runnable: <a href="examples/ch14_deducing_this.cpp"><code>examples/ch14_deducing_this.cpp</code></a>.</p>
<hr />
<h2 id="10-summary">10. Summary</h2>
<div class="diagram"><div class="diagram-title">C++23 template features</div><div class="dbox green"><div class="dbox-title">Key points</div><div class="dtext"><b>Deducing this:</b> <code>template&lt;class Self&gt; ret f(this Self&amp;&amp; self){...}</code></div><div class="dtext">One function for <code>&amp;</code>/<code>const&amp;</code>/<code>&amp;&amp;</code>/<code>const&amp;&amp;</code></div><div class="dtext">Replaces CRTP (no <code>static_cast</code>)</div><div class="dtext">Enables recursive lambdas <code>[](this auto self,...){...}</code></div><div class="dtext"><code>if consteval</code>: branch on constant-evaluation context</div><div class="dtext"><code>operator&lt;=&gt; = default</code>: generate all comparisons</div><div class="dtext"><code>auto(x)</code>: language-level decay-copy (safe copies in templates)</div><div class="dtext"><code>m[i, j]</code>: multidim subscript (<code>mdspan</code>, matrices)</div><div class="dtext"><code>std::mdspan</code>/<code>expected</code>: policy-based &amp; templated vocabulary types</div></div></div><details class="ascii-diagram"><summary>Details</summary><pre><code> +------------------------------------------------------------------+
