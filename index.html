<p>Deduction is the &ldquo;magic&rdquo; that lets you write <code>max(a, b)</code> instead of
<code>max&lt;int&gt;(a, b)</code>. Understanding the rules precisely is what separates people who
<em>use</em> templates from people who <em>master</em> them. This chapter is the compiler&rsquo;s
rulebook, translated to English + diagrams.</p>
<hr />
<h2 id="1-the-core-idea">1. The core idea</h2>
<p>For a function template, the compiler matches each <strong>parameter type</strong> <code>P</code>
against the corresponding <strong>argument type</strong> <code>A</code>, and solves for the template
parameters.</p>
<pre><code>   template &lt;class T&gt; void f(P);      call:  f(expr);   // expr has type A
                          ^                        ^
                       parameter                argument
   Solve:  P  ==?==  A     --&gt;     deduce T
</code></pre>
<p>Example:</p>
<pre><code>   template&lt;class T&gt; void f(T x);       f(42);
                        P = T           A = int
   Match T with int  -&gt;  T = int
</code></pre>
<hr />
<h2 id="2-deduction-strips-top-level-things--three-canonical-forms">2. Deduction strips top-level things — three canonical forms</h2>
<p>The parameter&rsquo;s <em>form</em> controls what happens. Memorize these three:</p>
<pre><code>  FORM A:  by value        template&lt;class T&gt; void f(T  x);
  FORM B:  by ref/const-ref template&lt;class T&gt; void f(T&amp; x); / f(const T&amp; x);
  FORM C:  by forwarding ref template&lt;class T&gt; void f(T&amp;&amp; x);   // special!
</code></pre>
<h3 id="form-a--ft-x-by-value">FORM A — <code>f(T x)</code> (by value)</h3>
<p>Deduction <strong>decays</strong> the argument: strips <code>const</code>/<code>volatile</code>, strips references,
arrays-&gt;pointers, functions-&gt;pointers.</p>
<pre><code class="language-cpp">template &lt;class T&gt; void f(T x);

int         i = 0;
const int   ci = 0;
int&amp;        ri = i;
const int&amp;  cri = ci;
int         arr[5];

f(i);    // T = int
f(ci);   // T = int      (const stripped — you get a COPY, so who cares)
f(ri);   // T = int      (reference stripped)
f(cri);  // T = int      (both stripped)
f(arr);  // T = int*     (array decays to pointer)
f(&quot;hi&quot;); // T = const char*  (array of const char decays)
</code></pre>
<pre><code>   A (argument type)     ---decay---&gt;   T
   const int&amp;                            int
   int[5]                                int*
   const char[3]                         const char*
   void()                                void(*)()
</code></pre>
<p>Rule: <strong>by-value parameters ignore top-level const and references.</strong> Because you
copy anyway.</p>
<h3 id="form-b--ft-x-and-fconst-t-x">FORM B — <code>f(T&amp; x)</code> and <code>f(const T&amp; x)</code></h3>
<p>References <strong>preserve</strong> const (they don&rsquo;t decay arrays either).</p>
<pre><code class="language-cpp">template &lt;class T&gt; void g(T&amp; x);
template &lt;class T&gt; void h(const T&amp; x);

int i = 0; const int ci = 0; int arr[5];

g(i);    // T = int         -&gt; param int&amp;
g(ci);   // T = const int   -&gt; param const int&amp;   (const PRESERVED)
g(arr);  // T = int[5]      -&gt; param int(&amp;)[5]     (array NOT decayed!)
// g(42);  // ERROR: cannot bind non-const T&amp; to rvalue 42

h(i);    // T = int         -&gt; const int&amp;
h(ci);   // T = int         -&gt; const int&amp;  (const is in the param, not in T)
h(42);   // T = int         -&gt; const int&amp;  (const ref binds to rvalue: OK)
</code></pre>
<pre><code>   g(T&amp;):   const in A  -&gt;  const ends up IN T
   h(const T&amp;): the const is already in the param, so T is the &quot;bare&quot; type
</code></pre>
<p>This is why <code>const T&amp;</code> is the workhorse parameter for read-only generic code:
it binds to everything (lvalues, rvalues, const, non-const) and <code>T</code> comes out
as the clean underlying type.</p>
<h3 id="form-c--ft-x-forwarding--universal-reference">FORM C — <code>f(T&amp;&amp; x)</code> (forwarding / &ldquo;universal&rdquo; reference)</h3>
<p><strong>Only when <code>T</code> is a template parameter being deduced</strong>, <code>T&amp;&amp;</code> is a <em>forwarding
reference</em> with special rules:</p>
<pre><code>   If argument is an LVALUE of type X:   T = X&amp;    (reference!)
   If argument is an RVALUE of type X:   T = X
   Then reference collapsing gives the final parameter type.
</code></pre>
<pre><code class="language-cpp">template &lt;class T&gt; void fwd(T&amp;&amp; x);

int i = 0; const int ci = 0;

fwd(i);    // lvalue int       -&gt; T = int&amp;        -&gt; param int&amp;
fwd(ci);   // lvalue const int -&gt; T = const int&amp;  -&gt; param const int&amp;
fwd(42);   // rvalue int       -&gt; T = int         -&gt; param int&amp;&amp;
</code></pre>
<pre><code>   Reference collapsing table (how X&amp; / X&amp;&amp; combine):
     T = X&amp;   , T&amp;&amp;  -&gt;  X&amp;      (&amp; wins)
     T = X&amp;&amp;  , T&amp;&amp;  -&gt;  X&amp;&amp;
     T = X    , T&amp;&amp;  -&gt;  X&amp;&amp;
   Rule: &quot;&amp; is contagious.&quot; Any &amp; involved -&gt; lvalue reference.
</code></pre>
<p>This is the machinery behind <strong>perfect forwarding</strong> — full treatment in
<a href="09-perfect-forwarding.md">09-perfect-forwarding.md</a>. The key deduction fact:
<strong>for <code>T&amp;&amp;</code>, an lvalue makes <code>T</code> an lvalue reference type.</strong></p>
<hr />
<h2 id="3-deduction-with-nestedcompound-parameters">3. Deduction with nested/compound parameters</h2>
<p>Deduction descends into structure. The parameter pattern is matched piecewise.</p>
<pre><code class="language-cpp">template &lt;class T&gt; void f(std::vector&lt;T&gt; v);
f(std::vector&lt;int&gt;{});      // T = int

template &lt;class T&gt; void g(T* p);
int i; g(&amp;i);               // T = int

template &lt;class K, class V&gt; void h(std::map&lt;K, V&gt; m);
h(std::map&lt;std::string, int&gt;{});   // K = std::string, V = int

template &lt;class T, std::size_t N&gt; void arr(T (&amp;a)[N]);   // deduce array size!
int data[10]; arr(data);    // T = int, N = 10
</code></pre>
<pre><code>   Pattern:  std::map&lt; K , V &gt;
   Arg:      std::map&lt;string,int&gt;
   Align:    K&lt;-&gt;string   V&lt;-&gt;int    -&gt; deduced.

   Pattern:  T (&amp;a)[N]    (reference to array of N T)
   Arg:      int[10]
   Align:    T&lt;-&gt;int, N&lt;-&gt;10
</code></pre>
<p>The array-size trick (<code>T(&amp;)[N]</code>) is how you write a <code>countof</code> that can&rsquo;t be
fooled by pointers:</p>
<pre><code class="language-cpp">template &lt;class T, std::size_t N&gt;
constexpr std::size_t countof(const T (&amp;)[N]) { return N; }
</code></pre>
<hr />
<h2 id="4-non-deduced-contexts">4. Non-deduced contexts</h2>
<p>Some positions <strong>cannot</strong> be deduced; the type must come from elsewhere
(explicit argument or default).</p>
<pre><code>  NON-DEDUCED CONTEXTS (common ones):
    * The left of ::   -&gt;  typename Foo&lt;T&gt;::type    (T not deducible from ::type)
    * A default argument
    * A non-type parameter used in an expression:  std::array&lt;T, N+1&gt;
    * The type of a NTTP referenced in an expression
</code></pre>
<pre><code class="language-cpp">template &lt;class T&gt; struct Id { using type = T; };

template &lt;class T&gt; void f(typename Id&lt;T&gt;::type x);   // T is NON-deduced here
// f(42);            // ERROR: can't deduce T
f&lt;int&gt;(42);          // OK: T given explicitly
</code></pre>
<pre><code>   typename Id&lt;T&gt;::type
                 ^^^^
   You can't run &quot;::type&quot; backwards to find T (many T could yield the same
   ::type). So this position is non-deduced.
</code></pre>
<p>This is actually <em>useful</em>: it lets you make a parameter &ldquo;identity&rdquo; so it does not
participate in deduction, forcing the caller to specify or letting another
parameter drive deduction. <code>std::type_identity_t&lt;T&gt;</code> (C++20) does exactly this.</p>
<pre><code class="language-cpp">template &lt;class T&gt;
void clamp_to(T&amp; value, std::type_identity_t&lt;T&gt; lo, std::type_identity_t&lt;T&gt; hi);
// T is deduced ONLY from 'value'; lo/hi convert to T without fighting deduction.
</code></pre>
<hr />
<h2 id="5-auto-uses-template-deduction-rules">5. <code>auto</code> uses template deduction rules</h2>
<p><code>auto</code> variable deduction follows the <strong>same</strong> rules as FORM A/B/C (with one
exception for braced-init).</p>
<pre><code class="language-cpp">auto        x = ci;    // like FORM A: x is int (const stripped)
auto&amp;       y = ci;    // like FORM B: y is const int&amp;
auto&amp;&amp;      z = 42;    // like FORM C: forwarding ref -&gt; int&amp;&amp;
const auto&amp; w = 42;    // const int&amp;
</code></pre>
<pre><code>   auto   x = expr;   ~  template&lt;class T&gt; f(T)   -&gt; decays
   auto&amp;  x = expr;   ~  template&lt;class T&gt; f(T&amp;)  -&gt; preserves
   auto&amp;&amp; x = expr;   ~  template&lt;class T&gt; f(T&amp;&amp;) -&gt; forwarding
</code></pre>
<p><strong>Exception:</strong> braced initializer.</p>
<pre><code class="language-cpp">auto a = {1, 2, 3};   // a is std::initializer_list&lt;int&gt;   (special auto rule)
auto b{1};            // b is int   (C++17 fixed this single-element case)
// template&lt;class T&gt; void f(T);  f({1,2,3});  // ERROR: can't deduce from braces
</code></pre>
<p>Template functions <strong>cannot</strong> deduce <code>T</code> from a braced-init-list, but <code>auto</code>
can. This asymmetry trips people up.</p>
<hr />
<h2 id="6-decltype-vs-auto-deduction-that-doesnt-decay">6. <code>decltype</code> vs <code>auto</code> (deduction that <em>doesn&rsquo;t</em> decay)</h2>
<p><code>decltype(expr)</code> reports the <em>declared</em> type exactly, including references and
const — it does <strong>not</strong> decay. <code>decltype(auto)</code> uses those rules for deduction.</p>
<pre><code class="language-cpp">int i = 0; const int&amp; cr = i;

auto           a = cr;      // int         (decays)
decltype(cr)   b = cr;      // const int&amp;  (exact)
decltype(auto) c = cr;      // const int&amp;  (exact, like decltype)
decltype(auto) d = i;       // int
decltype(auto) e = (i);     // int&amp;   &lt;-- '(i)' is an lvalue expression!
</code></pre>
<pre><code>   decltype(name)   -&gt; the declared type of the entity
   decltype( (expr) ) -&gt; adds &amp; for lvalue expressions:
        lvalue   -&gt; T&amp;
        xvalue   -&gt; T&amp;&amp;
        prvalue  -&gt; T
</code></pre>
<p><code>decltype(auto)</code> return type is essential for perfect <em>return</em> forwarding — you
want to return exactly what the wrapped call returns (value or reference).</p>
<pre><code class="language-cpp">template &lt;class F, class... Args&gt;
decltype(auto) invoke_log(F&amp;&amp; f, Args&amp;&amp;... args) {
    return std::forward&lt;F&gt;(f)(std::forward&lt;Args&gt;(args)...);  // preserves ref-ness
}
</code></pre>
<hr />
<h2 id="7-overload-resolution-vs-deduction-theyre-different-steps">7. Overload resolution vs deduction (they&rsquo;re different steps!)</h2>
<pre><code>   STEP 1: DEDUCTION      (per candidate template)  -&gt; produces a concrete
                            signature, or FAILS (SFINAE — chapter 07)
   STEP 2: OVERLOAD RES.  (among all viable candidates) -&gt; pick best
</code></pre>
<p>A deduction <strong>failure</strong> is not an error if other candidates exist — it just
removes that candidate. This is the foundation of SFINAE
(<a href="07-sfinae.md">07-sfinae.md</a>).</p>
<hr />
<h2 id="8-class-template-argument-deduction-recap-c17">8. Class Template Argument Deduction recap (C++17)</h2>
<p>CTAD (chapter 02 §7) deduces <em>class</em> template args from the constructor call,
using the constructors (and deduction guides) as an implicit set of function
templates, then running normal function-template deduction + overload
resolution on them.</p>
<pre><code>   std::pair p{1, 2.5};
        |
   synthesize function templates from pair's ctors + guides
        |
   deduce as if calling  make_pair(1, 2.5)   -&gt; pair&lt;int, double&gt;
</code></pre>
<hr />
<h2 id="9-debugging-deduction-make-the-compiler-tell-you-t">9. Debugging deduction: make the compiler tell you <code>T</code></h2>
<p>A classic trick — declare an incomplete template and instantiate it with the
type you want revealed; the error message prints the deduced type:</p>
<pre><code class="language-cpp">template &lt;class T&gt; struct TypeShow;   // no definition on purpose

template &lt;class T&gt; void probe(T&amp;&amp; x) {
    TypeShow&lt;T&gt; _;                    // ERROR message contains T
    TypeShow&lt;decltype(x)&gt; __;         // and the exact param type
}
// probe(some_expr);  -&gt; read the compiler error to see T and decltype(x)
</code></pre>
<pre><code>   error: implicit instantiation of undefined template 'TypeShow&lt;int&amp;&gt;'
                                                                 ^^^^^^
                                                        &lt;- T was deduced int&amp;
</code></pre>
<p>Runnable: <a href="examples/ch04_deduction_probe.cpp"><code>examples/ch04_deduction_probe.cpp</code></a>.</p>

<h2 id="10-cheat-table">10. Cheat table</h2>
<pre><code>  PARAMETER      ARGUMENT        DEDUCED T        FINAL PARAM TYPE
  -----------    ------------    -------------    ----------------
  T (by value)   int             int              int
  T (by value)   const int&amp;      int              int          (decays)
  T (by value)   int[5]          int*             int*         (decays)

  T&amp;             const int       const int        const int&amp;
  const T&amp;       const int       int              const int&amp;
  T&amp;&amp;            int lvalue      int&amp;             int&amp;         (fwd ref)
  T&amp;&amp;            int rvalue      int              int&amp;&amp;        (fwd ref)
  vector&lt;T&gt;      vector&lt;int&gt;     int              vector&lt;int&gt;
  T(&amp;)[N]        int[10]         T=int, N=10      int(&amp;)[10]
</code></pre>
<h2 id="11-summary">11. Summary</h2>
<div class="diagram"><div class="diagram-title">Template argument deduction</div><div class="dbox green"><div class="dbox-title">Key points</div><div class="dtext">Deduction matches PARAMETER pattern P against ARGUMENT type A</div><div class="dtext">by value (<code>T</code>) → <b>decays</b> (drops const/ref/array)</div><div class="dtext">by ref (<code>T&amp;</code>) → preserves const, no decay</div><div class="dtext">fwd ref (<code>T&amp;&amp;</code>) → lvalue ⇒ <code>T</code> is a reference (collapsing)</div><div class="dtext">Some positions are <b>non-deduced</b> (left of <code>::</code>, expressions)</div><div class="dtext">Templates can't deduce from <code>{braces}</code>; <code>auto</code> can (<code>init_list</code>)</div><div class="dtext"><code>decltype</code>/<code>decltype(auto)</code> preserve exact type (no decay)</div><div class="dtext">Deduction failure ≠ error (SFINAE)</div></div></div><details class="ascii-diagram"><summary>Details</summary><pre><code> +------------------------------------------------------------------+
 | Deduction matches PARAMETER pattern P against ARGUMENT type A.   |
 |                                                                  |
 | by value  (T)     -&gt; DECAYS (drops const/ref/array).             |
 | by ref    (T&amp;)    -&gt; preserves const, no decay.                  |
 | fwd ref   (T&amp;&amp;)   -&gt; lvalue =&gt; T is a reference (collapsing).    |
 |                                                                  |
 | Some positions are NON-deduced (left of ::, expressions).        |
 | Templates can't deduce from {braces}; auto can (init_list).      |
 | decltype/decltype(auto) preserve exact type (no decay).          |

 +------------------------------------------------------------------+</code></pre></details>

  { name: `7. Specialization`, path: `05-specialization.md`, dir: ``, words: 1410, mins: 7, body: `<h1 id="05--template-specialization-full--partial">05 — Template Specialization (Full &amp; Partial)</h1>
<p>Specialization lets you say: <em>&ldquo;for this particular argument (or family of
arguments), do something different.&rdquo;</em> It is how <code>std::vector&lt;bool&gt;</code> is a bit-set,
how type traits work, and how you customize behavior per type.</p>
<hr />
<h2 id="1-the-vocabulary">1. The vocabulary</h2>
<pre><code>  PRIMARY TEMPLATE      the general recipe
  FULL SPECIALIZATION   a recipe for ONE specific argument set (template&lt;&gt;)
  PARTIAL SPECIALIZATION a recipe for a FAMILY (still has template params)
</code></pre>
<pre><code>   template&lt;class T&gt; struct S      ;   // PRIMARY
   template&lt;&gt;        struct S&lt;int&gt; ;   // FULL: exactly int
   template&lt;class T&gt; struct S&lt;T*&gt;  ;   // PARTIAL: any pointer
</code></pre>
<p>Only <strong>class templates</strong> (and variable templates) can be <em>partially</em>
specialized. <strong>Function templates cannot</strong> be partially specialized — you
overload instead (§6).</p>
<hr />
<h2 id="2-full-specialization">2. Full specialization</h2>
<pre><code class="language-cpp">template &lt;class T&gt;            // primary
struct TypeName {
    static const char* get() { return &quot;unknown&quot;; }
};

template &lt;&gt;                   // full specialization for int
struct TypeName&lt;int&gt; {
    static const char* get() { return &quot;int&quot;; }
};

template &lt;&gt;                   // for double
struct TypeName&lt;double&gt; {
    static const char* get() { return &quot;double&quot;; }
};
</code></pre>
<pre><code>   TypeName&lt;int&gt;::get()     -&gt; &quot;int&quot;      (uses specialization)
   TypeName&lt;double&gt;::get()  -&gt; &quot;double&quot;   (uses specialization)
   TypeName&lt;char&gt;::get()    -&gt; &quot;unknown&quot;  (falls back to primary)
</code></pre>
<p>Selection is like a lookup: the compiler picks the most specific matching
version.</p>
<pre><code>              TypeName&lt;char&gt;
                    |
        is there a full spec for char? --no--&gt; use primary  -&gt; &quot;unknown&quot;

              TypeName&lt;int&gt;
                    |
        is there a full spec for int?  --yes--&gt; &quot;int&quot;
</code></pre>
<h3 id="a-specialization-can-have-a-completely-different-bodylayout">A specialization can have a <em>completely different</em> body/layout</h3>
<pre><code class="language-cpp">template &lt;class T&gt;
struct Storage { T value; };          // holds a T

template &lt;&gt;
struct Storage&lt;bool&gt; {                // totally different implementation
    unsigned char bits;               // pack bools tightly, etc.
    void set(bool b) { bits = b; }
};
</code></pre>
<p>The specialization need not share members with the primary. <code>std::vector&lt;bool&gt;</code>
famously does this (and famously causes surprises).</p>
<hr />
<h2 id="3-partial-specialization">3. Partial specialization</h2>
<p>Applies to a <strong>pattern</strong> of arguments while keeping some parameters open.</p>
<pre><code class="language-cpp">template &lt;class T&gt;
struct IsPointer            { static constexpr bool value = false; };

template &lt;class T&gt;
struct IsPointer&lt;T*&gt;        { static constexpr bool value = true; };  // any T*

// usage
static_assert(!IsPointer&lt;int&gt;::value);
static_assert( IsPointer&lt;int*&gt;::value);
static_assert( IsPointer&lt;double*&gt;::value);
</code></pre>
<pre><code>   IsPointer&lt;int&gt;    matches primary          -&gt; false
   IsPointer&lt;int*&gt;   matches T* (T=int)        -&gt; true
   IsPointer&lt;char**&gt; matches T* (T=char*)      -&gt; true
</code></pre>
<p>More patterns:</p>
<pre><code class="language-cpp">template &lt;class T&gt; struct Traits;                       // primary (undefined)
template &lt;class T&gt; struct Traits&lt;const T&gt; { /* strip const */ };
template &lt;class T&gt; struct Traits&lt;T&amp;&gt;      { /* ref */ };
template &lt;class T, class U&gt; struct Traits&lt;std::pair&lt;T,U&gt;&gt; { /* pairs */ };
template &lt;class T, std::size_t N&gt; struct Traits&lt;T[N]&gt; { /* arrays, know N */ };
</code></pre>
<pre><code>   Pattern              Matches                       Binds
   const T              const X                       T = X
   T&amp;                   X&amp;                            T = X
   std::pair&lt;T,U&gt;       std::pair&lt;A,B&gt;                T=A, U=B
   T[N]                 X[k]                          T=X, N=k
</code></pre>
<p>This is <em>the</em> mechanism behind <code>&lt;type_traits&gt;</code>
(<a href="08-type-traits.md">08-type-traits.md</a>).</p>
<hr />
<h2 id="4-how-the-compiler-chooses-among-partial-specializations">4. How the compiler chooses among partial specializations</h2>
<p>When multiple partial specializations match, the compiler picks the <strong>most
specialized</strong> using <em>partial ordering</em> (roughly: &ldquo;if spec A can handle
everything B can, but not vice versa, then B is more specialized&rdquo;).</p>
<pre><code class="language-cpp">template &lt;class T&gt;            struct S      { int id = 0; };  // primary
template &lt;class T&gt;            struct S&lt;T*&gt;  { int id = 1; };  // any pointer
template &lt;&gt;                   struct S&lt;int*&gt;{ int id = 2; };  // exactly int*
</code></pre>
<pre><code>   S&lt;double*&gt;   -&gt; matches primary? yes. matches T*? yes.  -&gt; T* wins (id 1)
   S&lt;int*&gt;      -&gt; matches primary, T*, AND full&lt;int*&gt;     -&gt; full wins (id 2)
   S&lt;double&gt;    -&gt; only primary                            -&gt; id 0

   Specialization ladder (most specific first):
       S&lt;int*&gt;  &gt;  S&lt;T*&gt;  &gt;  S&lt;T&gt;
</code></pre>
<p>If two partial specs match and neither is more specialized -&gt; <strong>ambiguous
error</strong>.</p>
<hr />
<h2 id="5-variable-template-specialization-c14">5. Variable template specialization (C++14)</h2>
<p>Variable templates can be specialized too — this is the modern idiom for trait
<em>values</em>:</p>
<pre><code class="language-cpp">template &lt;class T&gt; constexpr bool is_void_v = false;   // primary
template &lt;&gt;        constexpr bool is_void_v&lt;void&gt; = true;  // full spec

template &lt;class T&gt; constexpr int rank_v = 0;               // primary
template &lt;class T&gt; constexpr int rank_v&lt;T[]&gt;  = 1;         // partial
template &lt;class T, std::size_t N&gt; constexpr int rank_v&lt;T[N]&gt; = 1;  // partial
</code></pre>
<pre><code>   is_void_v&lt;int&gt;   -&gt; false
   is_void_v&lt;void&gt;  -&gt; true
   rank_v&lt;int&gt;      -&gt; 0
   rank_v&lt;int[]&gt;    -&gt; 1
</code></pre>
<hr />
<h2 id="6-why-functions-use-overloading-not-partial-specialization">6. Why functions use OVERLOADING, not partial specialization</h2>
<p>You <em>can</em> fully specialize a function template, but you <strong>cannot</strong> partially
specialize it. And even full specialization behaves surprisingly:</p>
<pre><code class="language-cpp">template &lt;class T&gt; void f(T)  { std::puts(&quot;primary&quot;); }
template &lt;class T&gt; void f(T*) { std::puts(&quot;overload for T*&quot;); } // OVERLOAD, not spec
template &lt;&gt;        void f&lt;int&gt;(int) { std::puts(&quot;full spec int&quot;); }
</code></pre>
<p>The subtle trap (Sutter&rsquo;s &ldquo;gotcha&rdquo;): a full specialization attaches to whichever
<strong>primary/overload</strong> was selected <em>first</em> by overload resolution, which can
route your specialization somewhere you didn&rsquo;t intend. <strong>Rule:</strong></p>
<blockquote>
<p>For functions, express variation with <strong>overloads</strong> (and, in modern code,
<strong>concepts</strong>/<code>if constexpr</code>). Reserve specialization for <strong>class/variable
templates</strong>.</p>
</blockquote>
<pre><code>   Function customization      Preferred tool
   ------------------------     -----------------------------
   &quot;different type category&quot;    overload set
   &quot;compile-time branch&quot;        if constexpr (chapter 12)
   &quot;constrain applicability&quot;    concepts (chapter 13) / SFINAE (07)
   class trait value            variable/class template specialization
</code></pre>
<hr />
<h2 id="7-tag-dispatch--specializations-cousin">7. Tag dispatch — specialization&rsquo;s cousin</h2>
<p>Before <code>if constexpr</code>/concepts, the way to select an implementation at compile
time based on a <em>property</em> was <strong>tag dispatch</strong>: pick an overload using a small
empty &ldquo;tag&rdquo; type derived from a trait.</p>
<pre><code class="language-cpp">#include &lt;iterator&gt;
#include &lt;type_traits&gt;

// Two implementations, selected by iterator category tag:
template &lt;class It, class Dist&gt;
void advance_impl(It&amp; it, Dist n, std::random_access_iterator_tag) {
    it += n;                              // O(1) for vectors
}
template &lt;class It, class Dist&gt;
void advance_impl(It&amp; it, Dist n, std::input_iterator_tag) {
    while (n-- &gt; 0) ++it;                 // O(n) for lists
}

template &lt;class It, class Dist&gt;
void my_advance(It&amp; it, Dist n) {
    // pick the overload by constructing the category tag:
    advance_impl(it, n,
                 typename std::iterator_traits&lt;It&gt;::iterator_category{});
}
</code></pre>
<pre><code>   my_advance(vec_it, 5)
        |
        category = random_access_iterator_tag
        |
        v  overload resolution matches the random-access overload
   it += 5      (fast path)

   my_advance(list_it, 5)
        |
        category = bidirectional -&gt; derives from input_iterator_tag
        |
        v
   loop ++it 5 times   (slow path)
</code></pre>
<p>This is exactly how <code>std::advance</code>, <code>std::distance</code>, etc. were historically
implemented. In modern C++ you&rsquo;d often write <code>if constexpr</code> or constrained
overloads instead, but tag dispatch is still everywhere in the standard library
and worth recognizing.</p>
<hr />
<h2 id="8-if-constexpr--the-modern-alternative-to-many-specializations">8. <code>if constexpr</code> — the modern alternative to many specializations</h2>
<p>Instead of writing two class specializations or overloads, branch inside one
function; the false branch is <em>discarded</em> (not compiled for that instantiation):</p>
<pre><code class="language-cpp">template &lt;class T&gt;
std::string describe(const T&amp; x) {
    if constexpr (std::is_integral_v&lt;T&gt;) {
        return &quot;integer: &quot; + std::to_string(x);
    } else if constexpr (std::is_floating_point_v&lt;T&gt;) {
        return &quot;float: &quot; + std::to_string(x);
    } else {
        return &quot;other&quot;;
    }
}
</code></pre>
<pre><code>   describe(42)      -&gt; integral branch kept, others DISCARDED
   describe(3.14)    -&gt; float branch kept
   describe(&quot;hi&quot;)    -&gt; else branch kept
   The discarded branches are not type-checked against T -&gt; no errors.
</code></pre>
<p>Full treatment in <a href="12-constexpr-consteval.md">12-constexpr-consteval.md</a>.</p>
<hr />
<h2 id="9-worked-example-serialize-with-class-template-specialization">9. Worked example: serialize with class-template specialization</h2>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;vector&gt;

template &lt;class T&gt;
struct Serializer {
    static std::string to_str(const T&amp; v) { return std::to_string(v); }
};

template &lt;&gt;
struct Serializer&lt;std::string&gt; {
    static std::string to_str(const std::string&amp; v) { return '&quot;' + v + '&quot;'; }
};

template &lt;class T&gt;
struct Serializer&lt;std::vector&lt;T&gt;&gt; {          // partial spec for any vector
    static std::string to_str(const std::vector&lt;T&gt;&amp; v) {
        std::string out = &quot;[&quot;;
        for (std::size_t i = 0; i &lt; v.size(); ++i) {
            out += Serializer&lt;T&gt;::to_str(v[i]);          // recurse!
            if (i + 1 &lt; v.size()) out += &quot;, &quot;;
        }
        return out + &quot;]&quot;;
    }
};

template &lt;class T&gt;
std::string serialize(const T&amp; v) { return Serializer&lt;T&gt;::to_str(v); }

int main() {
    std::cout &lt;&lt; serialize(42) &lt;&lt; '\\n';                     // 42
    std::cout &lt;&lt; serialize(std::string(&quot;hi&quot;)) &lt;&lt; '\\n';      // &quot;hi&quot;
    std::cout &lt;&lt; serialize(std::vector&lt;int&gt;{1,2,3}) &lt;&lt; '\\n';// [1, 2, 3]
    std::vector&lt;std::vector&lt;int&gt;&gt; nested{{1,2},{3}};
    std::cout &lt;&lt; serialize(nested) &lt;&lt; '\\n';                 // [[1, 2], [3]]
}
</code></pre>
<pre><code>   serialize(nested)
      Serializer&lt;vector&lt;vector&lt;int&gt;&gt;&gt;          (partial spec)
        -&gt; for each element Serializer&lt;vector&lt;int&gt;&gt;   (partial spec)
             -&gt; for each element Serializer&lt;int&gt;       (primary)
   Recursion via specialization dispatch.
</code></pre>
<p>Runnable: <a href="examples/ch05_serialize.cpp"><code>examples/ch05_serialize.cpp</code></a>.</p>
<hr />
<h2 id="10-summary">10. Summary</h2>
<div class="diagram"><div class="diagram-title">Specialization</div><div class="dbox green"><div class="dbox-title">Key points</div><div class="dtext"><b>Full spec:</b> <code>template&lt;&gt; struct S&lt;int&gt; {...};</code> (one type)</div><div class="dtext"><b>Partial spec:</b> <code>template&lt;class T&gt; struct S&lt;T*&gt; {...};</code> (a family)</div><div class="dtext">Classes &amp; variable templates only (<b>not</b> functions)</div><div class="dtext">Most-specialized match wins; ties = ambiguous</div><div class="dtext">Functions → use <b>overloads</b> / <code>if constexpr</code> / concepts, not spec</div><div class="dtext">Tag dispatch: classic compile-time selection via trait tags</div><div class="dtext"><code>if constexpr</code>: modern one-function alternative</div></div></div><details class="ascii-diagram"><summary>Details</summary><pre><code> +------------------------------------------------------------------+
 | FULL spec:    template&lt;&gt; struct S&lt;int&gt; {...};   (one type)       |
 | PARTIAL spec: template&lt;class T&gt; struct S&lt;T*&gt; {...}; (a family)   |
 |   - classes &amp; variable templates only (NOT functions)            |
 |   - most-specialized match wins; ties = ambiguous                |
 |                                                                  |
 | Functions -&gt; use OVERLOADS / if constexpr / concepts, not spec.  |
 | Tag dispatch: classic compile-time selection via trait tags.     |
 | if constexpr: modern one-function alternative.                   |
 +------------------------------------------------------------------+</code></pre></details>
<p>Next: <a href="06-variadic-templates.md">06-variadic-templates.md</a>.</p>` },
  { name: `8. Variadic Templates`, path: `06-variadic-templates.md`, dir: ``, words: 1297, mins: 6, body: `<h1 id="06--variadic-templates--parameter-packs">06 — Variadic Templates &amp; Parameter Packs</h1>
<p>Variadic templates take <strong>any number</strong> of template arguments. They are how
<code>std::tuple</code>, <code>std::make_unique</code>, <code>printf</code>-safe formatting, and <code>std::variant</code>
are built. This chapter makes packs intuitive.</p>
<hr />
<h2 id="1-the-three-pack-related-syntaxes">1. The three pack-related syntaxes</h2>
<pre><code>   template &lt;class... Ts&gt;   // 1. TEMPLATE parameter pack (declares Ts)
   void f(Ts... args);      // 2. FUNCTION parameter pack (declares args)
   //            args...    // 3. PACK EXPANSION (uses them, adds ...)
</code></pre>
<pre><code>   template &lt;class... Ts&gt;        Ts   = {int, double, char}   (a list of TYPES)
   void f(Ts... args)            args = {1,   2.0,    'x'}     (a list of VALUES)

   ...on the LEFT of a name  -&gt; &quot;this is a pack&quot;
   ...on the RIGHT (after use) -&gt; &quot;expand the pack here&quot;
</code></pre>
<p>Mnemonic: <strong><code>...</code> before = &ldquo;pack it&rdquo;; <code>...</code> after = &ldquo;unpack it&rdquo;.</strong></p>
<hr />
<h2 id="2-sizeof--how-many">2. <code>sizeof...</code> — how many?</h2>
<pre><code class="language-cpp">template &lt;class... Ts&gt;
constexpr std::size_t count(Ts... /*args*/) {
    return sizeof...(Ts);     // number of elements in the pack (compile time)
}
count(1, 2.0, 'x');           // 3
</code></pre>
<pre><code>   sizeof...(Ts)   -&gt; 3     (count of the TYPE pack)
   sizeof...(args) -&gt; 3     (count of the VALUE pack, same number)
</code></pre>
<hr />
<h2 id="3-pack-expansion-the-mental-model">3. Pack expansion: the mental model</h2>
<p>A pattern followed by <code>...</code> is <strong>repeated for each element</strong>, separated by
commas.</p>
<pre><code>   pattern...     where pattern mentions the pack

   f(args...)              -&gt;  f(a0, a1, a2)
   f(g(args)...)           -&gt;  f(g(a0), g(a1), g(a2))
   f(args + 1 ...)         -&gt;  f(a0+1, a1+1, a2+1)
   std::tuple&lt;Ts...&gt;       -&gt;  std::tuple&lt;T0, T1, T2&gt;
   h(std::forward&lt;Ts&gt;(args)...) -&gt; h(fwd&lt;T0&gt;(a0), fwd&lt;T1&gt;(a1), fwd&lt;T2&gt;(a2))
</code></pre>
<p>The pattern can be arbitrarily complex, as long as the pack appears in it.</p>
<pre><code class="language-cpp">template &lt;class... Ts&gt;
void print_all(Ts... args) {
    (std::cout &lt;&lt; ... &lt;&lt; args) &lt;&lt; '\\n';   // fold (see §5)
}
</code></pre>
<hr />
<h2 id="4-the-classic-recursion-pattern-pre-c17-and-still-useful">4. The classic recursion pattern (pre-C++17 and still useful)</h2>
<p>Before fold expressions, you processed packs with <strong>head/tail recursion</strong> and a
base case:</p>
<pre><code class="language-cpp">// base case: no arguments
void print() { std::cout &lt;&lt; '\\n'; }

// recursive case: peel off the FIRST argument, recurse on the REST
template &lt;class First, class... Rest&gt;
void print(const First&amp; first, const Rest&amp;... rest) {
    std::cout &lt;&lt; first;
    if (sizeof...(rest) &gt; 0) std::cout &lt;&lt; &quot;, &quot;;
    print(rest...);          // recurse with one fewer argument
}

print(1, 2.5, &quot;hi&quot;);         // 1, 2.5, hi
</code></pre>
<pre><code>   print(1, 2.5, &quot;hi&quot;)
     first=1, rest={2.5,&quot;hi&quot;}   -&gt; prints 1, -&gt;  print(2.5,&quot;hi&quot;)
                                                   first=2.5, rest={&quot;hi&quot;}
                                                     prints 2.5, -&gt; print(&quot;hi&quot;)
                                                        first=&quot;hi&quot;, rest={}
                                                          prints hi -&gt; print()
                                                                        prints \\n
   Each call strips one element until the base case.
</code></pre>
<pre><code>   Argument list shrinks by 1 each recursion:
     [1, 2.5, &quot;hi&quot;]  -&gt;  [2.5, &quot;hi&quot;]  -&gt;  [&quot;hi&quot;]  -&gt;  []  (base case)
</code></pre>
<hr />
<h2 id="5-fold-expressions-c17--the-modern-way">5. Fold expressions (C++17) — the modern way</h2>
<p>Fold expressions collapse a pack with a <strong>binary operator</strong>, no recursion
needed. Four forms:</p>
<pre><code>   ( pack op ... )            unary  RIGHT fold:  a0 op (a1 op (a2 op a3))
   ( ... op pack )            unary  LEFT  fold:  ((a0 op a1) op a2) op a3
   ( pack op ... op init )    binary RIGHT fold:  a0 op (a1 op (a2 op init))
   ( init op ... op pack )    binary LEFT  fold:  ((init op a0) op a1) op a2
</code></pre>
<pre><code class="language-cpp">template &lt;class... Ts&gt;
auto sum(Ts... xs) { return (xs + ... + 0); }     // binary left fold, init 0

template &lt;class... Ts&gt;
bool all_true(Ts... xs) { return (xs &amp;&amp; ...); }   // unary right fold

template &lt;class... Ts&gt;
void print(Ts... xs) { ((std::cout &lt;&lt; xs &lt;&lt; ' '), ...); } // comma fold
</code></pre>
<pre><code>   sum(1,2,3,4)      = ((((0)+1)+2)+3)+4 ... = 10   (empty pack -&gt; 0, safe)
   all_true(a,b,c)   = a &amp;&amp; (b &amp;&amp; c)
   print(1,'x',2.5)  = (cout&lt;&lt;1&lt;&lt;' '), (cout&lt;&lt;'x'&lt;&lt;' '), (cout&lt;&lt;2.5&lt;&lt;' ')
</code></pre>
<h3 id="why-the-init-value-matters-empty-packs">Why the init value matters (empty packs)</h3>
<pre><code>   Unary fold on EMPTY pack is only valid for &amp;&amp;, ||, and comma:
      (xs &amp;&amp; ...) on empty  -&gt; true
      (xs || ...) on empty  -&gt; false
      (xs , ...)  on empty  -&gt; void()
   For anything else (+, *, ...), an empty pack is ILL-FORMED.
   -&gt; use the BINARY form with an identity:  (xs + ... + 0)
</code></pre>
<h3 id="comma-fold-do-x-for-each-element">Comma fold: &ldquo;do X for each element&rdquo;</h3>
<p>The comma-fold idiom runs a statement per element — the workhorse for side
effects:</p>
<pre><code class="language-cpp">template &lt;class... Ts&gt;
void call_each(Ts&amp;&amp;... xs) {
    (void(some_action(std::forward&lt;Ts&gt;(xs))), ...);   // action per element, in order
}
</code></pre>
<hr />
<h2 id="6-where-packs-can-appear">6. Where packs can appear</h2>
<pre><code>   * function arguments:      f(Ts... args)
   * template argument lists:  std::tuple&lt;Ts...&gt;, Base&lt;Ts&gt;...
   * base class lists:         struct D : Bases... {};       (variadic bases!)
   * initializer lists:        int a[] = { xs... };
   * lambda captures (C++20):  [...xs = std::move(xs)]{}      (pack capture)
   * using-declarations:       using Bases::operator()...;    (C++17)
</code></pre>
<p>Variadic bases + <code>using</code> is the trick behind the <strong>overload-set / overloaded
visitor</strong> idiom for <code>std::variant</code>:</p>
<pre><code class="language-cpp">template &lt;class... Fs&gt;
struct overloaded : Fs... {           // inherit from every lambda
    using Fs::operator()...;          // bring all their operator() into scope
};
template &lt;class... Fs&gt; overloaded(Fs...) -&gt; overloaded&lt;Fs...&gt;;  // CTAD guide

// usage with std::visit:
// std::visit(overloaded{
//     [](int i){ ... },
//     [](const std::string&amp; s){ ... },
// }, my_variant);
</code></pre>
<pre><code>   overloaded{f1, f2, f3}
        inherits f1, f2, f3
        using f1::(), f2::(), f3::()  -&gt; one object with 3 call operators
        std::visit picks the matching operator() for the active alternative
</code></pre>
<hr />
<h2 id="7-indexing-a-pack-before-c26">7. Indexing a pack (before C++26)</h2>
<p>Packs have <strong>no direct subscript</strong> before C++26. Common workarounds:</p>
<pre><code class="language-cpp">// (a) via std::tuple + std::get
template &lt;std::size_t I, class... Ts&gt;
decltype(auto) nth(Ts&amp;&amp;... xs) {
    return std::get&lt;I&gt;(std::forward_as_tuple(std::forward&lt;Ts&gt;(xs)...));
}
nth&lt;1&gt;(10, 20, 30);   // 20
</code></pre>
<p>C++26 finally adds <strong>native pack indexing</strong> — see
<a href="15-cpp26-features.md">15-cpp26-features.md</a>:</p>
<pre><code class="language-cpp">// C++26:
template &lt;class... Ts&gt;
auto first(Ts... xs) { return xs...[0]; }     // direct pack indexing!
</code></pre>
<pre><code>   Pre-C++26:  xs...[0]  did NOT exist -&gt; tuple gymnastics
   C++26:      xs...[0], Ts...[0]  are built in.
</code></pre>
<hr />
<h2 id="8-multiple-packs--zipping">8. Multiple packs &amp; zipping</h2>
<p>You can expand two packs together if they have the <strong>same length</strong>; the pattern
must mention both:</p>
<pre><code class="language-cpp">template &lt;class... As, class... Bs&gt;
void zip_print(std::tuple&lt;As...&gt; a, std::tuple&lt;Bs...&gt; b);   // (illustrative)

// Common real pattern: index_sequence to iterate a tuple
template &lt;class Tuple, std::size_t... Is&gt;
void print_tuple_impl(const Tuple&amp; t, std::index_sequence&lt;Is...&gt;) {
    ((std::cout &lt;&lt; std::get&lt;Is&gt;(t) &lt;&lt; ' '), ...);   // expand Is pack
}
template &lt;class... Ts&gt;
void print_tuple(const std::tuple&lt;Ts...&gt;&amp; t) {
    print_tuple_impl(t, std::index_sequence_for&lt;Ts...&gt;{});
}
</code></pre>
<pre><code>   std::index_sequence_for&lt;int,char,double&gt;{}  ==  index_sequence&lt;0,1,2&gt;
        |
   print_tuple_impl(t, index_sequence&lt;0,1,2&gt;)
        Is... = 0,1,2
        (cout&lt;&lt;get&lt;0&gt;(t)), (cout&lt;&lt;get&lt;1&gt;(t)), (cout&lt;&lt;get&lt;2&gt;(t))
</code></pre>
<p><code>std::index_sequence</code> / <code>std::make_index_sequence</code> (C++14) are the standard tool
to turn a pack into compile-time indices — essential for tuple manipulation.</p>
<hr />
<h2 id="9-variadic-class-template-a-tiny-tuple">9. Variadic class template: a tiny tuple</h2>
<pre><code class="language-cpp">// Recursive tuple: a head element + a tuple of the rest.
template &lt;class... Ts&gt; struct Tuple;                 // primary decl

template &lt;&gt;                                          // base: empty tuple
struct Tuple&lt;&gt; {};

template &lt;class Head, class... Tail&gt;                 // recursive layout
struct Tuple&lt;Head, Tail...&gt; : Tuple&lt;Tail...&gt; {
    Head head;
    Tuple(Head h, Tail... t) : Tuple&lt;Tail...&gt;(t...), head(h) {}
};
</code></pre>
<pre><code>   Tuple&lt;int,char,double&gt;
     : Tuple&lt;char,double&gt;          head=int
         : Tuple&lt;double&gt;           head=char
             : Tuple&lt;&gt;             head=double
   Layout is a chain of single-element bases (real std::tuple is flatter,
   but the idea is the same).
</code></pre>
<p>Runnable: <a href="examples/ch06_tuple.cpp"><code>examples/ch06_tuple.cpp</code></a> and
<a href="examples/ch06_fold_print.cpp"><code>examples/ch06_fold_print.cpp</code></a>.</p>
<hr />
<h2 id="10-perfect-forwarding-a-pack-preview">10. Perfect-forwarding a pack (preview)</h2>
<p>The canonical variadic + forwarding combo (details in
<a href="09-perfect-forwarding.md">09-perfect-forwarding.md</a>):</p>
<pre><code class="language-cpp">template &lt;class T, class... Args&gt;
std::unique_ptr&lt;T&gt; make_unique_like(Args&amp;&amp;... args) {
    return std::unique_ptr&lt;T&gt;(new T(std::forward&lt;Args&gt;(args)...));
}
</code></pre>
<pre><code>   Args&amp;&amp;... args     -&gt; a pack of forwarding references
   std::forward&lt;Args&gt;(args)...   -&gt; forwards each element preserving value cat.
   new T( fwd&lt;A0&gt;(a0), fwd&lt;A1&gt;(a1), ... )
</code></pre>
<hr />
<h2 id="11-summary">11. Summary</h2>
<div class="diagram"><div class="diagram-title">Variadic templates</div><div class="dbox green"><div class="dbox-title">Packs</div><div class="dtext"><code>template&lt;class... Ts&gt;</code> → type pack; <code>f(Ts... a)</code> → value pack</div><div class="dtext"><code>...</code> before = declare pack; <code>...</code> after = expand</div><div class="dtext"><code>sizeof...(Ts)</code> = element count</div></div><div class="dbox green"><div class="dbox-title">Process packs via</div><div class="dtext">Recursion (head/tail + base case) — classic</div><div class="dtext">Fold expressions (C++17) — <b>preferred</b></div><div class="dtext">Comma fold for per-element side effects</div><div class="dtext"><code>index_sequence</code> for tuple iteration</div><div class="dtext">C++26: native pack indexing <code>xs...[i]</code>, <code>Ts...[i]</code></div></div></div><details class="ascii-diagram"><summary>Details</summary><pre><code> +------------------------------------------------------------------+

<p>SFINAE is the pre-C++20 technique for <strong>conditionally enabling</strong> templates based
on properties of their arguments. Concepts (chapter 13) largely replace it, but
you must understand SFINAE to read existing code, and it still has niche uses.</p>
<hr />
<h2 id="1-the-one-sentence-definition">1. The one sentence definition</h2>
<blockquote>
<p>When the compiler substitutes deduced template arguments into a candidate&rsquo;s
<strong>signature</strong>, if that substitution produces an <strong>invalid type or expression
in the immediate context</strong>, the candidate is silently <strong>removed</strong> from the
overload set — instead of causing a hard error.</p>
</blockquote>
<pre><code>   Overload set: [f&lt;T=A&gt;, g&lt;T=A&gt;, ...]
        |
   substitute T=A into each signature
        |
   f&lt;A&gt;: signature is ill-formed  --&gt; DROP f (not an error)
   g&lt;A&gt;: signature is fine        --&gt; keep g
        |
   pick best of remaining viable candidates
</code></pre>
<p>&ldquo;<strong>Not an error</strong>&rdquo; is the whole point: a failed substitution just prunes the
candidate list. If <em>nothing</em> is left, <em>then</em> you get an error.</p>
<hr />
<h2 id="2-minimal-example-enable-different-overloads">2. Minimal example: enable different overloads</h2>
<pre><code class="language-cpp">#include &lt;type_traits&gt;
#include &lt;iostream&gt;

// enabled only when T is integral
template &lt;class T,
          std::enable_if_t&lt;std::is_integral_v&lt;T&gt;, int&gt; = 0&gt;
void describe(T) { std::cout &lt;&lt; &quot;integral\\n&quot;; }

// enabled only when T is floating point
template &lt;class T,
          std::enable_if_t&lt;std::is_floating_point_v&lt;T&gt;, int&gt; = 0&gt;
void describe(T) { std::cout &lt;&lt; &quot;floating\\n&quot;; }

int main() {
    describe(42);    // integral
    describe(3.14);  // floating
}
</code></pre>
<pre><code>   describe(42), T=int:
     candidate 1: enable_if_t&lt;true , int&gt; = int    -&gt; valid   -&gt; KEEP
     candidate 2: enable_if_t&lt;false, int&gt; = ???     -&gt; INVALID -&gt; DROP
   Only candidate 1 remains -&gt; &quot;integral&quot;
</code></pre>
<hr />
<h2 id="3-how-enable_if-works-build-it-yourself">3. How <code>enable_if</code> works (build it yourself)</h2>
<p><code>std::enable_if&lt;Cond, T&gt;</code> has a member <code>type</code> <strong>only when <code>Cond</code> is true</strong>.
Asking for <code>::type</code> when it&rsquo;s absent is a substitution failure.</p>
<pre><code class="language-cpp">template &lt;bool Cond, class T = void&gt;
struct enable_if {};                       // NO 'type' member

template &lt;class T&gt;
struct enable_if&lt;true, T&gt; { using type = T; };   // has 'type' only when true

template &lt;bool Cond, class T = void&gt;
using enable_if_t = typename enable_if&lt;Cond, T&gt;::type;
</code></pre>
<pre><code>   enable_if&lt;true , X&gt;::type  = X       (specialization has 'type')
   enable_if&lt;false, X&gt;::type  = ERROR   (primary has no 'type' -&gt; SFINAE)
</code></pre>
<p>So <code>enable_if_t&lt;false, ...&gt;</code> is a <em>type that doesn&rsquo;t exist</em> -&gt; substitution
fails -&gt; candidate dropped.</p>
<hr />
<h2 id="4-where-to-put-the-enable_if--three-placements">4. Where to put the <code>enable_if</code> — three placements</h2>
<pre><code class="language-cpp">// (a) as a defaulted non-type template parameter (preferred, most flexible)
template &lt;class T, std::enable_if_t&lt;cond&lt;T&gt;, int&gt; = 0&gt;
void f(T);

// (b) as the return type
template &lt;class T&gt;
std::enable_if_t&lt;cond&lt;T&gt;, void&gt; g(T);

// (c) as a function parameter (rare, changes signature)
template &lt;class T&gt;
void h(T, std::enable_if_t&lt;cond&lt;T&gt;, int&gt; = 0);
</code></pre>
<pre><code>   Placement (a): parameter list      -&gt; keeps return type clean, works on ctors
   Placement (b): return type         -&gt; can't use on constructors (no ret type)
   Placement (c): extra param         -&gt; pollutes the call signature
   -&gt; (a) is the modern SFINAE-with-enable_if default.
</code></pre>
<p>Note: two overloads that differ <em>only</em> by the <em>type</em> used inside <code>enable_if</code>
default-value can clash (they look identical to the compiler). Use distinct
conditions so exactly one is viable.</p>
<hr />
<h2 id="5-expression-sfinae--does-this-operation-compile">5. Expression SFINAE — &ldquo;does this operation compile?&rdquo;</h2>
<p>The most powerful form: put an <strong>expression</strong> in the signature (usually via
<code>decltype</code>). If the expression is ill-formed for <code>T</code>, the candidate drops.</p>
<pre><code class="language-cpp">#include &lt;utility&gt;   // std::declval

// enabled only if T has a member .size()
template &lt;class T&gt;
auto get_size(const T&amp; c) -&gt; decltype(c.size()) {
    return c.size();
}
</code></pre>
<pre><code>   get_size(vec)     decltype(vec.size()) is valid   -&gt; return type = size_t
   get_size(42)      decltype((42).size()) invalid   -&gt; candidate DROPPED
                     -&gt; if no other overload: &quot;no matching function&quot; error
</code></pre>
<p><code>std::declval&lt;T&gt;()</code> gives you a &ldquo;fake value of type T&rdquo; usable <strong>only</strong> inside
unevaluated contexts (<code>decltype</code>, <code>sizeof</code>, <code>noexcept</code>) to probe operations
without needing a real constructible object:</p>
<pre><code class="language-cpp">template &lt;class T, class U&gt;
auto add(T a, U b) -&gt; decltype(std::declval&lt;T&gt;() + std::declval&lt;U&gt;());
</code></pre>
<hr />
<h2 id="6-void_t--the-detection-swiss-army-knife-c17">6. <code>void_t</code> — the detection Swiss-army knife (C++17)</h2>
<p><code>std::void_t&lt;...&gt;</code> maps any valid types to <code>void</code>. If any type inside is
ill-formed, SFINAE kicks in. This gives a clean way to detect member presence.</p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

template &lt;class T, class = void&gt;
struct has_value_type : std::false_type {};        // primary: &quot;no&quot;

template &lt;class T&gt;
struct has_value_type&lt;T, std::void_t&lt;typename T::value_type&gt;&gt;
    : std::true_type {};                           // matches only if T::value_type exists
</code></pre>
<pre><code>   has_value_type&lt;std::vector&lt;int&gt;&gt;
       does typename vector&lt;int&gt;::value_type exist? YES
       -&gt; void_t&lt;...&gt; = void -&gt; partial spec matches -&gt; true_type

   has_value_type&lt;int&gt;
       does int::value_type exist? NO -&gt; void_t ill-formed
       -&gt; partial spec dropped -&gt; primary -&gt; false_type
</code></pre>
<pre><code>                has_value_type&lt;T&gt;
                       |
        +--------------+---------------+
        | T::value_type valid?         |
       yes                             no
        |                              |
   partial spec (true_type)      primary (false_type)
</code></pre>
<hr />
<h2 id="7-the-detection-idiom-a-reusable-generalization">7. The Detection Idiom (a reusable generalization)</h2>
<p><code>void_t</code> boilerplate is repetitive; the detection idiom packages it. A common
hand-rolled version:</p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

namespace detail {
    template &lt;class Default, class AlwaysVoid,
              template &lt;class...&gt; class Op, class... Args&gt;
    struct detector : std::false_type { using type = Default; };

    template &lt;class Default, template &lt;class...&gt; class Op, class... Args&gt;
    struct detector&lt;Default, std::void_t&lt;Op&lt;Args...&gt;&gt;, Op, Args...&gt;
        : std::true_type { using type = Op&lt;Args...&gt;; };
}

template &lt;template &lt;class...&gt; class Op, class... Args&gt;
using is_detected =
    detail::detector&lt;void, void, Op, Args...&gt;;

template &lt;template &lt;class...&gt; class Op, class... Args&gt;
inline constexpr bool is_detected_v = is_detected&lt;Op, Args...&gt;::value;

// Define an &quot;operation&quot; to detect:
template &lt;class T&gt; using has_push_back_t =
    decltype(std::declval&lt;T&amp;&gt;().push_back(std::declval&lt;typename T::value_type&gt;()));

// Query:
// static_assert( is_detected_v&lt;has_push_back_t, std::vector&lt;int&gt;&gt;);
// static_assert(!is_detected_v&lt;has_push_back_t, std::array&lt;int,3&gt;&gt;);
</code></pre>
<pre><code>   is_detected_v&lt;Op, Args...&gt;
        try to form Op&lt;Args...&gt;
          success -&gt; true       (and ::type is the result type)
          failure -&gt; false
   You write Op as &quot;the expression you want to test&quot; wrapped in decltype.
</code></pre>
<blockquote>
<p>In C++20, you&rsquo;d just write a <code>requires</code>-expression / concept instead. The
detection idiom is the C++17 way and appears in many libraries.</p>
</blockquote>
<hr />
<h2 id="8-if-constexpr-vs-sfinae-vs-concepts--when-to-use-which">8. <code>if constexpr</code> vs SFINAE vs concepts — when to use which</h2>
<pre><code>  GOAL                                 BEST TOOL (modern -&gt; legacy)
  ----------------------------------   -----------------------------------
  branch inside ONE function           if constexpr (C++17)
  enable/disable an overload           concepts (C++20) &gt; enable_if (SFINAE)
  detect a member/operation            requires-expr (C++20) &gt; void_t (C++17)
  constrain a class template           concepts / requires &gt; enable_if
  read old library code                understand SFINAE (this chapter)
</code></pre>
<p>Same &ldquo;integral vs floating&rdquo; example in each style:</p>
<pre><code class="language-cpp">// SFINAE (C++11/14/17)
template &lt;class T, std::enable_if_t&lt;std::is_integral_v&lt;T&gt;,int&gt; = 0&gt;
void f(T);

// if constexpr (C++17) — single function
template &lt;class T&gt; void f(T x) {
    if constexpr (std::is_integral_v&lt;T&gt;) { /* ... */ }
    else                                 { /* ... */ }
}

// concepts (C++20) — cleanest
template &lt;std::integral T&gt; void f(T);
void f(std::integral auto x);            // abbreviated form
</code></pre>
<hr />
<h2 id="9-sfinae-pitfalls">9. SFINAE pitfalls</h2>
<pre><code>  * &quot;Hard errors&quot; outside the immediate context are NOT SFINAE.
      Example: an error inside a function BODY is a real error, not SFINAE.
      Only failures in the SIGNATURE (types/expressions in the declaration)
      participate.

  * Two enable_if overloads with the SAME defaulted-type parameter
      (both '... int = 0') are the SAME signature -&gt; redefinition error.
      Make the CONDITIONS mutually exclusive but the SIGNATURES distinct,
      or vary the enable_if second argument type.

  * Diagnostic quality is poor: SFINAE removals are silent, so &quot;no matching
      function&quot; hides WHY. Concepts give far better messages.
</code></pre>
<p>Immediate-context example:</p>
<pre><code class="language-cpp">template &lt;class T&gt;
auto f(T x) -&gt; decltype(x.foo()) {   // SFINAE: dropped if no foo()
    x.bar();                         // if x has foo() but not bar(),
                                     // THIS is a HARD ERROR (body, not signature)
    return x.foo();
}
</code></pre>
<hr />
<h2 id="10-worked-example-pick-print-based-on-capability">10. Worked example: pick print based on capability</h2>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;type_traits&gt;
#include &lt;vector&gt;

// (1) has operator&lt;&lt;  -&gt;  print directly
template &lt;class T&gt;
auto print(const T&amp; x) -&gt; decltype(std::cout &lt;&lt; x, void()) {
    std::cout &lt;&lt; x &lt;&lt; '\\n';
}

// (2) otherwise, if iterable (has begin/end) -&gt; print elements
template &lt;class T&gt;
auto print(const T&amp; c) -&gt; decltype(c.begin(), c.end(), void()) {
    std::cout &lt;&lt; &quot;[ &quot;;
    for (const auto&amp; e : c) std::cout &lt;&lt; e &lt;&lt; ' ';
    std::cout &lt;&lt; &quot;]\\n&quot;;
}

int main() {
    print(42);                          // uses (1): 42
    print(std::vector&lt;int&gt;{1, 2, 3});   // (2) is chosen for containers
}
</code></pre>
<blockquote>
<p>Note: overloads (1) and (2) can be ambiguous for types that are <em>both</em>
streamable and iterable (like <code>std::string</code>). Real code disambiguates with
priorities/tags or concepts. This shows the mechanism; chapter 13 shows the
clean fix.</p>
</blockquote>
<p>Runnable: <a href="examples/ch07_sfinae.cpp"><code>examples/ch07_sfinae.cpp</code></a>.</p>

  { name: `10. Type Traits`, path: `08-type-traits.md`, dir: ``, words: 1229, mins: 6, body: `<h1 id="08--type-traits-type_traits">08 — Type Traits (<code>&lt;type_traits&gt;</code>)</h1>
<p>Type traits are compile-time <strong>questions about types</strong> (&ldquo;is this an integer?
does it have a virtual destructor?&rdquo;) and <strong>type transformations</strong> (&ldquo;remove the
const&rdquo;, &ldquo;add a pointer&rdquo;). They are the vocabulary of generic programming.</p>
<hr />
<h2 id="1-two-families">1. Two families</h2>
<pre><code>   PREDICATE traits  -&gt; ask a yes/no question, expose ::value  (a bool)
       std::is_integral&lt;T&gt;::value          std::is_integral_v&lt;T&gt;     (C++17 _v)

   TRANSFORMATION traits -&gt; produce a new type, expose ::type
       std::remove_const&lt;T&gt;::type          std::remove_const_t&lt;T&gt;    (C++14 _t)
</code></pre>
<pre><code>   Trait&lt;T&gt;::value   is a compile-time bool/int   (predicates)
   Trait&lt;T&gt;::type    is a type                     (transformations)

   Shorthands:
     _v suffix  -&gt;  ::value    e.g. is_pointer_v&lt;T&gt;
     _t suffix  -&gt;  ::type     e.g. decay_t&lt;T&gt;
</code></pre>
<hr />
<h2 id="2-integral_constant-the-atom-of-traits">2. <code>integral_constant</code>: the atom of traits</h2>
<p>Every predicate trait ultimately <em>is</em> an <code>integral_constant</code>.</p>
<pre><code class="language-cpp">template &lt;class T, T v&gt;
struct integral_constant {
    static constexpr T value = v;
    using value_type = T;
    using type = integral_constant;
    constexpr operator T() const noexcept { return v; }   // implicit -&gt; value
    constexpr T operator()() const noexcept { return v; } // callable -&gt; value
};

using true_type  = integral_constant&lt;bool, true&gt;;
using false_type = integral_constant&lt;bool, false&gt;;
</code></pre>
<pre><code>   std::is_integral&lt;int&gt;   inherits from   true_type   (== integral_constant&lt;bool,true&gt;)
        -&gt; ::value is true
        -&gt; is implicitly convertible to true
        -&gt; usable as a &quot;tag&quot; type for tag dispatch (chapter 05)
</code></pre>
<p>So a trait &ldquo;returns&rdquo; a <em>type</em> (<code>true_type</code>/<code>false_type</code>) whose <code>::value</code> is the
answer. That&rsquo;s why traits double as dispatch tags.</p>
<hr />
<h2 id="3-writing-predicate-traits-via-specialization">3. Writing predicate traits (via specialization)</h2>
<pre><code class="language-cpp">// is_pointer
template &lt;class T&gt; struct is_pointer      : std::false_type {};
template &lt;class T&gt; struct is_pointer&lt;T*&gt;  : std::true_type  {};

// is_same
template &lt;class A, class B&gt; struct is_same       : std::false_type {};
template &lt;class A&gt;          struct is_same&lt;A, A&gt; : std::true_type  {};

// is_reference
template &lt;class T&gt; struct is_reference       : std::false_type {};
template &lt;class T&gt; struct is_reference&lt;T&amp;&gt;   : std::true_type  {};
template &lt;class T&gt; struct is_reference&lt;T&amp;&amp;&gt;  : std::true_type  {};
</code></pre>
<pre><code>   is_same&lt;int,int&gt;   -&gt; matches is_same&lt;A,A&gt; (A=int)  -&gt; true_type
   is_same&lt;int,char&gt;  -&gt; only primary                   -&gt; false_type

   Pattern-matching on the TYPE STRUCTURE is the trait technique.
</code></pre>
<hr />
<h2 id="4-writing-transformation-traits">4. Writing transformation traits</h2>
<pre><code class="language-cpp">template &lt;class T&gt; struct remove_const          { using type = T; };
template &lt;class T&gt; struct remove_const&lt;const T&gt; { using type = T; };  // peel const

template &lt;class T&gt; struct remove_reference      { using type = T; };
template &lt;class T&gt; struct remove_reference&lt;T&amp;&gt;  { using type = T; };
template &lt;class T&gt; struct remove_reference&lt;T&amp;&amp;&gt; { using type = T; };

template &lt;class T&gt; struct add_pointer { using type = T*; };
</code></pre>
<pre><code>   remove_const&lt;const int&gt;::type   -&gt; int
   remove_reference&lt;int&amp;&gt;::type     -&gt; int
   add_pointer&lt;int&gt;::type           -&gt; int*
</code></pre>
<p><code>std::remove_reference_t&lt;T&gt;</code> is the piece that makes <code>std::move</code> work
(<code>static_cast&lt;remove_reference_t&lt;T&gt;&amp;&amp;&gt;(x)</code>).</p>
<hr />
<h2 id="5-decay--what-pass-by-value-does-to-a-type">5. <code>decay</code> — what pass-by-value does to a type</h2>
<p><code>std::decay_t&lt;T&gt;</code> mimics the transformation applied to a by-value function
parameter (see <a href="04-argument-deduction.md">04-argument-deduction.md</a>): remove
reference, remove cv, arrays-&gt;pointers, functions-&gt;pointers.</p>
<pre><code>   decay_t&lt;const int&amp;&gt;   -&gt; int
   decay_t&lt;int[10]&gt;       -&gt; int*
   decay_t&lt;void(int)&gt;     -&gt; void(*)(int)
   decay_t&lt;const char[6]&gt; -&gt; const char*
</code></pre>
<p>Used everywhere you store &ldquo;the value type&rdquo; of something (e.g. <code>std::thread</code>,
<code>std::make_tuple</code>, <code>std::any</code>).</p>
<hr />
<h2 id="6-the-trait-catalog-whats-in-type_traits">6. The trait catalog (what&rsquo;s in <code>&lt;type_traits&gt;</code>)</h2>
<pre><code>  PRIMARY CATEGORIES (mutually exclusive-ish):
    is_void, is_null_pointer, is_integral, is_floating_point,
    is_array, is_pointer, is_lvalue_reference, is_rvalue_reference,
    is_member_object_pointer, is_member_function_pointer,
    is_enum, is_union, is_class, is_function

  COMPOSITE CATEGORIES:
    is_reference, is_arithmetic (integral||floating),
    is_fundamental, is_object, is_scalar, is_compound, is_member_pointer

  TYPE PROPERTIES:
    is_const, is_volatile, is_trivial, is_trivially_copyable,
    is_standard_layout, is_empty, is_polymorphic, is_abstract,
    is_final, is_aggregate (C++17), is_signed, is_unsigned,
    has_unique_object_representations (C++17)

  SUPPORTED OPERATIONS:
    is_constructible, is_default_constructible, is_copy_constructible,
    is_move_constructible, is_assignable, is_copy_assignable,
    is_move_assignable, is_destructible, is_swappable (C++17),
    + trivially_/nothrow_ variants of each  (e.g. is_nothrow_move_constructible)

  RELATIONSHIPS:
    is_same, is_base_of, is_convertible, is_invocable (C++17),
    is_invocable_r, invoke_result_t (C++17), common_type, common_reference (C++20)

  TRANSFORMATIONS:
    remove_cv/const/volatile, add_cv/const/volatile,
    remove_reference, add_lvalue_reference, add_rvalue_reference,
    remove_pointer, add_pointer, remove_extent, remove_all_extents,
    make_signed, make_unsigned, decay, remove_cvref (C++20),
    conditional, enable_if, common_type, underlying_type,
    type_identity (C++20), void_t (C++17)

  MISC:
    conjunction, disjunction, negation (C++17) -- logical combinators
    is_constant_evaluated (C++20, function) -- see chapter 12
</code></pre>
<p>You don&rsquo;t memorize these — you learn the <em>naming pattern</em> (<code>is_*</code>, <code>remove_*</code>,
<code>add_*</code>, <code>*_v</code>, <code>*_t</code>, <code>nothrow_</code>, <code>trivially_</code>) and grep the reference.</p>
<hr />
<h2 id="7-conditional--compile-time-ternary-on-types">7. <code>conditional</code> — compile-time ternary on types</h2>
<pre><code class="language-cpp">template &lt;bool B, class T, class F&gt; struct conditional      { using type = T; };
template &lt;class T, class F&gt;         struct conditional&lt;false, T, F&gt; { using type = F; };

template &lt;bool B, class T, class F&gt;
using conditional_t = typename conditional&lt;B, T, F&gt;::type;

// pick smallest int type that holds N bits (toy):
using X = std::conditional_t&lt;(sizeof(void*) == 8), std::int64_t, std::int32_t&gt;;
</code></pre>
<pre><code>   conditional_t&lt;true , A, B&gt;  -&gt; A
   conditional_t&lt;false, A, B&gt;  -&gt; B
   (a compile-time  cond ? A : B  for TYPES)
</code></pre>
<hr />
<h2 id="8-logical-combinators-c17">8. Logical combinators (C++17)</h2>
<p><code>conjunction</code>/<code>disjunction</code>/<code>negation</code> combine traits <strong>with short-circuiting</strong>
(important because it avoids instantiating later traits when an earlier one
already decides the result).</p>
<pre><code class="language-cpp">template &lt;class T&gt;
constexpr bool is_small_trivial_v =
    std::conjunction_v&lt;std::is_trivially_copyable&lt;T&gt;,
                       std::bool_constant&lt;(sizeof(T) &lt;= 16)&gt;&gt;;
</code></pre>
<pre><code>   conjunction&lt;A, B, C&gt;  ~  A::value &amp;&amp; B::value &amp;&amp; C::value  (short-circuits)
   disjunction&lt;A, B, C&gt;  ~  A::value || B::value || C::value  (short-circuits)
   negation&lt;A&gt;           ~  !A::value
</code></pre>
<p>Short-circuiting matters: <code>conjunction&lt;always_false, uses_undefined&lt;T&gt;&gt;</code> won&rsquo;t
instantiate the second trait if the first is false.</p>
<hr />
<h2 id="9-invoke_result--is_invocable-c17">9. <code>invoke_result</code> &amp; <code>is_invocable</code> (C++17)</h2>
<p>Answer &ldquo;what does calling <code>f(args...)</code> return?&rdquo; and &ldquo;can I call it at all?&rdquo;</p>
<pre><code class="language-cpp">#include &lt;type_traits&gt;

auto f = [](int x, double y) { return x + y; };

using R = std::invoke_result_t&lt;decltype(f), int, double&gt;;   // double
static_assert(std::is_invocable_v&lt;decltype(f), int, double&gt;);
static_assert(std::is_invocable_r_v&lt;double, decltype(f), int, double&gt;);
</code></pre>
<pre><code>   invoke_result_t&lt;F, Args...&gt;   -&gt; return type of F(Args...)
   is_invocable_v&lt;F, Args...&gt;    -&gt; can F be called with Args?
   is_invocable_r_v&lt;R,F,Args...&gt; -&gt; ...and result convertible to R?
</code></pre>
<p>These handle function pointers, member pointers, functors, and lambdas uniformly
(same rules as <code>std::invoke</code>).</p>
<hr />
<h2 id="10-using-traits-static_assert-guardrails">10. Using traits: <code>static_assert</code> guardrails</h2>
<p>Traits shine as <strong>preconditions</strong> that produce readable errors:</p>
<pre><code class="language-cpp">template &lt;class T&gt;
class LockFreeQueue {
    static_assert(std::is_trivially_copyable_v&lt;T&gt;,
                  &quot;LockFreeQueue requires trivially copyable T&quot;);
    static_assert(std::is_nothrow_move_constructible_v&lt;T&gt;,
                  &quot;T's move constructor must be noexcept&quot;);
    // ...
};
</code></pre>
<pre><code>   Instead of a 200-line template error deep inside the queue,
   the user sees:  &quot;LockFreeQueue requires trivially copyable T&quot;
</code></pre>
<hr />
<h2 id="11-remove_cvref-c20--the-everyday-cleanup">11. <code>remove_cvref</code> (C++20) — the everyday cleanup</h2>
<p>The extremely common &ldquo;strip references and cv-qualifiers&rdquo; operation finally got
a single trait:</p>
<pre><code class="language-cpp">template &lt;class T&gt;
void store(T&amp;&amp; x) {
    using Clean = std::remove_cvref_t&lt;T&gt;;   // == remove_cv_t&lt;remove_reference_t&lt;T&gt;&gt;
    Clean copy = std::forward&lt;T&gt;(x);
    // ...
}
</code></pre>
<pre><code>   T = const std::string&amp;
   remove_cvref_t&lt;T&gt; = std::string
   (pre-C++20 you wrote remove_cv_t&lt;remove_reference_t&lt;T&gt;&gt; or decay_t)
</code></pre>
<hr />
<h2 id="12-worked-example-a-trait-driven-generic-hash-ish-printer">12. Worked example: a trait-driven generic hash-ish printer</h2>
<pre><code class="language-cpp">#include &lt;iostream&gt;
#include &lt;type_traits&gt;
#include &lt;string&gt;

template &lt;class T&gt;
void show(const T&amp; x) {
    if constexpr (std::is_integral_v&lt;T&gt;) {
        std::cout &lt;&lt; &quot;int(&quot; &lt;&lt; x &lt;&lt; &quot;)\\n&quot;;
    } else if constexpr (std::is_floating_point_v&lt;T&gt;) {
        std::cout &lt;&lt; &quot;float(&quot; &lt;&lt; x &lt;&lt; &quot;)\\n&quot;;
    } else if constexpr (std::is_same_v&lt;std::remove_cvref_t&lt;T&gt;, std::string&gt;) {
        std::cout &lt;&lt; &quot;string(\\&quot;&quot; &lt;&lt; x &lt;&lt; &quot;\\&quot;)\\n&quot;;
    } else if constexpr (std::is_pointer_v&lt;T&gt;) {
        std::cout &lt;&lt; &quot;pointer(&quot; &lt;&lt; static_cast&lt;const void*&gt;(x) &lt;&lt; &quot;)\\n&quot;;
    } else {
        std::cout &lt;&lt; &quot;other\\n&quot;;
    }
}

int main() {
    show(7);
    show(2.5);
    show(std::string(&quot;hi&quot;));
    int v = 3; show(&amp;v);

<pre><code>   Each if constexpr asks a TRAIT; only the true branch is compiled for T.
   is_integral -&gt; is_floating_point -&gt; is string? -&gt; is_pointer -&gt; else
