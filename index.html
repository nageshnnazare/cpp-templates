  { name: `17. Cpp26 Features`, path: `15-cpp26-features.md`, dir: ``, words: 1530, mins: 8, body: `<h1 id="15--c26-template-features">15 — C++26 Template Features</h1>
<p>C++26 is the biggest leap for compile-time programming since C++11. The headline
is <strong>static reflection</strong>, but several smaller features (pack indexing, expansion
statements, structured-binding packs, variadic friends, <code>= delete("reason")</code>)
transform everyday template code.</p>
<blockquote>
<p><strong>Reality check (mid-2026):</strong> C++26 is feature-complete in the working draft
but not yet a published standard. Compiler support is <em>partial and evolving</em>.
Each section notes availability. To experiment you generally need very recent
GCC/Clang trunk and <code>-std=c++2c</code>; reflection often needs a dedicated
branch/flag. Treat syntax here as &ldquo;the voted-in design&rdquo;; minor spellings may
shift before publication.</p>
</blockquote>
<hr />
<h2 id="1-pack-indexing-p2662--subscript-a-pack-directly">1. Pack indexing (P2662) — subscript a pack directly</h2>
<p>Finally, packs can be indexed with <code>[]</code>, both for <strong>value</strong> packs and <strong>type</strong>
packs. No more <code>std::tuple</code>/<code>index_sequence</code> gymnastics (chapter 06 §7).</p>
<pre><code class="language-cpp">template &lt;class... Ts&gt;
auto first(Ts... args) {
    return args...[0];            // the 0th value in the pack
}

template &lt;class... Ts&gt;
using first_type = Ts...[0];      // the 0th type in the pack

template &lt;std::size_t I, class... Ts&gt;
auto nth(Ts... args) {
    return args...[I];            // I-th element (I must be a constant expr)
}
</code></pre>
<pre><code>   pack...[index]      -&gt; value pack indexing
   Pack...[index]      -&gt; type  pack indexing

   first(10, 20, 30)   -&gt; args...[0]  -&gt; 10
   first_type&lt;int,char,double&gt; -&gt; int
</code></pre>
<pre><code>   BEFORE (C++17):  std::get&lt;0&gt;(std::forward_as_tuple(args...))   (heavy)
   C++26:           args...[0]                                    (native)
</code></pre>
<p>Availability: GCC 15, Clang 19+ (<code>-std=c++2c</code>).</p>
<hr />
<h2 id="2-structured-bindings-can-introduce-a-pack-p1061">2. Structured bindings can introduce a pack (P1061)</h2>
<p>Structured bindings can now bind to a <strong>pack</strong> of the remaining members — huge
for generic code over tuples/aggregates.</p>
<pre><code class="language-cpp">auto sum_all(auto tuple_like) {
    auto [...elems] = tuple_like;      // 'elems' is a PACK of the members
    return (elems + ... + 0);          // fold over them
}
sum_all(std::make_tuple(1, 2, 3));     // 6
</code></pre>
<pre><code>   auto [...xs] = t;         // xs is a pack of all elements
   auto [head, ...tail] = t; // first element + pack of the rest

   Then use xs... anywhere a pack expansion is allowed.
</code></pre>
<p>This makes writing generic algorithms over structs/tuples feel natural.</p>
<hr />
<h2 id="3-expansion-statements-template-for-p1306">3. Expansion statements: <code>template for</code> (P1306)</h2>
<p>A compile-time loop that <strong>iterates over a pack, tuple, or range of constant
size</strong>, generating a copy of the body for each element — with the element&rsquo;s
<em>actual type</em> in each iteration. This replaces most <code>index_sequence</code> + fold
tricks with readable loops.</p>
<pre><code class="language-cpp">template &lt;class... Ts&gt;
void print_all(const Ts&amp;... args) {
    template for (const auto&amp; x : {args...}) {   // one iteration per element
        std::cout &lt;&lt; x &lt;&lt; ' ';                    // x has the right type each time
    }
}

// iterate a tuple's elements, each with its own type:
auto t = std::make_tuple(1, 2.5, &quot;hi&quot;);
template for (auto&amp;&amp; e : t) {
    std::cout &lt;&lt; e &lt;&lt; '\\n';        // int, then double, then const char*
}
</code></pre>
<pre><code>   template for (auto e : structured-thing) { BODY }
        |
   compiler UNROLLS: BODY with e = elem0 (type T0)
                     BODY with e = elem1 (type T1)
                     ...
   Not a runtime loop — it's a compile-time expansion, each body specialized.
</code></pre>
<pre><code>   BEFORE:  tuple_for_each(t, [](auto&amp;&amp; e){...});  // helper + index_sequence
   C++26:   template for (auto&amp;&amp; e : t) { ... }     // just a loop
</code></pre>
<p>Availability: experimental; landing in trunk compilers through 2025-2026.</p>
<hr />
<h2 id="4-static-reflection-p2996--friends--the-big-one">4. Static reflection (P2996 + friends) — the big one</h2>
<p>Reflection lets you <strong>inspect and generate</strong> code with ordinary <code>constexpr</code>
programming. Two new operators:</p>
<pre><code>   ^^X      &quot;reflexpr&quot;: produce a std::meta::info describing entity X
            (a type, namespace, member, expression, ...)
   [: r :]  &quot;splice&quot;: turn a reflection value r back into code
            (a type, an expression, a member access, ...)
</code></pre>
<pre><code class="language-cpp">#include &lt;meta&gt;          // std::meta (header name may differ in final std)

// how many non-static data members does T have?
template &lt;class T&gt;
consteval std::size_t field_count() {
    return std::meta::nonstatic_data_members_of(^^T).size();
}
</code></pre>
<pre><code>   ^^T   ---reflect---&gt;   std::meta::info  (a first-class constexpr VALUE)
                                |
              manipulate with normal constexpr code (loops, vectors, if...)
                                |
   [: info :]  ---splice---&gt;  back into a TYPE / EXPRESSION / member
</code></pre>
<h3 id="example-generic-to_string-for-any-aggregate-no-macros">Example: generic <code>to_string</code> for any aggregate (no macros!)</h3>
<pre><code class="language-cpp">#include &lt;meta&gt;
#include &lt;string&gt;

template &lt;class T&gt;
std::string to_string_reflect(const T&amp; obj) {
    std::string out = &quot;{ &quot;;
    // iterate the data members at compile time, splice member access at runtime:
    template for (constexpr auto member : std::meta::nonstatic_data_members_of(^^T)) {
        out += std::meta::identifier_of(member);     // the field NAME (a string!)
        out += &quot;=&quot;;
        out += std::to_string(obj.[:member:]);       // splice: obj.&lt;that member&gt;
        out += &quot; &quot;;
    }
    return out + &quot;}&quot;;
}

struct Point { int x; int y; };
// to_string_reflect(Point{1,2})  -&gt;  &quot;{ x=1 y=2 }&quot;
</code></pre>
<pre><code>   std::meta::nonstatic_data_members_of(^^Point) = [ info(x), info(y) ]
        template for over them:
            identifier_of(info(x)) = &quot;x&quot;       obj.[:info(x):] = obj.x
            identifier_of(info(y)) = &quot;y&quot;       obj.[:info(y):] = obj.y
   -&gt; &quot;{ x=1 y=2 }&quot;     with ZERO hand-written per-field code.
</code></pre>
<p>This single feature obsoletes huge categories of code: serialization,
ORM/struct mapping, enum&lt;-&gt;string, hashing, <code>operator==</code>, DI containers,
scripting bindings — all previously done with macros or fragile TMP.</p>
<h3 id="more-reflection-queries-illustrative-names">More reflection queries (illustrative names)</h3>
<pre><code>   std::meta::members_of(^^T)                  all members
   std::meta::nonstatic_data_members_of(^^T)   data fields
   std::meta::enumerators_of(^^E)              enum values  -&gt; enum&lt;-&gt;string!
   std::meta::identifier_of(r)                 the name (string_view)
   std::meta::type_of(r)                       the member's type (as info)
   std::meta::is_public(r), is_static(r), ...  properties
   std::meta::substitute(^^Tmpl, {args...})    instantiate a template
   [: type_info :]                             splice a type into code
</code></pre>
<h3 id="enum-to-string-in-5-lines-the-classic-pain-point">Enum-to-string in ~5 lines (the classic pain point)</h3>
<pre><code class="language-cpp">template &lt;class E&gt;
constexpr std::string_view enum_name(E value) {
    template for (constexpr auto e : std::meta::enumerators_of(^^E)) {
        if (value == [:e:])                       // splice the enumerator value
            return std::meta::identifier_of(e);   // its name
    }
    return &quot;&lt;unknown&gt;&quot;;
}
</code></pre>
<pre><code>   enum class Color { Red, Green, Blue };
   enum_name(Color::Green)  -&gt;  &quot;Green&quot;
   No macro, no maintenance, works for ANY enum. This was IMPOSSIBLE in
   standard C++ before reflection.
</code></pre>
<p>Availability: <strong>experimental</strong>. Clang has a P2996 implementation branch; EDG
supports it; the header/namespace spelling (<code>&lt;meta&gt;</code>, <code>std::meta</code>) and exact
function names may change before C++26 ships. This is the feature to watch.</p>
<hr />
<h2 id="5--deletereason-p2573">5. <code>= delete("reason")</code> (P2573)</h2>
<p>Deleted functions can carry a message shown in the diagnostic — helpful for
template APIs that want to <em>guide</em> users away from certain instantiations.</p>
<pre><code class="language-cpp">template &lt;class T&gt;
void serialize(const T&amp;) { /* ... */ }

template &lt;&gt;
void serialize&lt;RawPointer&gt;(const RawPointer&amp;) =
    delete(&quot;serialize raw pointers via serialize_ptr() to record ownership&quot;);
</code></pre>
<pre><code>   serialize(raw_ptr);
   error: call to deleted function 'serialize'
   note: 'serialize raw pointers via serialize_ptr() to record ownership'
         ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^
         your custom guidance appears in the error.
</code></pre>
<hr />
<h2 id="6-variadic-friend-declarations-p2893">6. Variadic <code>friend</code> declarations (P2893)</h2>
<p>You can now declare a <strong>pack</strong> of friends — useful for policy/mixin designs and
type erasure where the set of friends is template-parameterized.</p>
<pre><code class="language-cpp">template &lt;class... Friends&gt;
class Secret {
    friend Friends...;          // all types in the pack are friends
    int value = 42;
};
</code></pre>
<pre><code>   Secret&lt;A, B, C&gt;   -&gt;  A, B, and C are all friends.
   Before C++26 you couldn't expand a pack in a friend declaration.
</code></pre>
<hr />
<h2 id="7-constexpr-structured-bindings--the-_-placeholder">7. <code>constexpr</code> structured bindings &amp; the <code>_</code> placeholder</h2>
<pre><code class="language-cpp">// (a) constexpr structured bindings (P2686): usable in constant expressions
constexpr auto p = std::pair{1, 2};
constexpr auto [a, b] = p;          // a, b are now usable in constexpr contexts
static_assert(a + b == 3);

// (b) '_' placeholder (P2169): a name you can reuse / ignore, incl. in bindings
auto [x, _, z] = std::tuple{1, 2, 3};   // ignore the middle; multiple '_' allowed
</code></pre>
<pre><code>   '_' = &quot;I don't care about this / don't warn about unused.&quot;
         Can appear multiple times without redeclaration errors.
</code></pre>
<hr />
<h2 id="8-other-c26-items-touching-genericcompile-time-code">8. Other C++26 items touching generic/compile-time code</h2>
<pre><code>   * Contracts (P2900): pre/post/assert; interact with templated interfaces.
   * User-generated static_assert messages: static_assert(cond, constexpr-string)
       -&gt; build the message with constexpr code (great for template diagnostics).
   * #embed: embed binary data as an initializer (constexpr-friendly).
   * std::execution (senders/receivers): heavily templated async framework.
   * More constexpr-ified standard library, constexpr containers/algorithms.
   * Erroneous behavior for uninitialized reads (safety), placeholder concepts.
</code></pre>
<p>The <strong>user-generated <code>static_assert</code> message</strong> pairs beautifully with templates:</p>
<pre><code class="language-cpp">template &lt;class T&gt;
struct Buffer {
    static_assert(std::is_trivially_copyable_v&lt;T&gt;,
        std::format(&quot;Buffer&lt;T&gt; needs trivially copyable T; got size {}&quot;,
                    sizeof(T)));   // message computed at compile time (C++26)
};
</code></pre>
<hr />
<h2 id="9-beforeafter-writing-a-struct-printer">9. Before/after: writing a struct printer</h2>
<pre><code>   BEFORE C++26 (needs a macro or manual boilerplate per struct):
   ---------------------------------------------------------------
   #define REFLECT(...) /* ...50 lines of macro magic... */
   struct Point { int x,y; };  REFLECT(Point, x, y)
   // or hand-write operator&lt;&lt; for every struct.

   C++26 (works for ANY struct, zero per-type code):
   ---------------------------------------------------------------
   template &lt;class T&gt; void print(const T&amp; o) {
       template for (constexpr auto m : nonstatic_data_members_of(^^T))
           std::cout &lt;&lt; identifier_of(m) &lt;&lt; '=' &lt;&lt; o.[:m:] &lt;&lt; ' ';
   }
</code></pre>
<pre><code>   Impact: reflection + expansion statements collapse whole libraries
   (serialization, JSON, ORM, bindings) into a handful of generic functions.
</code></pre>
<hr />
<h2 id="10-summary--how-to-try-it">10. Summary &amp; how to try it</h2>
<div class="diagram"><div class="diagram-title">C++26 template features</div><div class="dbox green"><div class="dbox-title">Key points</div><div class="dtext"><b>Pack indexing:</b> <code>args...[i]</code>, <code>Ts...[i]</code></div><div class="dtext"><b>Binding packs:</b> <code>auto [head, ...tail] = t;</code></div><div class="dtext"><b>Expansion stmt:</b> <code>template for (auto e : pack-or-tuple) {...}</code></div><div class="dtext"><b>Reflection:</b> <code>^^X</code> (reflect) / <code>[: r :]</code> (splice) / <code>std::meta</code></div><div class="dtext">→ enum↔string, serialization, generic <code>==</code>, DI: no macros</div><div class="dtext"><code>= delete("reason")</code>: friendly deleted-function diagnostics</div><div class="dtext"><code>friend Friends...;</code> variadic friends</div><div class="dtext"><code>constexpr</code> bindings, <code>_</code> placeholder, <code>constexpr static_assert</code> msg</div></div></div><details class="ascii-diagram"><summary>Details</summary><pre><code> +------------------------------------------------------------------+
 | Pack indexing:      args...[i],  Ts...[i]                         |
 | Binding packs:      auto [head, ...tail] = t;                    |
 | Expansion stmt:     template for (auto e : pack-or-tuple) {...}  |
 | Reflection:         ^^X (reflect) / [: r :] (splice) / std::meta |
 |    -&gt; enum&lt;-&gt;string, serialization, generic ==, DI: no macros.  |
 | = delete("reason"): friendly deleted-function diagnostics.       |
 | friend Friends...;  variadic friends.                            |
 | constexpr bindings, '_' placeholder, constexpr static_assert msg.|
 +------------------------------------------------------------------+</code></pre></details>
<p>To experiment today:</p>
<pre><code class="language-bash"># pack indexing / bindings packs (mature-ish):
clang++ -std=c++2c examples/ch15_pack_indexing.cpp -o /tmp/d &amp;&amp; /tmp/d

# reflection: needs a P2996-enabled compiler build; see the example header note.
</code></pre>
<p>Next: <a href="16-pitfalls-and-best-practices.md">16-pitfalls-and-best-practices.md</a>.</p>` },
  { name: `18. Pitfalls And Best Practices`, path: `16-pitfalls-and-best-practices.md`, dir: ``, words: 1318, mins: 7, body: `<h1 id="16--pitfalls-error-message-survival--best-practices">16 — Pitfalls, Error-Message Survival &amp; Best Practices</h1>
<p>The knowledge that turns &ldquo;I can write templates&rdquo; into &ldquo;I ship robust template
code.&rdquo; This chapter is a field guide to the traps and the habits that avoid them.</p>
<hr />
<h2 id="1-typename-and-template-disambiguators">1. <code>typename</code> and <code>template</code> disambiguators</h2>
<p>Covered in chapter 00; here&rsquo;s the checklist.</p>
<pre><code class="language-cpp">template &lt;class T&gt;
void f() {
    typename T::value_type x;        // dependent TYPE -&gt; need 'typename'
    T::static_value;                 // dependent VALUE -&gt; no keyword
    obj.template get&lt;0&gt;();           // dependent member TEMPLATE -&gt; 'template'
    typename T::template rebind&lt;U&gt;::other z;  // both, together
}
</code></pre>
<pre><code>   Rule:
     dependent name that is a TYPE      -&gt; prefix 'typename'
     dependent name that is a TEMPLATE  -&gt; prefix 'template' (after . -&gt; ::)
   (C++20 relaxed some cases where 'typename' is now optional, e.g. in return
    types and trailing types, but writing it is always safe.)
</code></pre>
<hr />
<h2 id="2-two-phase-lookup-surprises-names-not-found">2. Two-phase lookup surprises (names not found)</h2>
<p>Names in a base class template are <strong>not</strong> visible unqualified in a derived
template — because at phase 1 the compiler doesn&rsquo;t look into dependent bases.</p>
<pre><code class="language-cpp">template &lt;class T&gt;
struct Base { void helper() {} protected: int data = 0; };

template &lt;class T&gt;
struct Derived : Base&lt;T&gt; {
    void f() {
        // helper();      // ERROR: not found (dependent base not searched)
        this-&gt;helper();   // OK: 'this-&gt;' makes it dependent -&gt; phase 2 lookup
        Base&lt;T&gt;::helper();// OK: explicit qualification
        // data = 1;      // ERROR for the same reason
        this-&gt;data = 1;   // OK
    }
};
</code></pre>
<pre><code>   Unqualified 'helper()' in a template with a DEPENDENT base:
       phase 1: base not examined -&gt; &quot;not declared&quot; error.
   Fix: this-&gt;helper()  or  Base&lt;T&gt;::helper()  (make it dependent).
</code></pre>
<hr />
<h2 id="3-deep-scary-error-messages--how-to-read-them">3. Deep, scary error messages — how to read them</h2>
<pre><code>   Strategy:
   1. Read the FIRST error, not the last. The rest are cascade.
   2. Look for &quot;required from here&quot; / &quot;in instantiation of&quot; lines — they trace
      the CALL that triggered it. Find YOUR line near the top of that trace.
   3. The real cause is usually &quot;no match for operator X&quot; or &quot;no member Y&quot;.
   4. Compile with -ferror-limit=1 (clang) / -fmax-errors=1 (gcc) to cut noise.
   5. Use static_assert with a message to catch the problem early with a
      readable diagnostic (see §8).
   6. In C++20, add concepts -&gt; the error moves to the call site in plain words.
</code></pre>
<pre><code>   error: no match for 'operator&lt;' (operands 'Widget', 'Widget')
   note: in instantiation of 'T std::max(...) [with T = Widget]'
   note: required from 'void my_sort&lt;...&gt;' 
   note: required from here          &lt;-- YOUR call is just above/below this
</code></pre>
<hr />
<h2 id="4-missing-include--incomplete-types">4. Missing <code>#include</code> / incomplete types</h2>
<p>Because instantiation happens at point of use, forgetting a header often shows
up as a template error rather than &ldquo;unknown identifier.&rdquo;</p>
<pre><code>   * Instantiating std::vector&lt;T&gt;::push_back needs T to be complete at that point.
   * &quot;invalid use of incomplete type 'struct X'&quot; inside a template usually means
     you forward-declared X but the instantiation needs its full definition.
</code></pre>
<hr />
<h2 id="5-the-0nullptrbraces-deduction-traps">5. The <code>0</code>/<code>nullptr</code>/braces deduction traps</h2>
<pre><code class="language-cpp">template &lt;class T&gt; void f(T);
// f({1,2,3});          // ERROR: can't deduce T from a braced-init-list
f(std::vector{1,2,3});  // OK (CTAD makes a vector&lt;int&gt; first)

template &lt;class T&gt; void g(T*);
// g(0);                // deduces T from int literal 0? -&gt; 0 is int, not ptr: ERROR
g(nullptr);             // T = ? nullptr_t is not a pointer: also tricky
int* p = nullptr; g(p); // OK: T = int
</code></pre>
<pre><code>   * Templates can't deduce from {braces} (auto can).
   * '0' is an int; prefer nullptr for pointers.
   * A single T for two params needs matching arg types (chapter 01).
</code></pre>
<hr />
<h2 id="6-greedy-forwarding-constructors--assignment">6. Greedy forwarding constructors / assignment</h2>
<p>Chapter 09 §8: a <code>template&lt;class T&gt; C(T&amp;&amp;)</code> can shadow copy/move. Constrain it.</p>
<pre><code class="language-cpp">template &lt;class T&gt;
    requires (!std::same_as&lt;std::remove_cvref_t&lt;T&gt;, C&gt;)   // C++20
C(T&amp;&amp;);
</code></pre>
<p>Also beware forwarding-reference overloads competing with derived-to-base
conversions and <code>initializer_list</code> constructors.</p>
<hr />
<h2 id="7-odr--inline-traps">7. ODR &amp; inline traps</h2>
<pre><code>   * A full specialization of a function template defined in a header must be
     'inline' (it's an ordinary function).
   * static data members of class templates: define inline (C++17) or out-of-line
     once; don't define in every TU.
   * Different template arguments that are &quot;the same&quot; in two TUs must produce the
     SAME instantiation — don't make instantiation depend on macros that differ
     between TUs (ODR violation, often undiagnosed).
   * NTTP with internal-linkage pointers can silently create distinct types.
</code></pre>
<hr />
<h2 id="8-static_assert-early-and-often">8. <code>static_assert</code> early and often</h2>
<p>Put contracts at the top of templates for readable failures:</p>
<pre><code class="language-cpp">template &lt;class T&gt;
class RingBuffer {
    static_assert(std::is_nothrow_move_constructible_v&lt;T&gt;,
                  &quot;RingBuffer&lt;T&gt;: T's move ctor must be noexcept&quot;);
    static_assert(!std::is_reference_v&lt;T&gt;,
                  &quot;RingBuffer&lt;T&gt;: T cannot be a reference&quot;);
    // ...
};
</code></pre>
<p>In C++20 prefer <strong>concepts</strong> on the signature so the check happens at the call
site, not inside the class body.</p>
<hr />
<h2 id="9-compile-time--binary-size-costs">9. Compile-time &amp; binary-size costs</h2>
<pre><code>   * Each distinct instantiation = more code. Watch template bloat:
       - factor type-independent code into non-template base/helpers
         (&quot;thin template&quot; idiom: e.g. vector&lt;T*&gt; all share a vector&lt;void*&gt; core).
       - prefer 'const T&amp;' params to reduce instantiations vs by-value.
   * Deep recursive TMP explodes compile time; prefer constexpr / fold / C++26
     expansion statements.
   * extern template (C++11) suppresses instantiation in a TU:
         extern template class std::vector&lt;MyType&gt;;   // don't instantiate here
       and instantiate once elsewhere:
         template class std::vector&lt;MyType&gt;;
</code></pre>
<pre><code>   Thin-template idiom:
     template&lt;class T&gt; class Vec : VecBase {   // VecBase is non-template,
        ... };                                 // holds the heavy shared logic
   -&gt; N instantiations share ONE copy of the bulk code.
</code></pre>
<hr />
<h2 id="10-prefer-the-modern-tool">10. Prefer the modern tool</h2>
<pre><code>   Instead of...                        Prefer...
   ----------------------------------   ------------------------------------
   enable_if SFINAE                     concepts / requires (C++20)
   tag dispatch                         constrained overloads + subsumption
   class specialization for branching   if constexpr
   recursive value TMP                  constexpr functions
   recursive type-list processing       C++26 reflection (when available)
   CRTP static_cast                     deducing this (C++23)
   manual index_sequence + fold         C++26 template for / binding packs
   hand-written per-struct code         C++26 reflection
</code></pre>
<hr />
<h2 id="11-style--api-guidelines">11. Style &amp; API guidelines</h2>
<pre><code>   * Constrain your templates. Unconstrained templates = bad errors + accidental
     matches. Even a light concept helps.
   * Name your concepts; compose overload sets from named concepts (subsumption).
   * Keep templates in headers; document required operations if not using concepts.
   * Provide deduction guides for your class templates when CTAD needs help.
   * Make move ctors noexcept (containers rely on it for strong guarantees).
   * Prefer 'typename' spelled out for clarity even when optional.
   * Don't over-genericize: if only two types are ever used, overloads may be
     simpler and compile faster than a template.
   * Test instantiation with representative types via static_assert / small mains.
</code></pre>
<hr />
<h2 id="12-quick-why-wont-this-compile-flowchart">12. Quick &ldquo;why won&rsquo;t this compile?&rdquo; flowchart</h2>
<pre><code>   Compile error in template code
        |
   Is it &quot;expected type, got value&quot; / &quot;need typename&quot;?   -&gt; add 'typename' (§1)
        |
   &quot;X was not declared&quot; but X is in a base?               -&gt; this-&gt;X / Base&lt;T&gt;::X (§2)
        |
   &quot;no matching function&quot;?  -&gt; check deduction (ch 04), SFINAE removed all? (ch 07)
        |                       -&gt; add explicit args f&lt;T&gt;(...) or fix constraints
        |
   &quot;no member / no operator&quot; deep in a lib?  -&gt; your type misses an operation.
        |                       -&gt; read FIRST error + &quot;required from here&quot; (§3)
        |
   &quot;call to deleted / ambiguous&quot;?  -&gt; overload/constraint clash (ch 05/13)
        |
   Still stuck?  -&gt; add static_assert probes / TypeShow&lt;T&gt; (ch 04 §9) / concepts.
</code></pre>
<hr />

<p>One-page-ish quick reference. Assumes you&rsquo;ve read the chapters; this is recall,
not teaching.</p>
<hr />
<h2 id="declaring">Declaring</h2>
<pre><code class="language-cpp">template &lt;class T&gt; ...                    // type parameter
template &lt;typename T&gt; ...                 // same
template &lt;int N&gt; ...                      // non-type (NTTP)
template &lt;auto V&gt; ...                     // C++17: deduced-type NTTP
template &lt;double D&gt; ...                   // C++20: floating NTTP
template &lt;FixedString S&gt; ...              // C++20: class-type NTTP (structural)
template &lt;template &lt;class...&gt; class C&gt; ...// template-template parameter
template &lt;class... Ts&gt; ...                // parameter pack
template &lt;class T = int&gt; ...              // default argument
template &lt;std::integral T&gt; ...            // C++20: constrained parameter
</code></pre>
<h2 id="the-five-templatable-things">The five templatable things</h2>
<pre><code class="language-cpp">template &lt;class T&gt; T f(T);                          // function
template &lt;class T&gt; struct S { ... };                // class
template &lt;class T&gt; constexpr T pi = T(3.14159L);    // variable (C++14)
template &lt;class T&gt; using Vec = std::vector&lt;T&gt;;      // alias (C++11)
template &lt;class T&gt; concept C = ...;                 // concept (C++20)
</code></pre>
<h2 id="deduction-quick-table">Deduction quick table</h2>
<pre><code>  PARAM      ARG            T            NOTES
  T          const int&amp;     int          by value: decays
  T&amp;         const int      const int    ref: preserves const
  const T&amp;   anything       bare type    binds all; workhorse
  T&amp;&amp;        lvalue X       X&amp;           forwarding ref (collapsing)
  T&amp;&amp;        rvalue X       X            forwarding ref
  T(&amp;)[N]    int[10]        T=int,N=10   deduce array size
  auto       expr           like T       decays
  auto&amp;&amp;     expr           fwd ref      lvalue-&gt;&amp;, rvalue-&gt;&amp;&amp;
  decltype(auto) expr       exact        no decay
</code></pre>
<h2 id="specialization">Specialization</h2>
<pre><code class="language-cpp">template &lt;class T&gt; struct S    { };        // primary
template &lt;&gt;        struct S&lt;int&gt;{ };        // full
template &lt;class T&gt; struct S&lt;T*&gt;{ };         // partial (classes/vars only)
template &lt;class T&gt; constexpr bool v = ...;  // variable template + specialize
</code></pre>
<h2 id="variadic--packs">Variadic / packs</h2>
<pre><code class="language-cpp">template &lt;class... Ts&gt; void f(Ts... xs);   // declare
f(xs...);                                   // expand
sizeof...(Ts)                               // count
(xs + ...)          (... + xs)              // unary R / L fold
(xs + ... + 0)      (0 + ... + xs)          // binary R / L fold (empty-safe)
((cout &lt;&lt; xs &lt;&lt; ' '), ...);                 // comma fold (per-element effects)
xs...[0]   Ts...[0]                          // C++26 pack indexing
auto [head, ...tail] = t;                   // C++26 binding pack
template for (auto e : t) { ... }           // C++26 expansion statement
</code></pre>
<h2 id="forwarding">Forwarding</h2>
<pre><code class="language-cpp">template &lt;class... A&gt; R f(A&amp;&amp;... a) { g(std::forward&lt;A&gt;(a)...); }  // perfect fwd
decltype(auto) wrap(F&amp;&amp; f, A&amp;&amp;... a) {                              // fwd result
    return std::forward&lt;F&gt;(f)(std::forward&lt;A&gt;(a)...);
}
// move (owned local): std::move(x)   |   forward (fwd-ref param): forward&lt;T&gt;(x)
</code></pre>
<h2 id="sfinae-legacy-vs-concepts-modern">SFINAE (legacy) vs concepts (modern)</h2>
<pre><code class="language-cpp">// SFINAE
template &lt;class T, std::enable_if_t&lt;std::is_integral_v&lt;T&gt;, int&gt; = 0&gt; void f(T);
template &lt;class T&gt; auto g(T x) -&gt; decltype(x.size());        // expression SFINAE
template &lt;class T, class = void&gt; struct has_x : std::false_type {};
template &lt;class T&gt; struct has_x&lt;T, std::void_t&lt;typename T::x&gt;&gt; : std::true_type {};

// Concepts (prefer)
template &lt;std::integral T&gt; void f(T);
void f(std::integral auto x);
template &lt;class T&gt; requires requires (T v){ v.size(); } void g(T);
template &lt;class T&gt; concept HasX = requires { typename T::x; };
</code></pre>
<h2 id="requires-requirement-kinds"><code>requires</code> requirement kinds</h2>
<pre><code class="language-cpp">requires (T a) {
    a.foo();                              // simple: valid expression
    typename T::type;                     // type requirement
    { a.size() } -&gt; std::convertible_to&lt;std::size_t&gt;;   // compound
    { a.f() } noexcept;                   // + noexcept
    requires std::copyable&lt;T&gt;;            // nested boolean
};
</code></pre>
<h2 id="constexpr-family">constexpr family</h2>
<pre><code class="language-cpp">constexpr int f();        // compile-time IF possible, else runtime
consteval int g();        // MUST be compile-time (immediate)
constinit int x = f();    // compile-time INIT, still mutable
if constexpr (cond) {...} // discard the untaken branch
if consteval {...} else {...}          // C++23: branch on evaluation context
template &lt;class...&gt; constexpr bool always_false = false;   // for else-&gt;error
</code></pre>
<h2 id="type-traits-naming-patterns">Type traits (naming patterns)</h2>
<pre><code class="language-cpp">std::is_integral_v&lt;T&gt;          // predicate -&gt; bool (_v)
std::remove_cvref_t&lt;T&gt;         // transform -&gt; type (_t)  (C++20)
std::decay_t&lt;T&gt;                // pass-by-value transform
std::conditional_t&lt;B, X, Y&gt;    // compile-time ?: on types
std::conjunction_v&lt;A,B,C&gt;      // short-circuit &amp;&amp;
std::invoke_result_t&lt;F, A...&gt;  // return type of F(A...)
std::is_invocable_v&lt;F, A...&gt;   // callable?
std::type_identity_t&lt;T&gt;        // non-deduced context helper
static_assert(trait_v&lt;T&gt;, &quot;message&quot;);   // guardrail
</code></pre>
<h2 id="patterns">Patterns</h2>
<pre><code class="language-cpp">// CRTP
template &lt;class D&gt; struct Base { void i(){ static_cast&lt;D*&gt;(this)-&gt;impl(); } };
struct X : Base&lt;X&gt; { void impl(); };

// Deducing this (C++23) — CRTP replacement
struct Base { template &lt;class Self&gt; void i(this Self&amp;&amp; s){ s.impl(); } };

// Policy
template &lt;class T, class Policy = Default&gt; class Host { /* Policy::act() */ };

// Type erasure: Wrapper{ unique_ptr&lt;Concept&gt; }, Model&lt;T&gt;: Concept
// overloaded visitor (variant):
template &lt;class... F&gt; struct overloaded : F... { using F::operator()...; };
template &lt;class... F&gt; overloaded(F...) -&gt; overloaded&lt;F...&gt;;
</code></pre>
<h2 id="ctad--guides">CTAD &amp; guides</h2>
<pre><code class="language-cpp">std::vector v{1,2,3};                       // deduced vector&lt;int&gt;
template &lt;class T&gt; Box(T) -&gt; Box&lt;T&gt;;         // deduction guide
</code></pre>
<h2 id="disambiguators">Disambiguators</h2>
<pre><code class="language-cpp">typename T::value_type x;      // dependent type
obj.template get&lt;0&gt;();         // dependent member template
this-&gt;member;  Base&lt;T&gt;::member;// dependent base member
</code></pre>
<h2 id="c-version---feature-map">C++ version -&gt; feature map</h2>
<pre><code>  C++11: templates, variadics, alias templates, decltype, trailing return,
         extern template, forwarding refs, std::forward/move
  C++14: variable templates, generic lambdas, constexpr(loops),
         make_index_sequence, decltype(auto), auto return
  C++17: CTAD, auto NTTP, fold expressions, if constexpr, void_t,
         class-template auto, inline variables, constexpr lambda
  C++20: CONCEPTS, requires, abbreviated fn templates (auto params),
         class-type NTTP, consteval/constinit, operator&lt;=&gt;, remove_cvref,
         ranges, is_constant_evaluated, constexpr new/vector/string
  C++23: deducing this, if consteval, auto(x), multidim operator[],
         mdspan, expected, static operator(), constexpr unique_ptr
  C++26: static reflection (^^ / [::]), pack indexing (pack...[i]),
         expansion statements (template for), structured-binding packs,
         variadic friends, = delete(&quot;reason&quot;), constexpr bindings,
         '_' placeholder, user-generated static_assert messages, contracts
</code></pre>
<h2 id="the-decision-cheat">The decision cheat</h2>
<pre><code>  value at compile time?          -&gt; constexpr/consteval function
  branch on type in a template?   -&gt; if constexpr
  constrain / overload on props?  -&gt; concepts (subsumption)
  detect capability?              -&gt; requires-expression
  compute a TYPE?                 -&gt; traits / type lists (-&gt; C++26 reflection)
  runtime heterogeneous storage?  -&gt; type erasure
  zero-overhead reuse of methods? -&gt; CRTP / deducing this
  configurable behavior?          -&gt; policy parameters
  forward args untouched?         -&gt; T&amp;&amp;... + std::forward
</code></pre>
<hr />
<p>Back to the <a href="README.md">README</a>.</p>` },

<pre><code class="language-cpp">// ch01 — a generic for_each clone (function template + deduction)
// build: clang++ -std=c++20 -Wall -Wextra ch01_for_each.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;vector&gt;

template &lt;class Iter, class Func&gt;
Func my_for_each(Iter first, Iter last, Func fn) {
    for (; first != last; ++first)
        fn(*first);
    return fn;
}

int main() {
    std::vector&lt;int&gt; v{1, 2, 3, 4};
    my_for_each(v.begin(), v.end(),
                [](int x) { std::cout &lt;&lt; x * x &lt;&lt; ' '; });
    std::cout &lt;&lt; '\\n';   // 1 4 9 16
}

</code></pre>` },
  { name: `21. Examples / Ch02 Owned`, path: `examples/ch02_owned.cpp`, dir: `examples`, words: 150, mins: 1, body: `<h1 id="ch02_ownedcpp">ch02_owned.cpp</h1>
<pre><code class="language-cpp">// ch02 — a minimal unique_ptr-like class template
// build: clang++ -std=c++20 -Wall -Wextra ch02_owned.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;utility&gt;

template &lt;class T&gt;
class Owned {
    T* ptr_;
public:
    explicit Owned(T* p = nullptr) : ptr_(p) {}
    ~Owned() { delete ptr_; }

    Owned(const Owned&amp;)            = delete;
    Owned&amp; operator=(const Owned&amp;) = delete;

    Owned(Owned&amp;&amp; o) noexcept : ptr_(o.ptr_) { o.ptr_ = nullptr; }
    Owned&amp; operator=(Owned&amp;&amp; o) noexcept {
        if (this != &amp;o) { delete ptr_; ptr_ = o.ptr_; o.ptr_ = nullptr; }
        return *this;
    }

    T&amp;  operator*()  const { return *ptr_; }
    T*  operator-&gt;() const { return  ptr_; }
    explicit operator bool() const { return ptr_ != nullptr; }
};

int main() {
    Owned&lt;int&gt; a(new int(7));
    std::cout &lt;&lt; *a &lt;&lt; '\\n';                       // 7
    Owned&lt;int&gt; b = std::move(a);
    std::cout &lt;&lt; (a ? &quot;a full&quot; : &quot;a empty&quot;) &lt;&lt; '\\n';// a empty
    std::cout &lt;&lt; *b &lt;&lt; '\\n';                        // 7
}

</code></pre>` },
  { name: `22. Examples / Ch03 Ratio`, path: `examples/ch03_ratio.cpp`, dir: `examples`, words: 126, mins: 1, body: `<h1 id="ch03_ratiocpp">ch03_ratio.cpp</h1>
<pre><code class="language-cpp">// ch03 — compile-time Ratio using NTTPs + alias templates
// build: clang++ -std=c++20 -Wall -Wextra ch03_ratio.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;numeric&gt;

template &lt;int Num, int Den = 1&gt;
struct Ratio {
    static_assert(Den != 0, &quot;denominator cannot be zero&quot;);
    static constexpr int num = Num / std::gcd(Num, Den);
    static constexpr int den = Den / std::gcd(Num, Den);
    static constexpr double value = static_cast&lt;double&gt;(num) / den;
};

template &lt;class R1, class R2&gt;
using RatioAdd = Ratio&lt;R1::num * R2::den + R2::num * R1::den,
                       R1::den * R2::den&gt;;

int main() {
    using Half  = Ratio&lt;1, 2&gt;;
    using Third = Ratio&lt;1, 3&gt;;
    using Sum   = RatioAdd&lt;Half, Third&gt;;
    std::cout &lt;&lt; Sum::num &lt;&lt; &quot;/&quot; &lt;&lt; Sum::den
              &lt;&lt; &quot; = &quot; &lt;&lt; Sum::value &lt;&lt; '\\n';   // 5/6 = 0.833333
}

</code></pre>` },

<pre><code class="language-cpp">// ch04 — deduction demonstration + the &quot;reveal T&quot; trick.

<pre><code class="language-cpp">// ch06 — a tiny recursive tuple (variadic class template)
// build: clang++ -std=c++20 -Wall -Wextra ch06_tuple.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;
#include &lt;string&gt;

template &lt;class... Ts&gt; struct Tuple;

template &lt;&gt;
struct Tuple&lt;&gt; {};

template &lt;class Head, class... Tail&gt;
struct Tuple&lt;Head, Tail...&gt; : Tuple&lt;Tail...&gt; {
    Head head;
    Tuple(Head h, Tail... t) : Tuple&lt;Tail...&gt;(t...), head(h) {}
};

// get&lt;0&gt; returns head; get&lt;N&gt; recurses into the base.
template &lt;std::size_t I, class Head, class... Tail&gt;
auto&amp; get(Tuple&lt;Head, Tail...&gt;&amp; t) {
    if constexpr (I == 0) return t.head;
    else                  return get&lt;I - 1&gt;(static_cast&lt;Tuple&lt;Tail...&gt;&amp;&gt;(t));
}

int main() {
    Tuple&lt;int, double, std::string&gt; t(1, 2.5, &quot;hi&quot;);
    std::cout &lt;&lt; get&lt;0&gt;(t) &lt;&lt; ' '
              &lt;&lt; get&lt;1&gt;(t) &lt;&lt; ' '
              &lt;&lt; get&lt;2&gt;(t) &lt;&lt; '\\n';   // 1 2.5 hi

<pre><code class="language-cpp">// ch07 — expression SFINAE selecting overloads by capability

<pre><code class="language-cpp">// ch09 — perfect forwarding: copy for lvalues, move for rvalues
// build: clang++ -std=c++20 -Wall -Wextra ch09_forwarding.cpp -o /tmp/d &amp;&amp; /tmp/d

    forward_to_sink(h);               // COPY

  { name: `30. Examples / Ch10 Crtp`, path: `examples/ch10_crtp.cpp`, dir: `examples`, words: 272, mins: 1, body: `<h1 id="ch10_crtpcpp">ch10_crtp.cpp</h1>
<pre><code class="language-cpp">// ch10 — CRTP: static polymorphism + a comparison mixin
// build: clang++ -std=c++20 -Wall -Wextra ch10_crtp.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;iostream&gt;

template &lt;class Derived&gt;
struct Shape {
    double area() const { return static_cast&lt;const Derived&amp;&gt;(*this).area_impl(); }
};

struct Circle : Shape&lt;Circle&gt; {
    double r;
    explicit Circle(double r) : r(r) {}
    double area_impl() const { return 3.14159265 * r * r; }
};

struct Square : Shape&lt;Square&gt; {
    double s;
    explicit Square(double s) : s(s) {}
    double area_impl() const { return s * s; }
};

// comparison mixin: define == and &lt;, get the rest for free
template &lt;class D&gt;
struct Comparable {
    friend bool operator!=(const D&amp; a, const D&amp; b) { return !(a == b); }
    friend bool operator&gt; (const D&amp; a, const D&amp; b) { return b &lt; a; }
    friend bool operator&lt;=(const D&amp; a, const D&amp; b) { return !(b &lt; a); }
    friend bool operator&gt;=(const D&amp; a, const D&amp; b) { return !(a &lt; b); }
};

struct Version : Comparable&lt;Version&gt; {
    int major, minor;
    Version(int mj, int mn) : major(mj), minor(mn) {}
    friend bool operator==(const Version&amp; a, const Version&amp; b) {
        return a.major == b.major &amp;&amp; a.minor == b.minor;
    }
    friend bool operator&lt;(const Version&amp; a, const Version&amp; b) {
        return a.major &lt; b.major || (a.major == b.major &amp;&amp; a.minor &lt; b.minor);
    }
};

int main() {
    Circle c(2); Square s(3);
    std::cout &lt;&lt; &quot;circle area &quot; &lt;&lt; c.area() &lt;&lt; '\\n';   // 12.566
    std::cout &lt;&lt; &quot;square area &quot; &lt;&lt; s.area() &lt;&lt; '\\n';   // 9

    Version a{1, 2}, b{1, 5};
    std::cout &lt;&lt; (a &lt; b) &lt;&lt; (a != b) &lt;&lt; (b &gt;= a) &lt;&lt; '\\n';  // 111
}

</code></pre>` },
  { name: `31. Examples / Ch10 Type Erasure`, path: `examples/ch10_type_erasure.cpp`, dir: `examples`, words: 166, mins: 1, body: `<h1 id="ch10_type_erasurecpp">ch10_type_erasure.cpp</h1>
<pre><code class="language-cpp">// ch10 — type erasure: runtime polymorphism without inheritance
// build: clang++ -std=c++20 -Wall -Wextra ch10_type_erasure.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;memory&gt;
#include &lt;vector&gt;
#include &lt;iostream&gt;

class Drawable {
    struct Concept {
        virtual ~Concept() = default;
        virtual void do_draw() const = 0;
        virtual std::unique_ptr&lt;Concept&gt; clone() const = 0;
    };
    template &lt;class T&gt;
    struct Model : Concept {
        T obj;
        explicit Model(T o) : obj(std::move(o)) {}
        void do_draw() const override { draw(obj); }        // found via ADL
        std::unique_ptr&lt;Concept&gt; clone() const override {
            return std::make_unique&lt;Model&gt;(*this);
        }
    };
    std::unique_ptr&lt;Concept&gt; self_;
public:
    template &lt;class T&gt;
    Drawable(T x) : self_(std::make_unique&lt;Model&lt;T&gt;&gt;(std::move(x))) {}
    Drawable(const Drawable&amp; o) : self_(o.self_-&gt;clone()) {}
    Drawable&amp; operator=(Drawable o) { self_ = std::move(o.self_); return *this; }

    friend void draw(const Drawable&amp; d) { d.self_-&gt;do_draw(); }
};

struct Circle {};
struct Square {};
void draw(const Circle&amp;) { std::cout &lt;&lt; &quot;circle\\n&quot;; }
void draw(const Square&amp;) { std::cout &lt;&lt; &quot;square\\n&quot;; }

int main() {
    std::vector&lt;Drawable&gt; shapes;
    shapes.emplace_back(Circle{});
    shapes.emplace_back(Square{});
    shapes.emplace_back(Circle{});
    for (const auto&amp; s : shapes) draw(s);   // circle / square / circle
}

</code></pre>` },

// Prettify function in JS (matching Python's prettify)
function prettify(component) {
    let c = component.replace(/^[0-9]+[_-]/, '');
    c = c.replace(/_/g, ' ').replace(/-/g, ' ').trim();
    if (c.toLowerCase() === 'readme') return 'README';
    if (c.toLowerCase() === 'cheatsheet') return 'Cheatsheet';
    return c.replace(/\b\w/g, l => l.toUpperCase());
}

// Like prettify(), but keeps any leading "01_"/"2-" style number as a "01. "
// prefix so the sidebar mirrors the on-disk ordering of the documents.
function prettifyKeepNum(component) {
    const m = component.match(/^([0-9]+)[_-]/);
    const prefix = m ? m[1] + '. ' : '';
    return prefix + prettify(component);
}

const HTML_ESCAPES = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' };
function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => HTML_ESCAPES[c]); }
function cleanName(name) { return (name || '').replace(/^\s*\d+\.\s*/, ''); }

}

/* ───── Cross-document link resolution (supports nested folders) ─────
   Docs may live in sub-directories and link to each other with relative
   paths ("../03_patterns/README.md"), bare files ("CHEATSHEET.md") or even a
   folder ("01_pthreads/"), which we resolve to that folder's README. */
/* - Nagesh N Nazare - */
const BY_PATH = {};        // "01_pthreads/readme.md"  -> idx
const BY_DIR_README = {};  // "01_pthreads" / ""        -> idx (README of dir)
const BY_BASENAME = {};    // "cheatsheet.md"           -> idx (only if unique)
const BASENAME_DUP = {};

TAB_DATA.forEach((tab, idx) => {
    const path = (tab.path || '').toLowerCase();
    if (path) BY_PATH[path] = idx;
    const base = path.split('/').pop();
    if (base) {
        if (Object.prototype.hasOwnProperty.call(BY_BASENAME, base)) BASENAME_DUP[base] = true;
        else BY_BASENAME[base] = idx;
    }
    if (base === 'readme.md') {
        BY_DIR_README[(tab.dir || '').toLowerCase()] = idx;
    }
});
Object.keys(BASENAME_DUP).forEach(b => { delete BY_BASENAME[b]; });

/* Join a relative href onto a base directory and normalize . / .. segments. */
function joinPath(baseDir, rel) {
    if (rel.charAt(0) === '/') { baseDir = ''; rel = rel.replace(/^\/+/, ''); }
    const parts = (baseDir ? baseDir.split('/') : []).concat(rel.split('/'));
    const out = [];
    for (const p of parts) {
        if (p === '' || p === '.') continue;
        if (p === '..') { out.pop(); continue; }
        out.push(p);
    }
    return out.join('/');
}

function mdTarget(rawHref, baseDir) {
    if (!rawHref || rawHref.charAt(0) === '#') return null;
    if (/^[a-z][a-z0-9+.-]*:\/\//i.test(rawHref) || /^(mailto|tel):/i.test(rawHref)) return null;

    let anchor = '';
    let pathPart = rawHref;
    const hashIdx = pathPart.indexOf('#');
    if (hashIdx >= 0) {
        anchor = pathPart.substring(hashIdx + 1);
        pathPart = pathPart.substring(0, hashIdx);
        try { anchor = decodeURIComponent(anchor); } catch (e) {}
    }
    const qIdx = pathPart.indexOf('?');
    if (qIdx >= 0) pathPart = pathPart.substring(0, qIdx);
    if (!pathPart) return null;

    const joined = joinPath(baseDir || '', pathPart).toLowerCase();
    let idx;
    if (/\.md$/i.test(pathPart)) {
        idx = BY_PATH[joined];
        if (idx === undefined) {
            const base = joined.split('/').pop();
            idx = BY_BASENAME[base];
        }
    } else {
        // a directory reference -> that folder's README
        idx = BY_DIR_README[joined];
    }
    if (idx === undefined) return null;
    return { idx: idx, anchor: anchor };
}

function baseDirOf(node) {
    const panel = node && node.closest ? node.closest('.tab-content') : null;
    return panel ? (panel.dataset.dir || '') : '';
}

/* Tag links so we can style internal navigation distinctly from external ones. */
function classifyLinks() {
    document.querySelectorAll('.tab-content a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (!href) return;
        if (href.charAt(0) === '#') {
            a.classList.add('anchor-link');
        } else if (mdTarget(href, baseDirOf(a))) {
            a.classList.add('xref-link');
        } else if (/^[a-z][a-z0-9+.-]*:\/\//i.test(href)) {
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
        }
    });
}

function addCopyButton(pre, block) {
    const btn = document.createElement('button');
    btn.className = 'code-copy-btn';
    btn.type = 'button';
    btn.textContent = 'Copy';
    btn.addEventListener('click', () => {
        const text = block.innerText;
        const done = () => {
            btn.textContent = 'Copied';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1600);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
        } else {
            fallbackCopy(text, done);
        }
    });
    pre.appendChild(btn);
}

function fallbackCopy(text, done) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
}

function highlightAllCode() {
    document.querySelectorAll('.tab-content pre code').forEach(block => {
        if (block.dataset.highlighted === '1') return;
        const pre = block.closest('pre');
        const langClass = Array.from(block.classList).find(c => c.startsWith('language-'));
        if (langClass) {
            const lang = langClass.replace('language-', '');
            const label = document.createElement('span');
            label.className = 'code-lang-label';
            label.textContent = lang;
            pre.appendChild(label);
        }
        hljs.highlightElement(block);
        addCopyButton(pre, block);
        block.dataset.highlighted = '1';
    });
}

// Apply a theme. `persist` is true ONLY for an explicit user action; auto/OS
// applications must NOT write to storage, otherwise the very first auto theme
// would look like an explicit choice and we'd stop following the OS.
function setTheme(theme, persist) {
    document.body.setAttribute('data-theme', theme);
    hljsLink.href = theme === 'light' ? HLJS_LIGHT : HLJS_DARK;
    themeToggleBtn.innerHTML = (theme === 'light' ? ICON_SUN : ICON_MOON);

/* - Nagesh N Nazare - */

function activateTab(idx, resetScroll) {
    if (resetScroll === undefined) resetScroll = true;
    document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + idx).classList.add('active');
    docSelect.value = String(idx);
    docList.querySelectorAll('a').forEach(a => {
        a.classList.toggle('nav-doc-active', parseInt(a.dataset.docIdx, 10) === idx);
    });
    const activeLink = docList.querySelector(`a[data-doc-idx="${idx}"]`);
    if (activeLink) {
        let parent = activeLink.closest('.nav-dir-item');
        while (parent) {
            parent.classList.add('expanded');
            parent = parent.parentElement.closest('.nav-dir-item');
        }
    }
    if (window.innerWidth <= 1024) {
        sidebarNav.classList.add('collapsed');
        document.body.classList.add('sidebar-collapsed');
        const tSidebar = document.getElementById('tocSidebar');
        if (tSidebar) {
            tSidebar.classList.add('collapsed');
            document.body.classList.add('toc-collapsed');
        }
    }
    history.replaceState(null, null, '#tab-' + idx);
    if (typeof buildToc === 'function') buildToc(idx);
    // Reflect the active document's title in the condensing navbar. Use the
    // full name (including any leading number) so it matches the picker exactly.
    if (navDocTitle && TAB_DATA[idx]) {
        navDocTitle.textContent = TAB_DATA[idx].name;
    }
    if (typeof updateDocNav === 'function') updateDocNav(idx);
    // Jump back to the top when switching documents so the reader starts at
    // the beginning rather than wherever the previous doc was scrolled to.
    if (resetScroll) {
        window.scrollTo({ top: 0, behavior: 'auto' });
        document.body.classList.remove('nav-condensed');
        navLastY = 0;
    }
    LS.set('doc-last-idx', String(idx));
}

/* ───── Lightweight state persistence (no per-scroll writes) ─────
   Remembers the last document, sidebar/TOC open state and scroll position so
   reopening the file resumes where you left off. Writes happen only on tab
   switch, panel toggle and page hide -- never during scrolling. */
/* - Nagesh N Nazare - */
const LS = {
    get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
    set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} },
};

function persistScroll() {
    LS.set('doc-last-idx', String(currentTabIdx()));
    LS.set('doc-last-y', String(Math.round(window.scrollY)));
}
window.addEventListener('pagehide', persistScroll);
document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'hidden') persistScroll();
});

/* ───── Search index: pre-extract plain text per block ───── */
/* - Nagesh N Nazare - */

const searchIndex = [];

TAB_DATA.forEach((tab, tabIdx) => {
    const tmp = document.createElement('div');
    tmp.innerHTML = tab.body;
    let currentHeading = '';

    function walk(node) {
        for (const child of node.childNodes) {
            if (child.nodeType === Node.ELEMENT_NODE) {
                const tag = child.tagName;
                if (/^H[1-6]$/.test(tag)) {
                    currentHeading = child.textContent.trim();
                }
                const text = child.textContent.trim();
                if (text.length > 0) {
                    searchIndex.push({
                        tabIdx: tabIdx,
                        tabName: tab.name,
                        heading: currentHeading,
                        text: text,
                        tag: tag
                    });
                }
                if (/^(P|LI|TD|TH|BLOCKQUOTE|PRE|H[1-6])$/.test(tag)) {
                    continue;
                }
                walk(child);
            }
        }
    }
    walk(tmp);
});

const overlay = document.getElementById('searchOverlay');
const searchInput = document.getElementById('searchInput');
const searchTrigger = document.getElementById('searchTrigger');
const srBody = document.getElementById('srBody');
const srCount = document.getElementById('srCount');
let srActiveIdx = -1;
let srResults = [];

function openSearch() {
    overlay.classList.add('open');
    searchInput.value = '';
    searchInput.focus();
    srBody.innerHTML = '<div class="sr-empty">Type to search across all tabs</div>';
    srCount.textContent = '';
    srActiveIdx = -1;
    srResults = [];
}

function closeSearch() {
    overlay.classList.remove('open');
    searchInput.value = '';
}

searchTrigger.addEventListener('click', openSearch);

overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeSearch();
});

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        if (overlay.classList.contains('open')) closeSearch();
        else openSearch();
        return;
    }
    if (e.key === '/' && !overlay.classList.contains('open') &&
        !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) {
        e.preventDefault();
        openSearch();
        return;
    }
    if (e.key === 'Escape' && overlay.classList.contains('open')) {
        closeSearch();
        return;
    }
    if (overlay.classList.contains('open')) {
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (srResults.length > 0) {
                srActiveIdx = Math.min(srActiveIdx + 1, srResults.length - 1);
                updateActiveResult();
            }
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (srResults.length > 0) {
                srActiveIdx = Math.max(srActiveIdx - 1, 0);
                updateActiveResult();
            }
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (srActiveIdx >= 0 && srActiveIdx < srResults.length) {
                navigateToResult(srResults[srActiveIdx]);
            }
        }
    }
});

function updateActiveResult() {
    srBody.querySelectorAll('.sr-item').forEach((el, i) => {
        el.classList.toggle('sr-active', i === srActiveIdx);
    });
    const active = srBody.querySelector('.sr-active');
    if (active) active.scrollIntoView({ block: 'nearest' });
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function highlightSnippet(text, query, maxLen) {
    const lower = text.toLowerCase();
    const qLower = query.toLowerCase();
    const pos = lower.indexOf(qLower);
    if (pos < 0) return text.substring(0, maxLen);

    const pad = Math.floor((maxLen - query.length) / 2);
    let start = Math.max(0, pos - pad);
    let end = Math.min(text.length, pos + query.length + pad);
    let snippet = text.substring(start, end);
    if (start > 0) snippet = '...' + snippet;
    if (end < text.length) snippet = snippet + '...';

    const re = new RegExp('(' + escapeRegex(query) + ')', 'gi');
    return snippet.replace(re, '<mark>$1</mark>');
}

let searchTimer = null;
searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(runSearch, 120);
});

function runSearch() {
    const query = searchInput.value.trim();
    if (query.length < 2) {
        srBody.innerHTML = '<div class="sr-empty">Type at least 2 characters</div>';
        srCount.textContent = '';
        srResults = [];
        srActiveIdx = -1;
        return;
    }

    const qLower = query.toLowerCase();
    const matches = [];
    const seen = new Set();

    for (const entry of searchIndex) {
        if (entry.text.toLowerCase().includes(qLower)) {
            const key = entry.tabIdx + ':' + entry.heading + ':' + entry.text.substring(0, 80);
            if (seen.has(key)) continue;
            seen.add(key);
            matches.push(entry);
            if (matches.length >= 100) break;
        }
    }

    srResults = matches;
    srActiveIdx = matches.length > 0 ? 0 : -1;

    if (matches.length === 0) {
        srBody.innerHTML = '<div class="sr-empty">No results for "' +
            query.replace(/</g,'&lt;') + '"</div>';
        srCount.textContent = '0 results';
        return;
    }

    srCount.textContent = matches.length >= 100 ? '100+ results' : matches.length + ' result' + (matches.length > 1 ? 's' : '');

    let html = '';
    matches.forEach((m, i) => {
        const snippet = highlightSnippet(m.text, query, 160);
        html += '<div class="sr-item' + (i === 0 ? ' sr-active' : '') + '" data-ridx="' + i + '">';
        html += '<div class="sr-item-tab">' + m.tabName + '</div>';
        if (m.heading) html += '<div class="sr-item-heading">' + m.heading.replace(/</g,'&lt;') + '</div>';
        html += '<div class="sr-item-snippet">' + snippet + '</div>';
        html += '</div>';
    });
    srBody.innerHTML = html;

    srBody.querySelectorAll('.sr-item').forEach(el => {
        el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.ridx, 10);
            navigateToResult(srResults[idx]);
        });
    });
}

function navigateToResult(result) {
    const savedQuery = searchInput.value.trim() || result.text.substring(0, 20);
    pushHistory();
    closeSearch();
    activateTab(result.tabIdx, false);

    requestAnimationFrame(() => {
        clearHighlights();
        const panel = document.getElementById('panel-' + result.tabIdx);
        const qLower = savedQuery.toLowerCase();
        const qLen = savedQuery.length;

        const hits = [];
        const walker = document.createTreeWalker(panel, NodeFilter.SHOW_TEXT);
        while (walker.nextNode()) {
            const node = walker.currentNode;
            const idx = node.textContent.toLowerCase().indexOf(qLower);
            if (idx >= 0) {
                hits.push({ node: node, offset: idx });
            }
        }

        let firstMark = null;
        for (let i = hits.length - 1; i >= 0; i--) {
            const h = hits[i];
            const range = document.createRange();
            range.setStart(h.node, h.offset);
            range.setEnd(h.node, h.offset + qLen);
            const mark = document.createElement('span');
            mark.className = 'search-highlight';
            mark.dataset.searchHighlight = '1';
            try { range.surroundContents(mark); firstMark = mark; } catch(e) {}
        }

        if (firstMark) {
            firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        setTimeout(clearHighlights, 6000);
    });
}

function clearHighlights() {
    document.querySelectorAll('[data-search-highlight]').forEach(el => {
        const parent = el.parentNode;
        parent.replaceChild(document.createTextNode(el.textContent), el);
        parent.normalize();
    });
}

/* ───── Sidebar TOC + scroll spy ───── */
/* - Nagesh N Nazare - */

const sidebarNav = document.getElementById('sidebarNav');
const navList = document.getElementById('navList');
const sidebarToggle = document.getElementById('sidebarToggle');
const readProgress = document.getElementById('readProgress');
const toTopBtn = document.getElementById('toTop');
let currentTocHeadings = [];

function buildToc(panelIdx) {
    navList.innerHTML = '';
    currentTocHeadings = [];
    const panel = document.getElementById('panel-' + panelIdx);
    if (!panel) return;
    const headings = panel.querySelectorAll('h1, h2, h3, h4');
    headings.forEach((h, i) => {
        if (!h.id) h.id = 'autoid-' + panelIdx + '-' + i;
        // Capture the clean heading text once (before any permalink anchor is
        // added) so the TOC label never picks up the trailing '#'.
        let title = h.getAttribute('data-title');
        if (title === null) {
            title = h.textContent;
            h.setAttribute('data-title', title);
            // Add a hover-revealed permalink anchor (built lazily, only for the
            // doc currently being viewed).
            const perma = document.createElement('a');
            perma.className = 'heading-anchor';
            perma.href = '#' + h.id;
            perma.textContent = '#';
            perma.setAttribute('aria-label', 'Copy link to this section');
            perma.title = 'Copy link to this section';
            const headingId = h.id;
            perma.addEventListener('click', function(e) {
                e.preventDefault();
                // Keep the doc-content click handler from also firing (it would
                // re-run scroll/history logic and resolve duplicate ids).
                e.stopPropagation();
                const url = location.href.split('#')[0] + '#' + headingId;
                const flash = function() {
                    perma.classList.remove('copied');
                    // Force reflow so the animation restarts on rapid clicks.
                    void perma.offsetWidth;
                    perma.classList.add('copied');
                    setTimeout(function() { perma.classList.remove('copied'); }, 1400);
                };
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(url).then(flash).catch(function() { fallbackCopy(url, flash); });
                } else {
                    fallbackCopy(url, flash);
                }
                history.replaceState(null, '', '#' + headingId);
                scrollToTarget(h);
            });
            h.appendChild(perma);
        }
        const level = h.tagName.substring(1);
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = title;
        a.className = 'nav-h' + level;
        a.title = title;
        a.dataset.headingId = h.id;
        a.addEventListener('click', function(e) {
            e.preventDefault();
            h.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        li.appendChild(a);
        navList.appendChild(li);
        currentTocHeadings.push({ el: h, link: a });
    });
    updateScrollSpy();
}

/* Single rAF-throttled scroll handler drives scroll-spy, the reading-progress
   bar and the back-to-top button -- one listener doing all the work keeps
   scrolling smooth (no extra runtime over the original two listeners). */
let spyRaf = null;
function updateScrollSpy() {
    if (spyRaf) return;
    spyRaf = requestAnimationFrame(() => {
        spyRaf = null;
        const scrollY = window.scrollY;

        // Reading progress + back-to-top (run regardless of TOC contents).
        const max = document.documentElement.scrollHeight - window.innerHeight;
        const pct = max > 0 ? Math.min(100, (scrollY / max) * 100) : 0;
        if (readProgress) readProgress.style.width = pct + '%';
        if (toTopBtn) toTopBtn.classList.toggle('show', scrollY > 480);

        if (currentTocHeadings.length === 0) return;
        const offset = 80;
        let activeEntry = currentTocHeadings[0];
        for (const entry of currentTocHeadings) {
            if (entry.el.offsetTop <= scrollY + offset) {
                activeEntry = entry;
            } else {
                break;
            }
        }
        currentTocHeadings.forEach(e => e.link.classList.remove('nav-active'));
        if (activeEntry) {
            // Only update the highlight. Do NOT programmatically scroll either
            // sidebar -- they should stay put and move only when the user
            // scrolls them. (The previous code scrolled the wrong sidebar, the
            // left document list, which made it jump to the top on every click.)
            activeEntry.link.classList.add('nav-active');
        }
    });
}

/* ───── iOS-style condensing navbar (hide on scroll down, show on scroll up) ───── */
/* - Nagesh N Nazare - */
function updateNavCondense() {
    const y = window.scrollY;
    const NAV_TOP = 8;       // always expanded near the very top
    const NAV_TRIGGER = 72;  // must scroll past this before condensing
    const DELTA = 5;         // ignore tiny jitters
    if (y <= NAV_TOP) {
        document.body.classList.remove('nav-condensed');
    } else if (y > navLastY + DELTA && y > NAV_TRIGGER) {
        document.body.classList.add('nav-condensed');   // scrolling down
    } else if (y < navLastY - DELTA) {
        document.body.classList.remove('nav-condensed'); // scrolling up
    }
    navLastY = y;
}

/* One scroll listener for everything (was two). */
window.addEventListener('scroll', function () {
    updateNavCondense();
    updateScrollSpy();
}, { passive: true });

if (toTopBtn) {
    toTopBtn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
}

const tocSidebar = document.getElementById('tocSidebar');
const tocToggle = document.getElementById('tocToggle');

function toggleSidebar() {
    const collapsed = sidebarNav.classList.toggle('collapsed');
    document.body.classList.toggle('sidebar-collapsed', collapsed);
    if (!collapsed && window.innerWidth <= 1024) {
        tocSidebar.classList.add('collapsed');
        document.body.classList.add('toc-collapsed');
    }
    LS.set('doc-sidebar', collapsed ? 'closed' : 'open');
}

function toggleToc() {
    const collapsed = tocSidebar.classList.toggle('collapsed');
    document.body.classList.toggle('toc-collapsed', collapsed);
    if (!collapsed && window.innerWidth <= 1024) {
        sidebarNav.classList.add('collapsed');
        document.body.classList.add('sidebar-collapsed');
    }
    LS.set('doc-toc', collapsed ? 'closed' : 'open');
}

sidebarToggle.addEventListener('click', toggleSidebar);
tocToggle.addEventListener('click', toggleToc);

document.addEventListener('click', (e) => {
    if (window.innerWidth <= 1024) {
        if (!sidebarNav.contains(e.target) && !tocSidebar.contains(e.target) &&
            !sidebarToggle.contains(e.target) && !tocToggle.contains(e.target)) {
            sidebarNav.classList.add('collapsed');
            document.body.classList.add('sidebar-collapsed');
            tocSidebar.classList.add('collapsed');
            document.body.classList.add('toc-collapsed');
        }
    }
});

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'b' && !overlay.classList.contains('open')) {
        e.preventDefault();
        toggleSidebar();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'i' && !overlay.classList.contains('open')) {
        e.preventDefault();
        toggleToc();
    }
});

/* ───── Anchor + cross-document link interception ───── */
/* - Nagesh N Nazare - */

/* Find an element by id, preferring the given panel (heading ids can collide
   across documents because each file is converted independently). */
function findById(id, preferredPanel) {
    if (preferredPanel) {
        const scoped = preferredPanel.querySelector('[id="' + id.replace(/(["\\])/g, '\\$1') + '"]');
        if (scoped) return scoped;
    }
    return document.getElementById(id);
}

function scrollToTarget(target) {
    requestAnimationFrame(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }));
}

function gotoAnchor(idx, anchor) {
    activateTab(idx, !anchor);
    const panel = document.getElementById('panel-' + idx);
    if (anchor) {
        const target = findById(anchor, panel);
        if (target) { scrollToTarget(target); return; }
    }
}

/* ───── Navigation history (browser-style back button) ─────
   Whenever a link takes the reader to another section/document, remember where
   they were (which tab + scroll position) so the navbar back button can return
   them to exactly that spot. */
/* - Nagesh N Nazare - */
const navBackBtn = document.getElementById('navBack');
let navHistory = [];

function currentTabIdx() {
    const v = parseInt(docSelect.value, 10);
    return isNaN(v) ? 0 : v;
}

function updateBackBtn() {
    if (navBackBtn) navBackBtn.disabled = navHistory.length === 0;
}

function pushHistory() {
    navHistory.push({ idx: currentTabIdx(), y: window.scrollY });
    if (navHistory.length > 200) navHistory.shift();
    updateBackBtn();
}

function navBack() {
    const state = navHistory.pop();
    if (!state) return;
    activateTab(state.idx, false);
    // Restore the exact scroll position after the panel becomes visible.
    requestAnimationFrame(() => window.scrollTo({ top: state.y, behavior: 'auto' }));
    updateBackBtn();
}

if (navBackBtn) navBackBtn.addEventListener('click', navBack);
document.addEventListener('keydown', (e) => {
    if (e.altKey && e.key === 'ArrowLeft' && !overlay.classList.contains('open')) {
        e.preventDefault();
        navBack();
    }
});

document.addEventListener('click', function(e) {
    const link = e.target.closest('a[href]');
    if (!link) return;
    // Only handle links that live inside document content. Links in the
    // sidebars (TOC "on this page", document list) have their own handlers;
    // letting this run for them would resolve duplicate heading ids against
    // the wrong panel (every same-template doc shares the same ids).
    const ownerPanel = link.closest('.tab-content');
    if (!ownerPanel) return;
    const href = link.getAttribute('href');
    if (!href) return;

    // In-page anchor: resolve within the panel that owns the link first.
    if (href.charAt(0) === '#') {
        const id = href.substring(1);
        if (!id) return;
        const target = findById(id, ownerPanel);
        if (target) {
            e.preventDefault();
            pushHistory();
            const dest = target.closest('.tab-content');
            if (dest) {
                const m = dest.id.match(/^panel-(\d+)$/);
                if (m) activateTab(parseInt(m[1], 10), false);
            }
            scrollToTarget(target);
        }
        return;
    }

    // Cross-document link to another bundled doc (file or folder), optionally #anchor.
    const md = mdTarget(href, baseDirOf(link));
    if (md) {
        e.preventDefault();
        pushHistory();
        gotoAnchor(md.idx, md.anchor);
    }
});

/* ───── Startup ───── */
/* - Nagesh N Nazare - */

// Restore persisted sidebar / TOC open state (only on desktop, where the
// drawers don't overlay the content).
if (window.innerWidth > 1024) {
    if (LS.get('doc-sidebar') === 'open') {
        sidebarNav.classList.remove('collapsed');
        document.body.classList.remove('sidebar-collapsed');
    }
    if (LS.get('doc-toc') === 'open') {
        tocSidebar.classList.remove('collapsed');
        document.body.classList.remove('toc-collapsed');
    }
}

const hash = location.hash || '';
const tabMatch = hash.match(/^#tab-(\d+)$/);
if (tabMatch) {
    activateTab(Math.min(parseInt(tabMatch[1], 10), TAB_DATA.length - 1));
} else if (hash.length > 1) {
    const targetId = hash.substring(1);
    const target = document.getElementById(targetId);
    if (target) {
        const panels = document.querySelectorAll('.tab-content');
        for (let i = 0; i < panels.length; i++) {
            if (panels[i].contains(target)) {
                activateTab(i, false);
                requestAnimationFrame(() => {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                break;
            }
        }
    } else {
        activateTab(0);
    }
} else {
    // No explicit target: resume the last-read document + scroll position.
    const lastIdx = parseInt(LS.get('doc-last-idx'), 10);
    const lastY = parseInt(LS.get('doc-last-y'), 10);
    if (!isNaN(lastIdx) && lastIdx >= 0 && lastIdx < TAB_DATA.length) {
        activateTab(lastIdx, false);
        if (!isNaN(lastY) && lastY > 0) {
            requestAnimationFrame(() => window.scrollTo({ top: lastY, behavior: 'auto' }));
        }
    } else {
        activateTab(0);
    }
}
</script>
